# ไฟล์สำหรับ Deploy เว็บไซต์ขึ้น GitHub Pages (อัปเดตรองรับ Node 24)

name: Deploy static content to Pages

on:
  # ให้ทำงานเมื่อมีการ Push โค้ดเข้าสู่กิ่ง main (ถ้าคุณใช้ master ให้เปลี่ยนตรงนี้เป็น master)
  push:
    branches: ["main"]

  # อนุญาตให้กดรัน Manual จากหน้า Actions ได้
  workflow_dispatch:

# ตั้งค่าสิทธิ์ (Permissions) ที่จำเป็นสำหรับ GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # อัปเดตเป็น v4 (รองรับ Node 20/24)
      - name: Checkout
        uses: actions/checkout@v4

      # อัปเดตเป็น v5
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      # อัปเดตเป็น v3
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          
      # อัปเดตเป็น v4 (รองรับ Node 20/24)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
