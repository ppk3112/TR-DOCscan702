<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดส่งเอกสาร</title>
    
    <meta name="apple-mobile-web-app-title" content="สแกนส่งบิล">
    <meta name="application-name" content="สแกนส่งบิล">
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8fafc">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(152,100%,94%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(210,100%,97%,1) 0, transparent 50%);
            background-attachment: fixed;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlTjz4vhFqiuQ2YJjhyego-NbSTdBPO-eF1-MveHH5ciMf71uQrDxWa-Ow4WIjYJMANg/exec';

            const [activeTab, setActiveTab] = useState('scan');
            const [currentItems, setCurrentItems] = useState([]); 
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(''); 
            const [deliveryType, setDeliveryType] = useState('DC'); 
            
            const [date, setDate] = useState('');
            const [time, setTime] = useState('');
            const [isTimeLocked, setIsTimeLocked] = useState(true);
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinValue, setPinValue] = useState('');
            
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);

            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);
            
            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            
            const dueDateRef = useRef(dueDate); 
            const deliveryTypeRef = useRef(deliveryType);
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { deliveryTypeRef.current = deliveryType; }, [deliveryType]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);

            const wakeLockRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                    } catch (err) {
                        console.log(`Wake Lock error: ${err.message}`);
                    }
                }
            };

            const fetchAllCodes = async () => {
                const cachedCodes = localStorage.getItem('all_sent_codes_backup');
                if (cachedCodes) {
                    try { setAllSentCodesCache(new Set(JSON.parse(cachedCodes))); } catch(e) {}
                }
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                    const json = await res.json();
                    if (json.status === 'success' && json.data) {
                        const uppercaseCodes = json.data.map(code => String(code).trim().toUpperCase());
                        setAllSentCodesCache(new Set(uppercaseCodes));
                        localStorage.setItem('all_sent_codes_backup', JSON.stringify(uppercaseCodes));
                    }
                } catch (e) { console.error("Failed to fetch all codes", e); }
            };

            useEffect(() => {
                requestWakeLock();
                const handleVisibilityChange = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                const savedBasket = localStorage.getItem('delivery_basket');
                if (savedBasket) { try { setCurrentItems(JSON.parse(savedBasket)); } catch (e) {} }
                
                const now = new Date();
                const defaultDue = new Date(now);
                defaultDue.setDate(defaultDue.getDate() + 2);
                setDueDate(`${defaultDue.getFullYear()}-${String(defaultDue.getMonth() + 1).padStart(2, '0')}-${String(defaultDue.getDate()).padStart(2, '0')}`);
                
                fetchAllCodes(); 
                fetchHistoryForMonth(selectedMonth);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) wakeLockRef.current.release().catch(()=>{});
                    if (html5QrCodeRef.current && isScanning) html5QrCodeRef.current.stop().catch(() => {});
                };
            }, []);

            useEffect(() => { localStorage.setItem('delivery_basket', JSON.stringify(currentItems)); }, [currentItems]);

            useEffect(() => {
                if (!isTimeLocked) return;
                const updateCurrentTime = () => {
                    const now = new Date();
                    setDate(`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`);
                    setTime(`${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
                };
                updateCurrentTime(); 
                const interval = setInterval(updateCurrentTime, 10000);
                return () => clearInterval(interval);
            }, [isTimeLocked]);

            useEffect(() => { fetchHistoryForMonth(selectedMonth); }, [selectedMonth]);

            const fetchHistoryForMonth = async (monthStr) => {
                const cacheKey = `history_data_${monthStr}`;
                const cachedData = localStorage.getItem(cacheKey);
                if (cachedData) { try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} }
                setIsLoadingHistory(true);
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${monthStr}`);
                    const json = await res.json();
                    if (json.status === 'success' && json.data) {
                        setMonthHistoryData(json.data);
                        localStorage.setItem(cacheKey, JSON.stringify(json.data));
                    }
                } catch (error) { console.error('Failed to fetch history', error); } finally { setIsLoadingHistory(false); }
            };

            const formatThaiDate = (dateString) => {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
            };

            const checkIsUrgent = (dateStr) => {
                if (!dateStr) return false;
                const targetDate = new Date(dateStr); targetDate.setHours(0, 0, 0, 0);
                const today = new Date(); today.setHours(0, 0, 0, 0);
                const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
                return targetDate.getTime() <= tomorrow.getTime();
            };

            const playBeep = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                    osc.connect(gainNode); gainNode.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                    if (navigator.vibrate) navigator.vibrate(200);
                } catch (e) {}
            };

            const playErrorBeep = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
                    osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } catch (e) {}
            };

            const playSuccessBeep = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.connect(gainNode); gainNode.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                } catch (e) {}
            };

            const checkDuplicate = (code) => {
                const cleanCode = String(code).trim().toUpperCase(); 
                if (currentItemsRef.current.some(item => String(item.code).trim().toUpperCase() === cleanCode)) {
                    showDuplicateError(`บิล ${cleanCode} สแกนไปแล้วในตะกร้า!`); 
                    return true;
                }
                if (allSentCodesCacheRef.current.has(cleanCode)) {
                    showDuplicateError(`บิล ${cleanCode} เคยถูกส่งไปแล้วในระบบ!`); 
                    return true;
                }
                return false;
            };

            const showDuplicateError = (msg) => {
                playErrorBeep(); setDuplicateWarning(msg);
                setTimeout(() => setDuplicateWarning(null), 5000); 
            };

            const startScanner = async () => {
                if (!window.Html5Qrcode) { alert('ระบบสแกนยังโหลดไม่เสร็จ...'); return; }
                const isLineApp = navigator.userAgent.indexOf("Line") > -1;
                if (isLineApp) { alert("⚠️ ตรวจพบการใช้งานผ่านแอป LINE\nระบบกล้องของ iPhone มักจะไม่ทำงานในนี้\n👉 กรุณากดไอคอน '3 จุด' (มุมจอ) แล้วเลือก 'เปิดใน Safari' ครับ"); }
                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    const config = {
                        fps: 10,
                        qrbox: (vw, vh) => { let w = Math.min(250, vw * 0.8); return { width: w, height: 150 }; },
                        aspectRatio: 1.0, 
                        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                    };
                    html5QrCode.start({ facingMode: "environment" }, config,
                        (decodedText) => {
                            if (lastScannedRef.current !== decodedText) {
                                lastScannedRef.current = decodedText;
                                const finalCode = deliveryTypeRef.current === 'FACTORY' ? `${decodedText.trim()}(รับโรงตัด)` : decodedText.trim();
                                if (!checkDuplicate(finalCode)) {
                                    playBeep();
                                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                                }
                                setTimeout(() => { lastScannedRef.current = null }, 1500);
                            }
                        }, (err) => {}
                    ).catch((err) => { setIsScanning(false); console.error(err); });
                }, 300);
            };

            const stopScanner = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => { html5QrCodeRef.current.clear(); setIsScanning(false); setIsFlashlightOn(false); }).catch(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const toggleFlashlight = async () => {
                if (html5QrCodeRef.current && isScanning) {
                    try {
                        const newState = !isFlashlightOn;
                        await html5QrCodeRef.current.applyVideoConstraints({ advanced: [{ torch: newState }] });
                        setIsFlashlightOn(newState);
                    } catch (error) { console.error("Flashlight error:", error); }
                }
            };

            const handleManualAdd = (e) => {
                e.preventDefault();
                const val = inputValue.trim();
                if (!val) return;
                const finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                if (!checkDuplicate(finalCode)) setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate }, ...prev]);
                setInputValue('');
            };

            const handleRemoveItem = (indexToRemove) => { setCurrentItems(prev => prev.filter((_, index) => index !== indexToRemove)); };

            const openEditModal = (index) => {
                const item = currentItems[index];
                setEditingIndex(index);
                setEditDueDate(item.dueDate);
                setEditIsFactory(item.code.includes('(รับโรงตัด)'));
            };

            const saveEditItem = () => {
                if (editingIndex === null) return;
                const newItems = [...currentItems];
                let baseCode = newItems[editingIndex].code.replace('(รับโรงตัด)', '').trim();
                const finalCode = editIsFactory ? `${baseCode}(รับโรงตัด)` : baseCode;
                const isDuplicate = newItems.some((item, idx) => idx !== editingIndex && String(item.code).trim().toUpperCase() === finalCode.toUpperCase());
                if (isDuplicate) { showDuplicateError(`แก้ประเภทไม่ได้! บิลนี้มีอยู่ในตะกร้าแล้ว`); return; }
                newItems[editingIndex] = { ...newItems[editingIndex], code: finalCode, dueDate: editDueDate };
                setCurrentItems(newItems);
                setEditingIndex(null);
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0 || !date || !time) return;
                setIsSaving(true); setSaveSuccess(false);
                const newBatch = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: [...currentItems], date, time, dueDate, timestamp: new Date().getTime()
                };
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(newBatch)
                    });
                    const result = await response.json();
                    if (result.status === 'error') {
                        alert(result.message === 'DUPLICATE_FOUND' ? `❌ ตรวจพบการซ้ำซ้อนในฐานข้อมูล!\nบิลเลขที่: ${result.duplicateCode}` : "❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: " + result.message);
                        setIsSaving(false); return; 
                    }
                    setCurrentItems([]); localStorage.removeItem('delivery_basket');
                    setSaveSuccess(true); playSuccessBeep();
                    fetchAllCodes(); fetchHistoryForMonth(selectedMonth);
                    setTimeout(() => setSaveSuccess(false), 3000);
                } catch (error) { alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อ"); } finally { setIsSaving(false); }
            };

            const getMonthlyStats = () => {
                const [year, month] = selectedMonth.split('-').map(Number);
                const daysInMonth = new Date(year, month, 0).getDate();
                const stats = Array.from({length: daysInMonth}, () => ({ morning:0, afternoon:0, evening:0, urgent:0, total:0 }));
                let totalMonthCount = 0, todayTotal = 0, todayMorning = 0, todayAfternoon = 0, todayEvening = 0;
                const todayStr = new Date().toLocaleDateString('en-CA');
                monthHistoryData.forEach(item => {
                    const day = parseInt(item.date.split('-')[2]) - 1;
                    const count = Number(item.count) || 0;
                    if (day >= 0 && day < daysInMonth) {
                        totalMonthCount += count; stats[day].total += count;
                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) stats[day].morning += count; else if (hour < 18) stats[day].afternoon += count; else stats[day].evening += count;
                        if (new Date(item.dueDate).getTime() <= (new Date(item.date).getTime() + 86400000)) stats[day].urgent += count;
                    }
                    if (item.date === todayStr) {
                        todayTotal += count;
                        const h = parseInt(item.time.split(':')[0], 10);
                        if (h < 12) todayMorning += count; else if (h < 18) todayAfternoon += count; else todayEvening += count;
                    }
                });
                return { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening };
            };
            const { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening } = getMonthlyStats();

            const handleExportExcel = async () => {
                if (!window.ExcelJS) return;
                setIsExporting(true);
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('สรุปยอดส่งบิล');
                    const [year, month] = selectedMonth.split('-').map(Number);
                    const thaiMonth = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤกษาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month-1];
                    const headerRow = ['วันที่'], morningRow = ['ก่อนเที่ยง (เที่ยว)'], afternoonRow = ['ช่วงบ่าย (เที่ยว)'], eveningRow = ['หลัง 18.00 น. (เที่ยว)'], urgentRow = ['งานด่วน'], totalRow = ['รวมรายวัน (เที่ยว)'];
                    let sumM=0, sumA=0, sumE=0, sumU=0, sumT=0;
                    for(let i=0; i<daysInMonth; i++) {
                        headerRow.push(i+1);
                        morningRow.push(stats[i].morning); sumM += stats[i].morning;
                        afternoonRow.push(stats[i].afternoon); sumA += stats[i].afternoon;
                        eveningRow.push(stats[i].evening); sumE += stats[i].evening;
                        urgentRow.push(stats[i].urgent); sumU += stats[i].urgent;
                        totalRow.push(stats[i].total); sumT += stats[i].total;
                    }
                    headerRow.push('รวมทั้งเดือน'); morningRow.push(sumM); afternoonRow.push(sumA); eveningRow.push(sumE); urgentRow.push(sumU); totalRow.push(sumT);
                    sheet.addRow([`${thaiMonth} ${year + 543}`]); sheet.addRow(headerRow); sheet.addRow(morningRow); sheet.addRow(afternoonRow); sheet.addRow(eveningRow); sheet.addRow(urgentRow); sheet.addRow(totalRow);
                    const buffer = await workbook.xlsx.writeBuffer();
                    window.saveAs(new Blob([buffer]), `สรุปยอดส่งบิล_${thaiMonth}.xlsx`);
                } catch (err) { console.error(err); } finally { setIsExporting(false); }
            };

            useEffect(() => {
                if (activeTab !== 'history' || !chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();
                chartInstance.current = new window.Chart(chartRef.current.getContext('2d'), {
                    type: 'bar',
                    data: { labels: Array.from({length: daysInMonth}, (_, i) => i + 1), datasets: [{ label: 'ยอดรวม', data: stats.map(d => d.total), backgroundColor: 'rgba(5, 150, 105, 0.8)', borderRadius: 6 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                });
            }, [stats, activeTab]);

            return (
                <div className="min-h-screen pb-32 relative bg-slate-50/50">
                    {saveSuccess && (
                        <div className="fixed inset-0 bg-emerald-500/90 backdrop-blur-md z-[150] flex flex-col items-center justify-center animate-in fade-in zoom-in duration-300">
                            <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-6 shadow-xl animate-bounce"><i className="fa-solid fa-check text-7xl text-emerald-500"></i></div>
                            <h2 className="text-4xl font-black text-white mb-2">ส่งสำเร็จ!</h2>
                        </div>
                    )}
                    {duplicateWarning && (
                        <div className="fixed top-5 left-4 right-4 z-[110] bg-red-600 text-white p-4 rounded-2xl shadow-xl flex items-center gap-3 animate-in slide-in-from-top-5">
                            <i className="fa-solid fa-triangle-exclamation text-xl"></i>
                            <div className="flex-1 font-bold text-sm">{duplicateWarning}</div>
                        </div>
                    )}
                    {showClearConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[28px] p-7 w-full max-w-sm shadow-2xl animate-in zoom-in-95">
                                <h3 className="text-xl font-black text-slate-800 text-center mb-6">ยืนยันการล้างตะกร้า?</h3>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowClearConfirmModal(false)} className="flex-1 py-3.5 bg-slate-100 rounded-2xl font-bold">ยกเลิก</button>
                                    <button onClick={() => { setCurrentItems([]); setShowClearConfirmModal(false); }} className="flex-1 py-3.5 bg-red-600 text-white rounded-2xl font-bold">ล้างทั้งหมด</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {editingIndex !== null && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[28px] p-7 w-full max-w-sm shadow-2xl animate-in zoom-in-95">
                                <h3 className="text-lg font-bold mb-5">แก้ไขข้อมูลบิล</h3>
                                <div className="space-y-5 mb-7">
                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl gap-1">
                                        <button onClick={() => setEditIsFactory(false)} className={`flex-1 py-3 rounded-xl font-bold ${!editIsFactory ? 'bg-emerald-200 text-emerald-800' : 'text-slate-500'}`}>DC</button>
                                        <button onClick={() => setEditIsFactory(true)} className={`flex-1 py-3 rounded-xl font-bold ${editIsFactory ? 'bg-orange-200 text-orange-800' : 'text-slate-500'}`}>โรงตัด</button>
                                    </div>
                                    <input type="date" value={editDueDate} onChange={(e) => setEditDueDate(e.target.value)} className="w-full px-4 py-3 border rounded-2xl font-bold" />
                                </div>
                                <button onClick={saveEditItem} className="w-full py-3.5 bg-blue-600 text-white rounded-2xl font-bold">บันทึก</button>
                            </div>
                        </div>
                    )}
                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[28px] p-7 w-full max-w-sm shadow-2xl">
                                <h3 className="text-xl font-black text-center mb-6">ยืนยันการส่งข้อมูล?</h3>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowConfirmModal(false)} className="flex-1 py-3.5 bg-slate-100 rounded-2xl font-bold">ยกเลิก</button>
                                    <button onClick={() => { setShowConfirmModal(false); executeSaveBatch(); }} className="flex-1 py-3.5 bg-emerald-600 text-white rounded-2xl font-bold">ยืนยันส่ง</button>
                                </div>
                            </div>
                        </div>
                    )}
                    {showPinModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[28px] p-7 w-full max-w-sm">
                                <h3 className="text-lg font-bold text-center mb-6">ปลดล็อคเวลา</h3>
                                <input type="password" pattern="[0-9]*" inputMode="numeric" value={pinValue} onChange={(e) => setPinValue(e.target.value)} className="w-full text-center text-2xl font-bold py-3 bg-slate-50 border rounded-2xl mb-5" placeholder="------" />
                                <div className="flex gap-3">
                                    <button onClick={() => setShowPinModal(false)} className="flex-1 py-3.5 bg-slate-100 rounded-2xl font-bold">ยกเลิก</button>
                                    <button onClick={() => { if (pinValue === '311240') { setIsTimeLocked(false); setShowPinModal(false); setPinValue(''); } else { alert('ไม่ถูกต้อง'); } }} className="flex-1 py-3.5 bg-emerald-600 text-white rounded-2xl font-bold">ยืนยัน</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className={`pt-6 px-4 max-w-4xl mx-auto space-y-6 ${activeTab === 'scan' ? 'block' : 'hidden'}`}>
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            <div className="lg:col-span-7 space-y-6">
                                <div className="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                                    <div className="flex bg-slate-100 p-1.5 rounded-[20px] gap-1 mb-6">
                                        <button onClick={() => setDeliveryType('DC')} className={`flex-1 py-3.5 font-bold rounded-2xl ${deliveryType === 'DC' ? 'bg-emerald-200 text-emerald-800 shadow-md' : 'text-slate-500'}`}>DC</button>
                                        <button onClick={() => setDeliveryType('FACTORY')} className={`flex-1 py-3.5 font-bold rounded-2xl ${deliveryType === 'FACTORY' ? 'bg-orange-200 text-orange-800 shadow-md' : 'text-slate-500'}`}>โรงตัด</button>
                                    </div>
                                    <div className="space-y-4">
                                        {isScanning ? (
                                            <div className="relative rounded-3xl border-4 border-emerald-400 bg-black overflow-hidden">
                                                <div id="reader" className="w-full h-[280px]"></div>
                                                <button onClick={stopScanner} className="absolute top-3 right-3 bg-white/20 w-10 h-10 rounded-full text-white"><i className="fa-solid fa-xmark"></i></button>
                                                <button onClick={toggleFlashlight} className="absolute top-3 left-3 bg-white/20 w-10 h-10 rounded-full text-white"><i className="fa-solid fa-bolt"></i></button>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col gap-3">
                                                <button onClick={startScanner} className="w-full h-16 bg-slate-800 text-white rounded-[20px] text-3xl"><i className="fa-solid fa-camera"></i></button>
                                                <form onSubmit={handleManualAdd} className="flex gap-2">
                                                    <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="พิมพ์เลขที่..." className="flex-1 px-4 border rounded-[18px] h-[46px]" />
                                                    <button type="submit" className="w-[46px] h-[46px] bg-emerald-100 text-emerald-700 rounded-[18px]"><i className="fa-solid fa-plus"></i></button>
                                                </form>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex gap-3 mt-5 relative bg-slate-50 p-4 rounded-3xl">
                                        <button onClick={() => isTimeLocked ? setShowPinModal(true) : setIsTimeLocked(true)} className="absolute -top-3 right-4 px-3 py-1 text-[10px] font-bold rounded-full bg-slate-800 text-white"><i className={`fa-solid ${isTimeLocked ? 'fa-lock' : 'fa-lock-open'}`}></i></button>
                                        <div className="flex-1"><input type="date" value={date} onChange={(e) => setDate(e.target.value)} disabled={isTimeLocked} className="w-full px-3 py-2 border rounded-xl" /></div>
                                        <div className="flex-1"><input type="time" value={time} onChange={(e) => setTime(e.target.value)} disabled={isTimeLocked} className="w-full px-3 py-2 border rounded-xl" /></div>
                                    </div>
                                </div>
                                <div className={`p-6 rounded-[32px] border-2 shadow-sm ${checkIsUrgent(dueDate) ? 'bg-red-50 border-red-200' : 'bg-white border-emerald-100'}`}>
                                    <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full px-5 py-3.5 border rounded-[20px] font-bold" />
                                </div>
                            </div>
                            <div className="lg:col-span-5 flex flex-col h-full">
                                <div className="bg-slate-800 rounded-[36px] p-2 shadow-xl flex-1 flex flex-col">
                                    <div className="flex justify-between items-center px-6 py-5 text-white">
                                        <h3 className="font-semibold">ตะกร้ารอส่ง</h3>
                                        <div className="flex items-center gap-2">
                                            {currentItems.length > 0 && <button onClick={() => setShowClearConfirmModal(true)} className="text-red-400 text-xs font-bold">ล้าง</button>}
                                            <span className="bg-emerald-500 px-3 py-1 rounded-full text-xs">{currentItems.length}</span>
                                        </div>
                                    </div>
                                    <div className="flex-1 min-h-[250px] max-h-[400px] overflow-y-auto bg-slate-50/95 rounded-[28px] p-3 space-y-2.5 custom-scrollbar">
                                        {currentItems.map((item, index) => (
                                            <div key={index} className="flex items-center justify-between bg-white p-3.5 rounded-2xl shadow-sm">
                                                <div className="flex flex-col">
                                                    <span className="font-bold text-slate-800">{item.code}</span>
                                                    <span className={`text-[11px] font-bold ${checkIsUrgent(item.dueDate) ? 'text-red-500' : 'text-emerald-600'}`}>ดิว: {formatThaiDate(item.dueDate)}</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => openEditModal(index)} className="text-slate-400 w-8 h-8"><i className="fa-solid fa-pen-to-square"></i></button>
                                                    <button onClick={() => handleRemoveItem(index)} className="text-slate-400 w-8 h-8"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-2.5"><button onClick={() => setShowConfirmModal(true)} disabled={currentItems.length === 0 || isSaving} className="w-full bg-emerald-600 text-white font-bold py-4 rounded-[24px]">บันทึก</button></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className={`pt-6 px-4 max-w-4xl mx-auto space-y-6 ${activeTab === 'history' ? 'block' : 'hidden'}`}>
                        <div className="bg-white p-6 rounded-[32px] shadow-sm flex flex-col sm:flex-row gap-4 items-center">
                            <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="flex-1 font-bold text-slate-800 outline-none" />
                            <button onClick={handleExportExcel} className="bg-emerald-50 text-emerald-700 px-6 py-3 rounded-2xl font-bold border border-emerald-200">ดาวน์โหลด Excel</button>
                        </div>
                        <div className="bg-slate-800 rounded-[32px] p-8 text-white flex justify-between items-center">
                            <div><h3 className="text-slate-300 text-xs mb-2">ยอดรวมเดือนนี้</h3><span className="text-6xl font-black text-emerald-400">{totalMonthCount}</span> <span className="text-slate-300 font-bold">เที่ยว</span></div>
                            <button onClick={() => { fetchHistoryForMonth(selectedMonth); fetchAllCodes(); }} className="bg-slate-700 p-4 rounded-full"><i className="fa-solid fa-rotate-right"></i></button>
                        </div>
                        <div className="grid grid-cols-4 gap-2">
                            <div className="bg-white p-4 rounded-2xl border text-center"><span className="text-[10px] text-slate-400 block mb-1">วันนี้</span><span className="text-xl font-bold">{todayTotal}</span></div>
                            <div className="bg-orange-50 p-4 rounded-2xl border text-center"><span className="text-[10px] text-orange-600 block mb-1">เช้า</span><span className="text-xl font-bold text-orange-700">{todayMorning}</span></div>
                            <div className="bg-amber-50 p-4 rounded-2xl border text-center"><span className="text-[10px] text-amber-600 block mb-1">บ่าย</span><span className="text-xl font-bold text-amber-700">{todayAfternoon}</span></div>
                            <div className="bg-indigo-50 p-4 rounded-2xl border text-center"><span className="text-[10px] text-indigo-600 block mb-1">ค่ำ</span><span className="text-xl font-bold text-indigo-700">{todayEvening}</span></div>
                        </div>
                        <div className="bg-white rounded-[32px] p-6 border shadow-sm h-64"><canvas ref={chartRef}></canvas></div>
                    </div>

                    <div className="fixed bottom-6 left-0 right-0 z-40 flex justify-center px-4">
                        <div className="bg-white/40 backdrop-blur-md border p-1.5 rounded-[30px] flex w-full max-w-[320px]">
                            <button onClick={() => setActiveTab('scan')} className={`flex-1 flex justify-center items-center h-14 rounded-[24px] ${activeTab === 'scan' ? 'bg-white text-emerald-600' : 'text-slate-600'}`}><i className="fa-solid fa-barcode text-xl mr-2"></i><span className="font-bold text-sm">สแกนบิล</span></button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex justify-center items-center h-14 rounded-[24px] ${activeTab === 'history' ? 'bg-white text-emerald-600' : 'text-slate-600'}`}><i className="fa-solid fa-clipboard-list text-xl mr-2"></i><span className="font-bold text-sm">ประวัติ</span></button>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
