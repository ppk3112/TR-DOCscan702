<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดส่งเอกสาร</title>
    
    <meta name="apple-mobile-web-app-title" content="สแกนส่งบิล">

    <link rel="apple-touch-icon" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">

            var manifest = {
                "name": "สแกนส่งบิล",

                    { "src": "https://i.postimg.cc/SxDzdXD5/79162.jpg", "sizes": "192x192", "type": "image/jpeg" },

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            background-color: #f1f5f9; /* สีเทาอ่อน (Slate 100) แบบมินิมอลสบายตา */
            min-height: 100vh;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        .btn-smooth {
            transition: all 0.2s ease;
        }
        .btn-smooth:active {
            transform: scale(0.97);
        }

        /* เงาละมุนๆ (Soft Shadow) สำหรับมิติความลึก */

</head>
<body class="text-slate-700">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYAYulOU-9KV7t4y08pz_GhicwWL2S9laTWsRkTqHvo5Fk_UIbGPF_EI0-kHzyY1P57A/exec';

        const formatThaiDate = (dateString) => {
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return dateString;
            return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
        };

        const checkIsUrgent = (dateStr) => {
            if (!dateStr) return false;
            const targetDate = new Date(dateStr); targetDate.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
            return targetDate.getTime() <= tomorrow.getTime();
        };

        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
                if (navigator.vibrate) navigator.vibrate(150);
            } catch (e) {}
        };

        const playDuplicateVoice = () => {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance('บิลซ้ำค่ะ');
                    utterance.lang = 'th-TH'; 
                    const voices = window.speechSynthesis.getVoices();
                    const thaiVoice = voices.find(voice => voice.lang.includes('th'));
                    if (thaiVoice) utterance.voice = thaiVoice;
                    utterance.pitch = 1.2; utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) {}
        };

        const playSuccessBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } catch (e) {}
        };

        const handleCopyTextGlobal = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); alert("คัดลอกข้อความสำเร็จ"); } catch (err) { alert("ไม่สามารถคัดลอกได้"); }
            document.body.removeChild(textArea);
        };

        const ScannerTab = ({ isActive, userProfile, onSaveSuccess }) => {
            const [currentItems, setCurrentItems] = useState(() => {
                const savedBasket = localStorage.getItem('delivery_basket');
                return savedBasket ? JSON.parse(savedBasket) : [];
            });
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(() => {
                const now = new Date();
                now.setDate(now.getDate() + 2);
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            });
            
            const [deliveryType, setDeliveryType] = useState('DC');
            const [deliveryZone, setDeliveryZone] = useState('NORMAL'); 
            const [showZoneDropdown, setShowZoneDropdown] = useState(false); 
            
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);

            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastSavedMessage, setLastSavedMessage] = useState(() => localStorage.getItem('last_saved_message') || '');
            
            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            const [editIsUpcountry, setEditIsUpcountry] = useState(false); 

            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const dueDateRef = useRef(dueDate);
            const deliveryTypeRef = useRef(deliveryType);
            const deliveryZoneRef = useRef(deliveryZone);
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { deliveryTypeRef.current = deliveryType; }, [deliveryType]);
            useEffect(() => { deliveryZoneRef.current = deliveryZone; }, [deliveryZone]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);
            useEffect(() => { localStorage.setItem('delivery_basket', JSON.stringify(currentItems)); }, [currentItems]);

            useEffect(() => {
                const fetchAllCodes = async () => {
                    const cachedCodes = localStorage.getItem('all_sent_codes_backup');
                    if (cachedCodes) { try { setAllSentCodesCache(new Set(JSON.parse(cachedCodes))); } catch(e) {} }
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) return;
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            const uppercaseCodes = json.data.map(code => String(code).trim().toUpperCase());
                            setAllSentCodesCache(new Set(uppercaseCodes));
                            localStorage.setItem('all_sent_codes_backup', JSON.stringify(uppercaseCodes));
                        }
                    } catch (e) { console.error("Failed to fetch all codes", e); }
                };
                fetchAllCodes();
                
                return () => {
                    if (html5QrCodeRef.current && isScanning) {
                        html5QrCodeRef.current.stop().catch(() => {});
                    }
                }
            }, []);

            const checkDuplicate = useCallback((code) => {
                const cleanCode = String(code).trim().toUpperCase(); 
                if (currentItemsRef.current.some(item => String(item.code).trim().toUpperCase() === cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`บิล ${cleanCode} มีอยู่ในรายการแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                if (allSentCodesCacheRef.current.has(cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`บิล ${cleanCode} ถูกจัดส่งเข้าระบบไปแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                return false;
            }, []);

            const startScanner = async () => {
                if (!window.Html5Qrcode) { alert('กำลังโหลดระบบสแกน กรุณารอสักครู่'); return; }
                const isLineApp = navigator.userAgent.indexOf("Line") > -1;
                if (isLineApp) alert("แจ้งเตือน: หากพบปัญหาเปิดกล้อง กรุณากดไอคอน '3 จุด' มุมขวาบน แล้วเลือก 'เปิดในเบราว์เซอร์'");

                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    const config = {
                        fps: 10,
                        qrbox: (vw, vh) => ({ width: Math.min(250, vw * 0.8), height: 150 }),
                        aspectRatio: 1.0, 
                        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                    };

                    html5QrCode.start(
                        { facingMode: "environment" }, config,
                        (decodedText) => {
                            if (lastScannedRef.current !== decodedText) {
                                lastScannedRef.current = decodedText;
                                
                                let finalCode = deliveryTypeRef.current === 'FACTORY' ? `${decodedText.trim()}(รับโรงตัด)` : decodedText.trim();
                                if (deliveryZoneRef.current === 'UPCOUNTRY') {
                                    finalCode += '(ตจว.)';
                                }

                                if (!checkDuplicate(finalCode)) {
                                    playBeep();
                                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                                }
                                setTimeout(() => { lastScannedRef.current = null }, 1500);
                            }
                        }, 
                        (err) => {}
                    ).catch((err) => { setIsScanning(false); alert("ไม่สามารถเปิดใช้งานกล้องได้ โปรดตรวจสอบการอนุญาตสิทธิ์"); });
                }, 300);
            };

            const stopScanner = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        html5QrCodeRef.current.clear(); 
                        setIsScanning(false); setIsFlashlightOn(false);
                    }).catch(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const toggleFlashlight = async () => {
                if (html5QrCodeRef.current && isScanning) {
                    try {
                        const newState = !isFlashlightOn;
                        await html5QrCodeRef.current.applyVideoConstraints({ advanced: [{ torch: newState }] });
                        setIsFlashlightOn(newState);
                    } catch (error) { alert("เบราว์เซอร์หรืออุปกรณ์ไม่รองรับการเปิดไฟฉาย"); }
                }
            };

            const handleManualAdd = (e) => {
                e.preventDefault();
                let val = inputValue.trim();
                if (!val) return;

                if (val.length !== 4 && val.length !== 10) {
                    alert("กรุณาระบุเลขบิล 4 หรือ 10 หลัก");
                    return;
                }

                if (val.length === 4) {
                    const now = new Date();
                    const yy = String(now.getFullYear()).slice(-2);
                    const mm = String(now.getMonth() + 1).padStart(2, '0');
                    val = `${yy}${mm}00${val}`; 
                }

                let finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                if (deliveryZone === 'UPCOUNTRY') {
                    finalCode += '(ตจว.)';
                }

                if (!checkDuplicate(finalCode)) {
                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate }, ...prev]);
                }
                setInputValue('');
            };

            const saveEditItem = () => {
                if (editingIndex === null) return;
                const newItems = [...currentItems];
                
                let baseCode = newItems[editingIndex].code.replace('(รับโรงตัด)', '').replace('(ตจว.)', '').trim();
                let finalCode = editIsFactory ? `${baseCode}(รับโรงตัด)` : baseCode;
                if (editIsUpcountry) {
                    finalCode += '(ตจว.)';
                }

                const isDuplicate = newItems.some((item, idx) => idx !== editingIndex && String(item.code).trim().toUpperCase() === finalCode.toUpperCase());
                
                if (isDuplicate) { 
                    playDuplicateVoice();
                    setDuplicateWarning(`ไม่สามารถบันทึกได้ บิลนี้มีอยู่ในรายการแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return; 
                }

                newItems[editingIndex] = { ...newItems[editingIndex], code: finalCode, dueDate: editDueDate };
                setCurrentItems(newItems);
                setEditingIndex(null);
            };

            const handleTypeToggle = (type) => {
                if (deliveryType === type) {
                    setShowZoneDropdown(!showZoneDropdown);
                } else {
                    setDeliveryType(type);
                    setDeliveryZone('NORMAL');
                    setShowZoneDropdown(false);
                }
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0) return;
                setIsSaving(true); setSaveSuccess(false);

                const now = new Date();
                const currentDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                const newBatch = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: [...currentItems], date: currentDateStr, time: currentTimeStr, 
                    dueDate: dueDate, timestamp: now.getTime(),
                    userId: userProfile ? userProfile.userId : null
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(newBatch)
                    });

                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("เชื่อมต่อฐานข้อมูลล้มเหลว"); setIsSaving(false); return; }

                    const result = JSON.parse(text);
                    if (result.status === 'error') {
                        if (result.message === 'DUPLICATE_FOUND') { alert(`ตรวจพบข้อมูลซ้ำซ้อนในระบบ:\n${result.duplicateCode}`); } 
                        else { alert("เกิดข้อผิดพลาด: " + result.message); }
                        setIsSaving(false); return; 
                    }

                    setCurrentItems([]); localStorage.removeItem('delivery_basket');
                    setSaveSuccess(true); playSuccessBeep();
                    
                    if (window.confetti) {
                        confetti({
                            particleCount: 100, spread: 70, origin: { y: 0.6 },
                            colors: ['#475569', '#94a3b8', '#cbd5e1']
                        });
                    }
                    
                    if (result.lineMessage) {
                        setLineMessageToCopy(result.lineMessage);
                        setLastSavedMessage(result.lineMessage); 
                        localStorage.setItem('last_saved_message', result.lineMessage);
                        setTimeout(() => { setShowCopyModal(true); }, 1500); 
                    }
                    
                    onSaveSuccess();
                    
                    const newCodesSet = new Set(allSentCodesCache);
                    newBatch.items.forEach(item => newCodesSet.add(item.code.trim().toUpperCase()));
                    setAllSentCodesCache(newCodesSet);

                    setTimeout(() => setSaveSuccess(false), 3000);
                } catch (error) { 
                    console.error("Save Error:", error);
                    alert(`เกิดข้อผิดพลาดในการเชื่อมต่อเครือข่าย`); 
                } finally { 
                    setIsSaving(false); 
                }
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {saveSuccess && (
                        <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[150] flex flex-col items-center justify-center animate-in fade-in duration-300">
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border border-slate-100 flex flex-col items-center max-w-sm w-11/12 animate-in zoom-in-95 duration-300">
                                <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-5">
                                    <i className="fa-solid fa-check text-4xl text-slate-800"></i>
                                </div>
                                <h2 className="text-2xl font-bold text-slate-800 mb-2">บันทึกสำเร็จ</h2>
                                <p className="text-slate-500 text-sm">ข้อมูลถูกส่งเข้าระบบเรียบร้อยแล้ว</p>
                            </div>
                        </div>
                    )}

                    {duplicateWarning && (
                        <div className="fixed top-5 left-4 right-4 z-[110] bg-white border border-red-200 text-red-500 p-4 rounded-2xl shadow-lg flex items-center gap-4 animate-in slide-in-from-top-4 fade-in">
                            <div className="w-10 h-10 bg-red-50 rounded-full flex items-center justify-center shrink-0"><i className="fa-solid fa-bell"></i></div>
                            <div className="flex-1 font-medium text-sm">{duplicateWarning}</div>
                        </div>
                    )}

                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-xl border border-slate-100 animate-in zoom-in-95 duration-200">
                                <div className="text-center mb-5 border-b border-slate-100 pb-4">
                                    <h3 className="text-lg font-bold text-slate-800">รายละเอียดข้อมูล</h3>
                                </div>
                                <div className="bg-slate-50 border border-slate-100 p-4 rounded-xl mb-5 max-h-[40vh] overflow-y-auto text-left">
                                    <pre className="text-xs text-slate-600 whitespace-pre-wrap font-sans leading-relaxed">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-smooth flex-1 py-3 bg-white border border-slate-200 hover:bg-slate-50 rounded-xl font-medium text-slate-600 text-sm">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-smooth flex-1 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-medium shadow-sm flex justify-center items-center gap-2 text-sm"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showClearConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-xl border border-slate-100 animate-in zoom-in-95 duration-200 text-center">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-5"><i className="fa-solid fa-trash-can text-2xl"></i></div>
                                <h3 className="text-xl font-bold text-slate-800">ล้างข้อมูลทั้งหมด</h3>
                                <p className="text-sm text-slate-500 mt-2 mb-6">รายการที่สแกนไว้จะถูกลบออกจากระบบชั่วคราว</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowClearConfirmModal(false)} className="btn-smooth flex-1 py-3 bg-white border border-slate-200 rounded-xl font-medium text-slate-600 text-sm">ยกเลิก</button>
                                    <button onClick={() => { setCurrentItems([]); setShowClearConfirmModal(false); }} className="btn-smooth flex-1 py-3 bg-red-500 text-white rounded-xl font-medium shadow-sm text-sm">ล้างข้อมูล</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingIndex !== null && (
                        <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[100] flex items-center justify-center p-4">

                                            <button type="button" onClick={() => setEditIsFactory(true)} className={`btn-smooth flex-1 py-2.5 text-sm font-medium rounded-lg ${editIsFactory ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-white'}`}>รับโรงตัด</button>

                                            <button type="button" onClick={() => setEditIsUpcountry(false)} className={`btn-smooth flex-1 py-2.5 text-sm font-medium rounded-lg ${!editIsUpcountry ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-white'}`}>ปกติ</button>
                                            <button type="button" onClick={() => setEditIsUpcountry(true)} className={`btn-smooth flex-1 py-2.5 text-sm font-medium rounded-lg ${editIsUpcountry ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-white'}`}>ต่างจังหวัด</button>

                                    </div>
                                    <div>
                                        <label className="text-[11px] font-semibold text-slate-400 uppercase tracking-wide mb-2 block ml-1">กำหนดส่ง</label>
                                        <input type="date" value={editDueDate} onChange={(e) => setEditDueDate(e.target.value)} className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none font-medium text-slate-700 focus:border-slate-400 focus:ring-1 focus:ring-slate-400 transition-shadow" />
                                    </div>
                                </div>
                                <button onClick={saveEditItem} className="btn-smooth w-full py-3.5 bg-slate-800 text-white rounded-xl font-medium shadow-sm">บันทึกการแก้ไข</button>
                            </div>
                        </div>
                    )}

                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-xl border border-slate-100 animate-in zoom-in-95 duration-200 text-center">
                                <div className="w-16 h-16 bg-slate-100 text-slate-800 rounded-full flex items-center justify-center mx-auto mb-5"><i className="fa-solid fa-paper-plane text-2xl"></i></div>
                                <h3 className="text-xl font-bold text-slate-800">ยืนยันการจัดส่ง</h3>
                                <p className="text-sm text-slate-500 mt-2 mb-6">ต้องการส่งข้อมูล <span className="font-bold text-slate-800">{currentItems.length}</span> รายการ เข้าระบบใช่หรือไม่?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowConfirmModal(false)} className="btn-smooth flex-1 py-3 bg-white border border-slate-200 rounded-xl font-medium text-slate-600 text-sm">ตรวจสอบอีกครั้ง</button>
                                    <button onClick={() => { setShowConfirmModal(false); executeSaveBatch(); }} className="btn-smooth flex-1 py-3 bg-slate-800 text-white rounded-xl font-medium shadow-sm text-sm">ยืนยันส่งข้อมูล</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-7 space-y-6">
                            
                            <div className="bg-white p-5 rounded-[2rem] soft-shadow border border-slate-100">
                                <div className="mb-5 relative">
                                    <div className="flex bg-slate-50 p-1.5 rounded-xl gap-1 border border-slate-100">
                                        <button onClick={() => handleTypeToggle('DC')} className={`btn-smooth flex-1 py-3 font-medium rounded-lg flex justify-center items-center text-sm ${deliveryType === 'DC' ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-white'}`}>
                                            คลังสินค้า (DC) {deliveryType === 'DC' && deliveryZone === 'UPCOUNTRY' && '(ตจว.)'}
                                            {deliveryType === 'DC' && <i className={`fa-solid fa-chevron-down ml-2 text-[10px] transition-transform ${showZoneDropdown ? 'rotate-180' : ''}`}></i>}
                                        </button>
                                        <button onClick={() => handleTypeToggle('FACTORY')} className={`btn-smooth flex-1 py-3 font-medium rounded-lg flex justify-center items-center text-sm ${deliveryType === 'FACTORY' ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-white'}`}>
                                            รับโรงตัด {deliveryType === 'FACTORY' && deliveryZone === 'UPCOUNTRY' && '(ตจว.)'}
                                            {deliveryType === 'FACTORY' && <i className={`fa-solid fa-chevron-down ml-2 text-[10px] transition-transform ${showZoneDropdown ? 'rotate-180' : ''}`}></i>}
                                        </button>
                                    </div>
                                    
                                    {showZoneDropdown && (
                                        <div className="absolute top-full left-0 right-0 mt-2 p-1.5 bg-white rounded-xl shadow-lg border border-slate-100 z-10 flex gap-1 animate-in slide-in-from-top-2">
                                            <button onClick={() => { setDeliveryZone('NORMAL'); setShowZoneDropdown(false); }} className={`btn-smooth flex-1 py-2.5 text-sm font-medium rounded-lg transition-all ${deliveryZone === 'NORMAL' ? 'bg-slate-800 text-white' : 'bg-slate-50 text-slate-600'}`}>พื้นที่ปกติ</button>
                                            <button onClick={() => { setDeliveryZone('UPCOUNTRY'); setShowZoneDropdown(false); }} className={`btn-smooth flex-1 py-2.5 text-sm font-medium rounded-lg transition-all ${deliveryZone === 'UPCOUNTRY' ? 'bg-slate-800 text-white' : 'bg-slate-50 text-slate-600'}`}>ต่างจังหวัด</button>
                                        </div>
                                    )}
                                </div>
                                
                                <div className="space-y-4">
                                    {isScanning ? (
                                        <div className="relative rounded-2xl bg-slate-900 overflow-hidden shadow-inner">
                                            <div id="reader" className="w-full h-[300px]"></div>
                                            <button onClick={stopScanner} className="btn-smooth absolute top-3 right-3 bg-white/20 backdrop-blur-sm text-white w-10 h-10 rounded-full z-10 flex items-center justify-center hover:bg-white/30"><i className="fa-solid fa-xmark text-lg"></i></button>
                                            <button onClick={toggleFlashlight} className={`btn-smooth absolute top-3 left-3 w-10 h-10 rounded-full z-10 flex items-center justify-center backdrop-blur-sm ${isFlashlightOn ? 'bg-white text-slate-800' : 'bg-white/20 text-white hover:bg-white/30'}`}><i className="fa-solid fa-bolt"></i></button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-4">
                                            <button onClick={startScanner} className="btn-smooth w-full h-[120px] bg-slate-50 border-2 border-dashed border-slate-200 text-slate-500 hover:text-slate-700 hover:border-slate-300 rounded-2xl flex flex-col items-center justify-center transition-colors">
                                                <i className="fa-solid fa-camera text-3xl mb-2"></i>
                                                <span className="font-medium text-sm">แตะเพื่อสแกน QR Code</span>
                                            </button>
                                            
                                            <form onSubmit={handleManualAdd} className="flex gap-2">
                                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="ระบุหมายเลขบิล" className="flex-1 px-4 bg-white border border-slate-200 rounded-xl outline-none text-sm font-medium h-12 focus:border-slate-400 focus:ring-1 focus:ring-slate-400 placeholder-slate-400 transition-shadow" />
                                                <button type="submit" className="btn-smooth w-12 h-12 bg-slate-800 text-white rounded-xl shadow-sm flex items-center justify-center"><i className="fa-solid fa-plus text-sm"></i></button>
                                            </form>
                                        </div>
                                    )}
                                </div>
                                
                                {lastSavedMessage && (
                                    <div className="mt-5 pt-4 border-t border-slate-100 flex items-center justify-between">
                                        <div className="flex-1 pr-4">
                                            <div className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-0.5">แจ้งเตือนระบบ</div>
                                            <h4 className="text-xs font-medium text-slate-600 truncate">ทำรายการล่าสุดสำเร็จแล้ว</h4>
                                        </div>
                                        <button onClick={() => { setLineMessageToCopy(lastSavedMessage); setShowCopyModal(true); }} className="btn-smooth px-3 py-1.5 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-600 rounded-lg font-medium text-xs">ดูรายละเอียด</button>
                                    </div>
                                )}
                            </div>

                            <div className={`p-5 rounded-[2rem] transition-colors duration-300 soft-shadow border ${checkIsUrgent(dueDate) ? 'bg-red-50/50 border-red-100' : 'bg-white border-slate-100'}`}>
                                <div className="flex items-center justify-between mb-3">
                                    <label className={`text-sm font-bold flex items-center gap-2 ${checkIsUrgent(dueDate) ? 'text-red-500' : 'text-slate-700'}`}>กำหนดส่ง</label>
                                    {checkIsUrgent(dueDate) && <span className="text-red-500 text-[10px] px-2 py-1 bg-white border border-red-100 rounded-md font-bold">ด่วนพิเศษ</span>}
                                </div>
                                <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium text-slate-700 text-sm focus:border-slate-400 focus:ring-1 focus:ring-slate-400 transition-shadow" />
                            </div>
                        </div>

                        <div className="lg:col-span-5 flex flex-col h-[500px] lg:h-[600px]">
                            <div className="flex flex-col bg-white rounded-[2rem] p-2 soft-shadow border border-slate-100 relative flex-1 overflow-hidden">
                                {isSaving && <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center rounded-[2rem]"><div className="w-10 h-10 border-2 border-slate-100 border-t-slate-800 rounded-full animate-spin mb-3"></div><span className="font-medium text-slate-600 text-sm">กำลังประมวลผล...</span></div>}
                                
                                <div className="flex justify-between items-center px-4 py-4 shrink-0">
                                    <h3 className="text-slate-800 font-bold text-base">รายการเตรียมส่ง</h3>
                                    <div className="flex items-center gap-2">
                                        {currentItems.length > 0 && <button onClick={() => setShowClearConfirmModal(true)} className="btn-smooth text-slate-400 hover:text-red-500 text-[11px] font-medium px-2 py-1 bg-slate-50 rounded-md">ล้างข้อมูล</button>}
                                        <span className="bg-slate-800 text-white text-[11px] font-medium px-2.5 py-1 rounded-md">{currentItems.length} รายการ</span>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto rounded-2xl p-2 space-y-2 custom-scrollbar bg-slate-50/50">
                                    {currentItems.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-300">
                                            <i className="fa-regular fa-folder-open text-4xl mb-3 opacity-50"></i>
                                            <p className="font-medium text-sm text-slate-400">ยังไม่มีข้อมูล</p>
                                        </div>
                                    ) : (
                                        currentItems.map((item, index) => {
                                            const isUrgent = checkIsUrgent(item.dueDate);
                                            const isFactory = item.code.includes('(รับโรงตัด)');
                                            const isUpcountry = item.code.includes('(ตจว.)'); 
                                            
                                            return (
                                                <div key={index} className="flex justify-between bg-white p-3.5 rounded-xl shadow-[0_2px_10px_rgba(0,0,0,0.02)] border border-slate-100 animate-in slide-in-from-bottom-2">
                                                    <div className="flex flex-col justify-center">
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-sm text-slate-700">{item.code}</span>
                                                        </div>
                                                        <div className="flex items-center flex-wrap gap-1 mt-1">
                                                            <span className={`text-[10px] font-medium px-1.5 py-0.5 rounded ${isUrgent ? 'bg-red-50 text-red-500' : 'text-slate-400'}`}>ดิว: {formatThaiDate(item.dueDate)}</span>
                                                            {isUpcountry && <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-medium">ตจว.</span>}
                                                            {isFactory && <span className="text-[10px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded font-medium">โรงตัด</span>}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1 items-center">
                                                        <button onClick={() => { setEditingIndex(index); setEditDueDate(item.dueDate); setEditIsFactory(isFactory); setEditIsUpcountry(isUpcountry); }} className="btn-smooth text-slate-400 hover:bg-slate-50 hover:text-slate-600 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-pen text-[10px]"></i></button>
                                                        <button onClick={() => setCurrentItems(prev => prev.filter((_, i) => i !== index))} className="btn-smooth text-slate-400 hover:bg-red-50 hover:text-red-500 w-8 h-8 rounded-lg flex items-center justify-center"><i className="fa-solid fa-trash-can text-[10px]"></i></button>
                                                    </div>
                                                </div>
                                            )
                                        })
                                    )}
                                </div>
                                <div className="p-2 mt-1 shrink-0">
                                    <button onClick={() => setShowConfirmModal(true)} disabled={currentItems.length === 0 || isSaving} className="btn-smooth w-full text-white font-medium text-sm py-3.5 rounded-xl bg-slate-800 hover:bg-slate-700 disabled:bg-slate-200 disabled:text-slate-400 shadow-sm disabled:shadow-none flex justify-center items-center gap-2 transition-colors">
                                        ยืนยันส่งข้อมูล
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const HistoryTab = ({ isActive, refreshTrigger }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [isFetchingSummary, setIsFetchingSummary] = useState(false); 
            
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastFetchedMonth, setLastFetchedMonth] = useState(null);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!isActive) return;

                const fetchHistory = async () => {
                    setIsLoadingHistory(true);
                    const cacheKey = `history_data_${selectedMonth}`;
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${selectedMonth}`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) throw new Error("Server error");
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            setMonthHistoryData(json.data);
                            localStorage.setItem(cacheKey, JSON.stringify(json.data));
                        }
                    } catch (error) { 
                        const cachedData = localStorage.getItem(cacheKey);
                        if (cachedData) { try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} }
                    } finally { 
                        setIsLoadingHistory(false); 
                        setLastFetchedMonth(selectedMonth);
                    }
                };

                if (selectedMonth !== lastFetchedMonth || refreshTrigger > 0) {
                    const cacheKey = `history_data_${selectedMonth}`;
                    const cachedData = localStorage.getItem(cacheKey);
                    if (cachedData && selectedMonth !== lastFetchedMonth) { 
                        try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} 
                    }
                    fetchHistory();
                }
            }, [isActive, selectedMonth, refreshTrigger]);

            const getMonthlyStats = () => {
                const year = parseInt(selectedMonth.split('-')[0]);
                const month = parseInt(selectedMonth.split('-')[1]);
                const daysInMonth = new Date(year, month, 0).getDate();
                
                const stats = Array.from({length: daysInMonth}, () => ({ 
                    morning:0, afternoon:0, evening:0, 
                    urgent:0, total:0, 
                    before1Day: 0, before2DaysPlus: 0, sameDay: 0, afterDue: 0,
                    evening_before1Day: 0, evening_before2Days: 0, evening_before3DaysPlus: 0, evening_afterDue: 0
                }));
                
                let totalMonthCount = 0;
                let todayTotal = 0, todayMorning = 0, todayAfternoon = 0, todayEvening = 0;
                const todayStr = new Date().toLocaleDateString('en-CA');

                const parseDateLocal = (dStr) => {
                    const parts = dStr.split('-');
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                };

                monthHistoryData.forEach(item => {
                    const day = parseInt(item.date.split('-')[2]) - 1;
                    const count = Number(item.count) || 0;
                    
                    if (day >= 0 && day < daysInMonth) {
                        totalMonthCount += count;
                        stats[day].total += count;

                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) stats[day].morning += count;
                        else if (hour < 18) stats[day].afternoon += count;
                        else stats[day].evening += count;

                        const scanDateObj = parseDateLocal(item.date);
                        const dueDateObj = parseDateLocal(item.dueDate);
                        
                        const diffTime = dueDateObj.getTime() - scanDateObj.getTime();
                        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                        if (hour < 18) {
                            if (diffDays === 1) stats[day].before1Day += count; 
                            else if (diffDays >= 2) stats[day].before2DaysPlus += count; 
                            else if (diffDays === 0) stats[day].sameDay += count;    
                            else if (diffDays < 0) stats[day].afterDue += count;   
                        } else {
                            if (diffDays === 1) stats[day].evening_before1Day += count;
                            else if (diffDays === 2) stats[day].evening_before2Days += count;
                            else if (diffDays >= 3) stats[day].evening_before3DaysPlus += count;
                            else if (diffDays < 0) stats[day].evening_afterDue += count;
                        }

                        const sendDate = new Date(item.date); sendDate.setHours(0,0,0,0);
                        const nextDay = new Date(sendDate); nextDay.setDate(sendDate.getDate() + 1);
                        const dDate = new Date(item.dueDate); dDate.setHours(0,0,0,0);
                        if (dDate.getTime() <= nextDay.getTime()) stats[day].urgent += count;
                    }

                    if (item.date === todayStr) {
                        todayTotal += count;
                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) todayMorning += count;
                        else if (hour < 18) todayAfternoon += count;
                        else todayEvening += count;
                    }
                });
                return { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening };
            };

            const { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening } = getMonthlyStats();

            useEffect(() => {
                if (!isActive || !chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();
                
                const ctx = chartRef.current.getContext('2d');
                const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
                const dataTotals = stats.map(d => d.total);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'จำนวน', data: dataTotals, backgroundColor: '#64748b', borderRadius: 4, barPercentage: 0.5 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: {family: "'Prompt', sans-serif", size: 10} }, grid: { color: '#f1f5f9' }, border: {display: false} }, x: { grid: { display: false }, ticks: { font: {family: "'Prompt', sans-serif", size: 10} }, border: {display: false} } }, animation: { duration: 800 } }
                });
            }, [stats, isActive, daysInMonth]);

            const handleExportExcel = async () => {
                if (!window.ExcelJS) { alert('กำลังโหลดระบบ...'); return; }
                setIsExporting(true);
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('สรุปยอดส่งบิล');
                    const year = parseInt(selectedMonth.split('-')[0]);
                    const month = parseInt(selectedMonth.split('-')[1]);
                    const thaiMonth = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month-1];
                    const thaiYear = year + 543;

                    const compHeader = ['วันที่'];
                    const compTotal = ['จำนวนเที่ยวทั้งหมด'];
                    const compBefore1Day = ['ส่งบิลก่อนวันนัดส่ง 1 วัน (งานด่วน)'];
                    const compBefore2DaysPlus = ['ส่งบิลก่อนดิวส่ง 2 วันขึ้นไป'];
                    const compSameDay = ['ส่งบิลในวันนัดส่ง'];
                    const compAfterDue = ['ส่งบิลหลังคิวส่ง (ล่าช้า)'];
                    const compEvening = ['ส่งบิลหลัง 18.00 น. (รวม)'];
                    const compEvening_b1 = ['    - ดิวส่งล่วงหน้า 1 วัน'];
                    const compEvening_b2 = ['    - ดิวส่งล่วงหน้า 2 วัน'];
                    const compEvening_b3p = ['    - ดิวส่งล่วงหน้า 3 วันขึ้นไป'];
                    const compEvening_after = ['    - ดิวส่งล่าช้า (หลังคิวส่ง)'];

                    let sumTotal=0, sumCompBefore1Day=0, sumCompBefore2DaysPlus=0, sumCompSameDay=0, sumCompAfterDue=0;
                    let sumEvening=0, sumCompEvening_b1=0, sumCompEvening_b2=0, sumCompEvening_b3p=0, sumCompEvening_after=0;

                    for(let i=0; i<daysInMonth; i++) {
                        compHeader.push(i+1);
                        compTotal.push(stats[i].total); sumTotal += stats[i].total;
                        compBefore1Day.push(stats[i].before1Day); sumCompBefore1Day += stats[i].before1Day;
                        compBefore2DaysPlus.push(stats[i].before2DaysPlus); sumCompBefore2DaysPlus += stats[i].before2DaysPlus;
                        compSameDay.push(stats[i].sameDay); sumCompSameDay += stats[i].sameDay;
                        compAfterDue.push(stats[i].afterDue); sumCompAfterDue += stats[i].afterDue;
                        compEvening.push(stats[i].evening); sumEvening += stats[i].evening;
                        compEvening_b1.push(stats[i].evening_before1Day); sumCompEvening_b1 += stats[i].evening_before1Day;
                        compEvening_b2.push(stats[i].evening_before2Days); sumCompEvening_b2 += stats[i].evening_before2Days;
                        compEvening_b3p.push(stats[i].evening_before3DaysPlus); sumCompEvening_b3p += stats[i].evening_before3DaysPlus;
                        compEvening_after.push(stats[i].evening_afterDue); sumCompEvening_after += stats[i].evening_afterDue;
                    }

                    compHeader.push('Total');
                    compTotal.push(sumTotal);
                    compBefore1Day.push(sumCompBefore1Day);
                    compBefore2DaysPlus.push(sumCompBefore2DaysPlus);
                    compSameDay.push(sumCompSameDay);
                    compAfterDue.push(sumCompAfterDue);
                    compEvening.push(sumEvening);
                    compEvening_b1.push(sumCompEvening_b1);
                    compEvening_b2.push(sumCompEvening_b2);
                    compEvening_b3p.push(sumCompEvening_b3p);
                    compEvening_after.push(sumCompEvening_after);

                    sheet.addRow([`เดือน ${thaiMonth} ${thaiYear}`]);
                    const titleCell = sheet.getCell('A1');
                    titleCell.font = { name: 'Angsana New', bold: true, size: 16 };
                    sheet.mergeCells('A1:C1');

                    const rComp1 = sheet.addRow(compHeader);
                    const rComp2 = sheet.addRow(compTotal);
                    const rComp3 = sheet.addRow(compBefore1Day); 
                    const rComp4 = sheet.addRow(compBefore2DaysPlus); 
                    const rComp5 = sheet.addRow(compSameDay);
                    const rComp6 = sheet.addRow(compAfterDue);
                    const rComp7 = sheet.addRow(compEvening);
                    const rComp7_1 = sheet.addRow(compEvening_b1);
                    const rComp7_2 = sheet.addRow(compEvening_b2);
                    const rComp7_3 = sheet.addRow(compEvening_b3p);
                    const rComp7_4 = sheet.addRow(compEvening_after);

                    const styleCompRow = (row, bgArgb, fontColorArgb, isBold = false) => {
                        row.eachCell((cell, colNumber) => {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } };
                            cell.font = { name: 'Angsana New', size: 12, color: { argb: fontColorArgb }, bold: isBold };
                            cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                            cell.alignment = { vertical: 'middle', horizontal: colNumber === 1 ? 'left' : 'center' };
                        });
                        const lastColNumber = daysInMonth + 2;
                        const lastCell = row.getCell(lastColNumber);
                        lastCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFF00' } };
                        lastCell.font = { name: 'Angsana New', size: 12, color: { argb: fontColorArgb }, bold: true };
                    };

                    rComp1.eachCell((cell, colNumber) => {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB4C6E7' } };
                        cell.font = { name: 'Angsana New', size: 12, color: { argb: 'FF000000' }, bold: true };
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    });

                    styleCompRow(rComp2, 'FFFFFFFF', 'FFFF0000', true); 
                    rComp2.getCell(1).font = { name: 'Angsana New', size: 12, color: { argb: 'FF000000' }, bold: true }; 

                    styleCompRow(rComp3, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp4, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp5, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp6, 'FFFFFFFF', 'FF000000');

                    styleCompRow(rComp7, 'FFEFF6FF', 'FF1E40AF', true); 
                    styleCompRow(rComp7_1, 'FFFFFFFF', 'FF475569'); 
                    styleCompRow(rComp7_2, 'FFFFFFFF', 'FF475569');
                    styleCompRow(rComp7_3, 'FFFFFFFF', 'FF475569');
                    styleCompRow(rComp7_4, 'FFFFFFFF', 'FF475569');
                    
                    rComp7_1.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_2.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_3.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_4.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };

                    sheet.getColumn(1).width = 40; 
                    for(let i=2; i<=daysInMonth+1; i++) sheet.getColumn(i).width = 5; 
                    sheet.getColumn(daysInMonth+2).width = 8;

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    window.saveAs(blob, `สรุปยอดส่งบิล_${thaiMonth}_${thaiYear}.xlsx`);
                } catch (err) { alert('ส่งออก Excel ไม่สำเร็จ'); } finally { setIsExporting(false); }
            };

            const handleGetDailySummary = async () => {
                setIsFetchingSummary(true);
                try {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDailySummaryText&date=${todayStr}`);
                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("เชื่อมต่อผิดพลาด"); return; }
                    
                    const result = JSON.parse(text);
                    if (result.status === 'success') {
                        setLineMessageToCopy(result.data);
                        setShowCopyModal(true);
                    } else { alert("เกิดข้อผิดพลาดจากฝั่งเซิร์ฟเวอร์"); }
                } catch (error) { alert("ดึงข้อมูลไม่สำเร็จ"); } finally { setIsFetchingSummary(false); }
            };

            const forceRefresh = () => {
                setLastFetchedMonth(null); 
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-xl border border-slate-100 animate-in zoom-in-95 duration-200">
                                <div className="text-center mb-4 border-b border-slate-100 pb-4">
                                    <h3 className="text-lg font-bold text-slate-800">สรุปยอดประจำวัน</h3>
                                </div>
                                <div className="bg-slate-50 border border-slate-100 p-4 rounded-xl mb-5 max-h-[40vh] overflow-y-auto text-left">
                                    <pre className="text-xs text-slate-600 whitespace-pre-wrap font-sans leading-relaxed">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-smooth flex-1 py-3 bg-white border border-slate-200 rounded-xl font-medium text-slate-600 text-sm">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-smooth flex-1 py-3 bg-slate-800 text-white rounded-xl font-medium shadow-sm flex justify-center items-center gap-2 text-sm"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex items-center justify-between bg-white p-4 pl-5 rounded-[2rem] soft-shadow border border-slate-100">
                        <div className="flex items-center gap-3">
                            <span className="text-slate-700 font-bold text-sm">ตรวจสอบสรุปยอดวันนี้</span>
                        </div>
                        <button onClick={handleGetDailySummary} disabled={isFetchingSummary} className="btn-smooth px-4 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium text-xs flex items-center justify-center gap-2 transition-colors">
                            {isFetchingSummary ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-file-lines"></i>} ดึงข้อมูล
                        </button>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-between items-center bg-white p-6 rounded-[2rem] soft-shadow border border-slate-100 gap-5">
                        <div className="flex items-center gap-4 w-full sm:w-auto">
                            <div className="flex-1">
                                <label className="text-[10px] font-semibold text-slate-400 uppercase tracking-wider block mb-1">เลือกรอบเดือน</label>
                                <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold text-slate-700 outline-none w-full" />
                            </div>
                        </div>
                        <button onClick={handleExportExcel} disabled={isLoadingHistory || isExporting} className="btn-smooth w-full sm:w-auto flex items-center justify-center gap-2 bg-slate-800 text-white px-5 py-3 rounded-xl font-medium text-sm shadow-sm">
                            {isExporting ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-download"></i>} โหลด Excel
                        </button>
                    </div>

                    <div className="bg-slate-800 rounded-[2.5rem] p-8 text-white flex justify-between items-center shadow-lg relative overflow-hidden">
                        <div className="relative z-10">
                            <h3 className="text-slate-300 text-xs font-medium tracking-wide mb-1">ยอดจัดส่งสะสม (เดือนนี้)</h3>
                            <div className="flex items-baseline gap-3">
                                <span className="text-5xl font-bold">{totalMonthCount}</span>
                                <span className="text-slate-300 font-medium text-sm">รายการ</span>
                            </div>
                        </div>
                        <button onClick={forceRefresh} className="btn-smooth relative z-10 bg-white/10 p-3 rounded-full border border-white/10 hover:bg-white/20 transition-colors"><i className={`fa-solid fa-rotate-right text-sm ${isLoadingHistory ? 'animate-spin' : ''}`}></i></button>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-3">
                        <div className="bg-white rounded-[1.5rem] p-3 flex flex-col items-center justify-center border border-slate-100 soft-shadow">
                            <span className="text-[10px] font-medium text-slate-400 mb-1">รวมวันนี้</span><span className="text-xl font-bold text-slate-700">{todayTotal}</span>
                        </div>
                        <div className="bg-white rounded-[1.5rem] p-3 flex flex-col items-center justify-center border border-slate-100 soft-shadow">
                            <span className="text-[10px] font-medium text-slate-400 mb-1">ก่อนเที่ยง</span><span className="text-xl font-bold text-slate-700">{todayMorning}</span>
                        </div>
                        <div className="bg-white rounded-[1.5rem] p-3 flex flex-col items-center justify-center border border-slate-100 soft-shadow">
                            <span className="text-[10px] font-medium text-slate-400 mb-1">รอบบ่าย</span><span className="text-xl font-bold text-slate-700">{todayAfternoon}</span>
                        </div>
                        <div className="bg-white rounded-[1.5rem] p-3 flex flex-col items-center justify-center border border-slate-100 soft-shadow">
                            <span className="text-[10px] font-medium text-slate-400 mb-1">หลัง 18.00</span><span className="text-xl font-bold text-slate-700">{todayEvening}</span>
                        </div>
                    </div>

                    <div className="bg-white rounded-[2rem] overflow-hidden border border-slate-100 soft-shadow p-4">
                        <div className="mb-4">
                            <h3 className="text-sm font-bold text-slate-600">สถิติรายวัน</h3>
                        </div>
                        <div className="w-full h-56 relative">
                            <canvas ref={chartRef}></canvas>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('liff_profile_cache');
                return saved ? JSON.parse(saved) : null;
            });
            const [isLiffReady, setIsLiffReady] = useState(false);
            const [activeTab, setActiveTab] = useState('scan');
            const [refreshHistoryTrigger, setRefreshHistoryTrigger] = useState(0); 

            const wakeLockRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try { wakeLockRef.current = await navigator.wakeLock.request('screen'); } 
                    catch (err) {}
                }
            };

            useEffect(() => {
                const initLiff = async () => {
                    try {
                        await liff.init({ liffId: '2009934240-M2LO3My9' });
                        if (liff.isLoggedIn()) {
                            const profile = await liff.getProfile();
                            setUserProfile(profile);
                            localStorage.setItem('liff_profile_cache', JSON.stringify(profile));
                        } else {
                            setUserProfile(null);
                            localStorage.removeItem('liff_profile_cache');
                        }
                        setIsLiffReady(true);
                    } catch (err) {
                        console.error('LIFF init failed', err);
                        setIsLiffReady(true); 
                    }
                };
                initLiff();

                requestWakeLock();
                const handleVisibilityChange = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) wakeLockRef.current.release().catch(()=>{});
                };
            }, []);

            if (!isLiffReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#f1f5f9]">
                        <div className="w-10 h-10 border-2 border-slate-200 border-t-slate-800 rounded-full animate-spin mb-4"></div>
                    </div>
                );
            }

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#f1f5f9]">
                        <div className="bg-white p-8 rounded-[2.5rem] max-w-sm w-full text-center shadow-sm border border-slate-100">
                            <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-slate-100">
                                <i className="fa-solid fa-qrcode text-2xl text-slate-700"></i>
                            </div>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">สแกนส่งบิล</h2>
                            <p className="text-xs text-slate-500 mb-8 font-medium">เข้าสู่ระบบเพื่อเริ่มต้นใช้งาน</p>
                            
                            <button onClick={() => liff.login()} className="btn-smooth w-full bg-[#06C755] text-white font-medium py-3.5 rounded-xl shadow-sm flex items-center justify-center gap-2 text-sm">
                                <i className="fa-brands fa-line text-lg"></i> เข้าสู่ระบบด้วย LINE
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-28 relative">
                    <div className="bg-white/80 backdrop-blur-md px-6 py-4 flex items-center justify-between border-b border-slate-100 sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <img src={userProfile.pictureUrl} alt="profile" className="w-10 h-10 rounded-full border border-slate-200" />
                            <div className="flex flex-col">
                                <span className="text-sm font-bold text-slate-700">{userProfile.displayName}</span>
                            </div>
                        </div>
                        <button onClick={() => {liff.logout(); setUserProfile(null); localStorage.removeItem('liff_profile_cache');}} className="btn-smooth text-[10px] text-slate-500 bg-slate-50 hover:bg-slate-100 px-3 py-1.5 rounded-lg font-medium border border-slate-200">ออกจากระบบ</button>
                    </div>

                    <ScannerTab 
                        isActive={activeTab === 'scan'} 
                        userProfile={userProfile} 
                        onSaveSuccess={() => setRefreshHistoryTrigger(prev => prev + 1)} 
                    />
                    
                    <HistoryTab 
                        isActive={activeTab === 'history'} 
                        refreshTrigger={refreshHistoryTrigger} 
                    />

                    {/* เมนูล่างแบบมินิมอล (Docked / Floating Pill) */}
                    <div className="fixed bottom-6 left-0 right-0 z-40 flex justify-center px-6 pointer-events-none pb-[env(safe-area-inset-bottom)]">
                        <div className="bg-white/95 backdrop-blur-md p-1.5 rounded-full flex w-full max-w-[280px] pointer-events-auto shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-slate-100">
                            <button onClick={() => setActiveTab('scan')} className={`btn-smooth flex-1 flex justify-center items-center h-12 rounded-full transition-colors duration-200 ${activeTab === 'scan' ? 'bg-slate-100 text-slate-800' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-barcode text-sm"></i><span className="ml-2 font-medium text-[11px]">สแกนบิล</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`btn-smooth flex-1 flex justify-center items-center h-12 rounded-full transition-colors duration-200 ${activeTab === 'history' ? 'bg-slate-100 text-slate-800' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-chart-pie text-sm"></i><span className="ml-2 font-medium text-[11px]">สรุปยอด</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
