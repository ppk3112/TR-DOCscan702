<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดส่งเอกสาร</title>
    
    <meta name="apple-mobile-web-app-title" content="สแกนส่งบิล">
    <meta name="application-name" content="สแกนส่งบิล">
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" sizes="152x152" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">

    <script>
        (function() {
            var manifest = {
                "name": "สแกนส่งบิล",
                "short_name": "สแกนส่งบิล",
                "start_url": window.location.href,
                "display": "standalone",
                "background_color": "#ffffff",
                "theme_color": "#2563eb",
                "icons": [
                    { "src": "https://i.postimg.cc/SxDzdXD5/79162.jpg", "sizes": "192x192", "type": "image/jpeg" },
                    { "src": "https://i.postimg.cc/SxDzdXD5/79162.jpg", "sizes": "512x512", "type": "image/jpeg" }
                ]

            var blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
            var link = document.createElement('link');
            link.rel = 'manifest';
            link.href = URL.createObjectURL(blob);
            document.head.appendChild(link);
        })();

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            background-color: #f8fafc; /* Slate 50 - สีเทาอ่อนสะอาดตา */
            min-height: 100vh;
        }

        /* ปรับแต่ง Scrollbar ให้ดูเป็นทางการ */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        
        .btn-press {
            transition: transform 0.1s ease-in-out, background-color 0.2s;
        }
        .btn-press:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYAYulOU-9KV7t4y08pz_GhicwWL2S9laTWsRkTqHvo5Fk_UIbGPF_EI0-kHzyY1P57A/exec';

        const formatThaiDate = (dateString) => {
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return dateString;
            return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
        };

        const checkIsUrgent = (dateStr) => {
            if (!dateStr) return false;
            const targetDate = new Date(dateStr); targetDate.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
            return targetDate.getTime() <= tomorrow.getTime();
        };

        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
                if (navigator.vibrate) navigator.vibrate(200);
            } catch (e) {}
        };

        const playDuplicateVoice = () => {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance('บิลซ้ำค่ะ');
                    utterance.lang = 'th-TH'; 
                    const voices = window.speechSynthesis.getVoices();
                    const thaiVoice = voices.find(voice => voice.lang.includes('th'));
                    if (thaiVoice) utterance.voice = thaiVoice;
                    utterance.pitch = 1.3; utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) {}
        };

        const playSuccessBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } catch (e) {}
        };

        const handleCopyTextGlobal = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); alert("คัดลอกข้อความสำเร็จ"); } catch (err) { alert("ไม่สามารถคัดลอกได้"); }
            document.body.removeChild(textArea);
        };

        const ScannerTab = ({ isActive, userProfile, onSaveSuccess }) => {
            const [currentItems, setCurrentItems] = useState(() => {
                const savedBasket = localStorage.getItem('delivery_basket');
                return savedBasket ? JSON.parse(savedBasket) : [];
            });
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(() => {
                const now = new Date();
                now.setDate(now.getDate() + 2);
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            });
            
            const [deliveryType, setDeliveryType] = useState('DC');
            const [deliveryZone, setDeliveryZone] = useState('NORMAL'); 
            const [showZoneDropdown, setShowZoneDropdown] = useState(false); 
            
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);

            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastSavedMessage, setLastSavedMessage] = useState(() => localStorage.getItem('last_saved_message') || '');
            
            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            const [editIsUpcountry, setEditIsUpcountry] = useState(false); 

            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const dueDateRef = useRef(dueDate);
            const deliveryTypeRef = useRef(deliveryType);
            const deliveryZoneRef = useRef(deliveryZone);
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { deliveryTypeRef.current = deliveryType; }, [deliveryType]);
            useEffect(() => { deliveryZoneRef.current = deliveryZone; }, [deliveryZone]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);
            useEffect(() => { localStorage.setItem('delivery_basket', JSON.stringify(currentItems)); }, [currentItems]);

            useEffect(() => {
                const fetchAllCodes = async () => {
                    const cachedCodes = localStorage.getItem('all_sent_codes_backup');
                    if (cachedCodes) { try { setAllSentCodesCache(new Set(JSON.parse(cachedCodes))); } catch(e) {} }
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) return;
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            const uppercaseCodes = json.data.map(code => String(code).trim().toUpperCase());
                            setAllSentCodesCache(new Set(uppercaseCodes));
                            localStorage.setItem('all_sent_codes_backup', JSON.stringify(uppercaseCodes));
                        }
                    } catch (e) { console.error("Failed to fetch all codes", e); }
                };
                fetchAllCodes();
                
                return () => {
                    if (html5QrCodeRef.current && isScanning) {
                        html5QrCodeRef.current.stop().catch(() => {});
                    }
                }
            }, []);

            const checkDuplicate = useCallback((code) => {
                const cleanCode = String(code).trim().toUpperCase(); 
                if (currentItemsRef.current.some(item => String(item.code).trim().toUpperCase() === cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`ตรวจพบข้อมูลซ้ำ: บิล ${cleanCode} อยู่ในรายการแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                if (allSentCodesCacheRef.current.has(cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`ข้อมูลซ้ำในระบบ: บิล ${cleanCode} เคยถูกจัดส่งแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                return false;
            }, []);

            const startScanner = async () => {
                if (!window.Html5Qrcode) { alert('กำลังโหลดระบบสแกน กรุณารอสักครู่'); return; }
                const isLineApp = navigator.userAgent.indexOf("Line") > -1;
                if (isLineApp) alert("แจ้งเตือน: หากพบปัญหาเปิดกล้อง กรุณากดไอคอน '3 จุด' มุมขวาบน แล้วเลือก 'เปิดในเบราว์เซอร์เริ่มต้น'");

                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    const config = {
                        fps: 10,
                        qrbox: (vw, vh) => ({ width: Math.min(250, vw * 0.8), height: 150 }),
                        aspectRatio: 1.0, 
                        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                    };

                    html5QrCode.start(
                        { facingMode: "environment" }, config,
                        (decodedText) => {
                            if (lastScannedRef.current !== decodedText) {
                                lastScannedRef.current = decodedText;
                                
                                let finalCode = deliveryTypeRef.current === 'FACTORY' ? `${decodedText.trim()}(รับโรงตัด)` : decodedText.trim();
                                if (deliveryZoneRef.current === 'UPCOUNTRY') {
                                    finalCode += '(ตจว.)';
                                }

                                if (!checkDuplicate(finalCode)) {
                                    playBeep();
                                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                                }
                                setTimeout(() => { lastScannedRef.current = null }, 1500);
                            }
                        }, 
                        (err) => {}
                    ).catch((err) => { setIsScanning(false); alert("ไม่สามารถเปิดใช้งานกล้องได้ โปรดตรวจสอบสิทธิ์การเข้าถึง"); });
                }, 300);
            };

            const stopScanner = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        html5QrCodeRef.current.clear(); 
                        setIsScanning(false); setIsFlashlightOn(false);
                    }).catch(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const toggleFlashlight = async () => {
                if (html5QrCodeRef.current && isScanning) {
                    try {
                        const newState = !isFlashlightOn;
                        await html5QrCodeRef.current.applyVideoConstraints({ advanced: [{ torch: newState }] });
                        setIsFlashlightOn(newState);
                    } catch (error) { alert("อุปกรณ์หรือเบราว์เซอร์ไม่รองรับการเปิดไฟฉาย"); }
                }
            };

            const handleManualAdd = (e) => {
                e.preventDefault();
                let val = inputValue.trim();
                if (!val) return;

                if (val.length !== 4 && val.length !== 10) {
                    alert("รูปแบบไม่ถูกต้อง: กรุณาระบุเลขบิล 4 หรือ 10 หลัก");
                    return;
                }

                if (val.length === 4) {
                    const now = new Date();
                    const yy = String(now.getFullYear()).slice(-2);
                    const mm = String(now.getMonth() + 1).padStart(2, '0');
                    val = `${yy}${mm}00${val}`; 
                }

                let finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                if (deliveryZone === 'UPCOUNTRY') {
                    finalCode += '(ตจว.)';
                }

                if (!checkDuplicate(finalCode)) {
                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate }, ...prev]);
                }
                setInputValue('');
            };

            const saveEditItem = () => {
                if (editingIndex === null) return;
                const newItems = [...currentItems];
                
                let baseCode = newItems[editingIndex].code.replace('(รับโรงตัด)', '').replace('(ตจว.)', '').trim();
                let finalCode = editIsFactory ? `${baseCode}(รับโรงตัด)` : baseCode;
                if (editIsUpcountry) {
                    finalCode += '(ตจว.)';
                }

                const isDuplicate = newItems.some((item, idx) => idx !== editingIndex && String(item.code).trim().toUpperCase() === finalCode.toUpperCase());
                
                if (isDuplicate) { 
                    playDuplicateVoice();
                    setDuplicateWarning(`ไม่สามารถบันทึกได้: พบข้อมูลบิลซ้ำซ้อนในรายการ`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return; 
                }

                newItems[editingIndex] = { ...newItems[editingIndex], code: finalCode, dueDate: editDueDate };
                setCurrentItems(newItems);
                setEditingIndex(null);
            };

            const handleTypeToggle = (type) => {
                if (deliveryType === type) {
                    setShowZoneDropdown(!showZoneDropdown);
                } else {
                    setDeliveryType(type);
                    setDeliveryZone('NORMAL');
                    setShowZoneDropdown(false);
                }
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0) return;
                setIsSaving(true); setSaveSuccess(false);

                const now = new Date();
                const currentDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                const newBatch = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: [...currentItems], date: currentDateStr, time: currentTimeStr, 
                    dueDate: dueDate, timestamp: now.getTime(),
                    userId: userProfile ? userProfile.userId : null
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(newBatch)
                    });

                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("ข้อผิดพลาดจากเซิร์ฟเวอร์: การเชื่อมต่อล้มเหลว"); setIsSaving(false); return; }

                    const result = JSON.parse(text);
                    if (result.status === 'error') {
                        if (result.message === 'DUPLICATE_FOUND') { alert(`ตรวจสอบพบข้อมูลซ้ำซ้อนในระบบฐานข้อมูล!\nเลขที่บิล: ${result.duplicateCode}`); } 
                        else { alert("เกิดข้อผิดพลาด: " + result.message); }
                        setIsSaving(false); return; 
                    }

                    setCurrentItems([]); localStorage.removeItem('delivery_basket');
                    setSaveSuccess(true); playSuccessBeep();
                    
                    if (window.confetti) {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#2563eb', '#10b981', '#3b82f6'] });
                    }
                    
                    if (result.lineMessage) {
                        setLineMessageToCopy(result.lineMessage);
                        setLastSavedMessage(result.lineMessage); 
                        localStorage.setItem('last_saved_message', result.lineMessage);
                        setTimeout(() => { setShowCopyModal(true); }, 1500); 
                    }
                    
                    onSaveSuccess();
                    
                    const newCodesSet = new Set(allSentCodesCache);
                    newBatch.items.forEach(item => newCodesSet.add(item.code.trim().toUpperCase()));
                    setAllSentCodesCache(newCodesSet);

                    setTimeout(() => setSaveSuccess(false), 3000);
                } catch (error) { 
                    console.error("Save Error:", error);
                    alert(`ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ในขณะนี้`); 
                } finally { 
                    setIsSaving(false); 
                }
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {/* Modals & Overlays */}
                    {saveSuccess && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[150] flex flex-col items-center justify-center animate-in fade-in duration-300">
                            <div className="bg-white p-8 rounded-xl shadow-2xl flex flex-col items-center max-w-sm w-full mx-4 border border-slate-200">
                                <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-4">
                                    <i className="fa-solid fa-check text-4xl text-green-600"></i>
                                </div>
                                <h2 className="text-2xl font-bold text-slate-800 mb-2">บันทึกข้อมูลสำเร็จ</h2>
                                <p className="text-slate-500 text-center">ข้อมูลได้ถูกจัดส่งเข้าระบบเรียบร้อยแล้ว</p>
                            </div>
                        </div>
                    )}

                    {duplicateWarning && (
                        <div className="fixed top-4 left-4 right-4 z-[110] max-w-md mx-auto bg-red-50 border-l-4 border-red-500 p-4 rounded shadow-lg flex items-start gap-3 animate-in slide-in-from-top-4 fade-in">
                            <i className="fa-solid fa-circle-exclamation text-red-500 text-lg mt-0.5"></i>
                            <div className="flex-1 text-red-700 text-sm font-medium">{duplicateWarning}</div>
                        </div>
                    )}

                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-sm shadow-xl border border-slate-200">
                                <div className="text-center mb-4">
                                    <h3 className="text-xl font-bold text-slate-800">รายละเอียดการจัดส่ง</h3>
                                </div>
                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-lg mb-5 max-h-[40vh] overflow-y-auto text-left">
                                    <pre className="text-[13px] text-slate-700 whitespace-pre-wrap font-sans leading-relaxed">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-press flex-1 py-3 bg-white border border-slate-300 rounded-lg font-semibold text-slate-700 hover:bg-slate-50">ปิดหน้าต่าง</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-press flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold flex justify-center items-center gap-2"><i className="fa-solid fa-copy"></i> คัดลอกข้อความ</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showClearConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-sm shadow-xl border border-slate-200 text-center">
                                <div className="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fa-solid fa-trash-can text-2xl text-red-600"></i></div>
                                <h3 className="text-xl font-bold text-slate-800">ยืนยันการล้างข้อมูล</h3>
                                <p className="text-sm text-slate-500 mt-2 mb-6">รายการบิลที่สแกนไว้ทั้งหมดจะถูกลบออกจากระบบชั่วคราว</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowClearConfirmModal(false)} className="btn-press flex-1 py-3 bg-white border border-slate-300 rounded-lg font-semibold text-slate-700 hover:bg-slate-50">ยกเลิก</button>
                                    <button onClick={() => { setCurrentItems([]); setShowClearConfirmModal(false); }} className="btn-press flex-1 py-3 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold">ล้างข้อมูล</button>
                                </div>
                            </div>

                            </div>

                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">

                                <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fa-solid fa-paper-plane text-2xl text-blue-600"></i></div>
                                <h3 className="text-xl font-bold text-slate-800">ยืนยันการจัดส่งข้อมูล</h3>
                                <p className="text-sm text-slate-500 mt-2 mb-6">คุณกำลังจัดส่งข้อมูลจำนวน <span className="font-bold text-blue-600 text-base mx-1">{currentItems.length}</span> รายการเข้าระบบ</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowConfirmModal(false)} className="btn-press flex-1 py-3 bg-white border border-slate-300 rounded-lg font-semibold text-slate-700 hover:bg-slate-50">ตรวจสอบอีกครั้ง</button>
                                    <button onClick={() => { setShowConfirmModal(false); executeSaveBatch(); }} className="btn-press flex-1 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold">ยืนยันการจัดส่ง</button>

                    )}

                    {/* Main Content Grid */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* Left Side: Scanner & Form */}

                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                {/* Configuration Section */}
                                <div className="mb-5 border-b border-slate-100 pb-5">
                                    <div className="flex items-center justify-between mb-3">
                                        <label className="text-sm font-semibold text-slate-700 flex items-center gap-2">
                                            <i className="fa-solid fa-sliders text-slate-400"></i> ตั้งค่าการรับงาน

                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <div className="relative flex-1">
                                            <div className="flex bg-slate-100 p-1 rounded-lg border border-slate-200">
                                                <button onClick={() => handleTypeToggle('DC')} className={`btn-press flex-1 py-2.5 text-sm font-semibold rounded-md flex justify-center items-center transition-colors ${deliveryType === 'DC' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                                    คลังสินค้า (DC) {deliveryType === 'DC' && deliveryZone === 'UPCOUNTRY' && '(ตจว.)'}
                                                    {deliveryType === 'DC' && <i className={`fa-solid fa-chevron-down ml-2 text-[10px] transition-transform ${showZoneDropdown ? 'rotate-180' : ''}`}></i>}
                                                </button>
                                                <button onClick={() => handleTypeToggle('FACTORY')} className={`btn-press flex-1 py-2.5 text-sm font-semibold rounded-md flex justify-center items-center transition-colors ${deliveryType === 'FACTORY' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>
                                                    รับโรงตัด {deliveryType === 'FACTORY' && deliveryZone === 'UPCOUNTRY' && '(ตจว.)'}
                                                    {deliveryType === 'FACTORY' && <i className={`fa-solid fa-chevron-down ml-2 text-[10px] transition-transform ${showZoneDropdown ? 'rotate-180' : ''}`}></i>}

                                            {showZoneDropdown && (
                                                <div className="absolute top-full left-0 right-0 mt-2 p-1.5 bg-white border border-slate-200 rounded-lg shadow-lg z-20 flex gap-1 animate-in slide-in-from-top-1">
                                                    <button onClick={() => { setDeliveryZone('NORMAL'); setShowZoneDropdown(false); }} className={`flex-1 py-2.5 text-sm font-semibold rounded-md transition-colors ${deliveryZone === 'NORMAL' ? 'bg-slate-100 text-blue-600' : 'bg-white text-slate-600 hover:bg-slate-50'}`}>พื้นที่ปกติ</button>

                                {/* Scanner Section */}
                                <div className="space-y-5">

                                        <div className="relative rounded-xl border border-slate-300 bg-slate-900 shadow-inner overflow-hidden">
                                            <div id="reader" className="w-full h-[300px]"></div>
                                            <button onClick={stopScanner} className="absolute top-3 right-3 bg-black/50 text-white w-10 h-10 rounded-lg z-10 flex items-center justify-center hover:bg-black/70 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                                            <button onClick={toggleFlashlight} className={`absolute top-3 left-3 w-10 h-10 rounded-lg z-10 flex items-center justify-center transition-colors ${isFlashlightOn ? 'bg-yellow-400 text-black' : 'bg-black/50 text-white hover:bg-black/70'}`}><i className="fa-solid fa-bolt"></i></button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-4">
                                            <button onClick={startScanner} className="btn-press w-full h-[120px] bg-blue-50 hover:bg-blue-100 border-2 border-dashed border-blue-300 text-blue-600 rounded-xl flex flex-col items-center justify-center transition-colors group">
                                                <i className="fa-solid fa-camera text-4xl mb-2 text-blue-500 group-hover:scale-110 transition-transform"></i>
                                                <span className="font-semibold text-sm">แตะเพื่อเปิดกล้องสแกนบิล</span>
                                            </button>
                                            
                                            <div className="flex items-center gap-3">
                                                <div className="h-px bg-slate-200 flex-1"></div>
                                                <span className="text-xs text-slate-400 font-semibold uppercase">หรือกรอกด้วยตนเอง</span>
                                                <div className="h-px bg-slate-200 flex-1"></div>

                                            <form onSubmit={handleManualAdd} className="flex gap-2">
                                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="ระบุหมายเลขบิล..." className="flex-1 px-4 py-3 bg-white border border-slate-300 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm font-medium" />
                                                <button type="submit" className="btn-press px-5 py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm font-semibold transition-colors">เพิ่มรายการ</button>
                                            </form>
                                        </div>
                                    )}
                                </div>
                                
                                {lastSavedMessage && (
                                    <div className="mt-5 bg-slate-50 border border-slate-200 rounded-lg p-4 flex items-center justify-between">
                                        <div className="flex-1 pr-4">
                                            <span className="text-xs font-semibold text-slate-500 block mb-1">ประวัติล่าสุด</span>
                                            <h4 className="text-sm font-medium text-slate-800 truncate">บันทึกข้อมูลเรียบร้อยแล้ว</h4>
                                        </div>
                                        <button onClick={() => { setLineMessageToCopy(lastSavedMessage); setShowCopyModal(true); }} className="btn-press px-4 py-2 bg-white border border-slate-300 text-slate-700 rounded-md font-semibold text-xs hover:bg-slate-100">ดูรายละเอียด</button>
                                    </div>
                                )}
                            </div>

                            <div className={`p-5 rounded-xl border transition-colors duration-300 ${checkIsUrgent(dueDate) ? 'bg-red-50 border-red-200' : 'bg-white border-slate-200 shadow-sm'}`}>
                                <div className="flex items-center justify-between mb-3">
                                    <label className={`text-sm font-semibold flex items-center gap-2 ${checkIsUrgent(dueDate) ? 'text-red-700' : 'text-slate-700'}`}>
                                        <i className="fa-regular fa-calendar-check"></i> กำหนดการจัดส่ง
                                    </label>
                                    {checkIsUrgent(dueDate) && <span className="bg-red-100 text-red-700 border border-red-200 text-xs px-2 py-1 rounded-md font-semibold">งานด่วนพิเศษ</span>}
                                </div>
                                <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)} className={`w-full px-4 py-3 bg-white border rounded-lg outline-none text-base font-medium ${checkIsUrgent(dueDate) ? 'border-red-300 focus:ring-red-500 focus:border-red-500' : 'border-slate-300 focus:ring-blue-500 focus:border-blue-500'}`} />
                            </div>
                        </div>

                        {/* Right Side: List / Basket */}
                        <div className="lg:col-span-5 flex flex-col h-[500px] lg:h-[630px]">
                            <div className="flex flex-col bg-white rounded-xl shadow-sm border border-slate-200 relative flex-1 overflow-hidden">
                                {isSaving && <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center"><div className="w-10 h-10 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-3"></div><span className="font-semibold text-blue-700 text-sm">กำลังประมวลผล...</span></div>}
                                
                                <div className="flex justify-between items-center px-5 py-4 border-b border-slate-100 shrink-0 bg-slate-50">
                                    <h3 className="text-slate-800 font-bold text-base flex items-center gap-2">รายการเตรียมจัดส่ง</h3>
                                    <div className="flex items-center gap-3">
                                        {currentItems.length > 0 && <button onClick={() => setShowClearConfirmModal(true)} className="text-slate-400 hover:text-red-500 text-xs font-semibold transition-colors">ล้างทั้งหมด</button>}
                                        <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full">{currentItems.length} รายการ</span>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar bg-slate-50/50">
                                    {currentItems.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                            <i className="fa-solid fa-folder-open text-4xl mb-3 opacity-50"></i>
                                            <p className="font-medium text-sm">ยังไม่มีรายการบิลในระบบ</p>
                                        </div>
                                    ) : (
                                        currentItems.map((item, index) => {
                                            const isUrgent = checkIsUrgent(item.dueDate);
                                            const isFactory = item.code.includes('(รับโรงตัด)');
                                            const isUpcountry = item.code.includes('(ตจว.)'); 
                                            
                                            return (
                                                <div key={index} className="flex justify-between bg-white border border-slate-200 p-3.5 rounded-lg shadow-sm hover:border-blue-300 transition-colors animate-in slide-in-from-bottom-2 duration-200">
                                                    <div className="flex flex-col justify-center">
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <span className="font-semibold text-sm text-slate-800">{item.code}</span>
                                                        </div>
                                                        <div className="flex items-center flex-wrap gap-2 text-[11px]">
                                                            <span className="text-slate-500"><i className="fa-regular fa-calendar mr-1"></i>{formatThaiDate(item.dueDate)}</span>
                                                            {isUrgent && <span className="text-red-600 font-semibold bg-red-50 px-1.5 py-0.5 rounded border border-red-100">ด่วน</span>}
                                                            {isUpcountry && <span className="text-indigo-600 font-semibold bg-indigo-50 px-1.5 py-0.5 rounded border border-indigo-100">ตจว.</span>}
                                                            {isFactory && <span className="text-orange-600 font-semibold bg-orange-50 px-1.5 py-0.5 rounded border border-orange-100">โรงตัด</span>}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1 items-center">
                                                        <button onClick={() => { setEditingIndex(index); setEditDueDate(item.dueDate); setEditIsFactory(isFactory); setEditIsUpcountry(isUpcountry); }} className="text-slate-400 hover:text-blue-600 hover:bg-blue-50 w-8 h-8 rounded-md flex items-center justify-center transition-colors"><i className="fa-solid fa-pen text-xs"></i></button>
                                                        <button onClick={() => setCurrentItems(prev => prev.filter((_, i) => i !== index))} className="text-slate-400 hover:text-red-600 hover:bg-red-50 w-8 h-8 rounded-md flex items-center justify-center transition-colors"><i className="fa-solid fa-trash-can text-xs"></i></button>
                                                    </div>
                                                </div>
                                            )
                                        })
                                    )}
                                </div>
                                <div className="p-4 border-t border-slate-100 shrink-0 bg-white">
                                    <button onClick={() => setShowConfirmModal(true)} disabled={currentItems.length === 0 || isSaving} className="btn-press w-full py-3.5 rounded-lg font-bold text-base transition-colors flex justify-center items-center gap-2 disabled:cursor-not-allowed bg-blue-600 hover:bg-blue-700 text-white disabled:bg-slate-200 disabled:text-slate-400 shadow-sm disabled:shadow-none">
                                        <i className="fa-solid fa-paper-plane"></i> จัดส่งข้อมูลเข้าระบบ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const HistoryTab = ({ isActive, refreshTrigger }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [isFetchingSummary, setIsFetchingSummary] = useState(false); 
            
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastFetchedMonth, setLastFetchedMonth] = useState(null);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!isActive) return;

                const fetchHistory = async () => {
                    setIsLoadingHistory(true);
                    const cacheKey = `history_data_${selectedMonth}`;
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${selectedMonth}`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) throw new Error("Server error");
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            setMonthHistoryData(json.data);
                            localStorage.setItem(cacheKey, JSON.stringify(json.data));
                        }
                    } catch (error) { 
                        const cachedData = localStorage.getItem(cacheKey);
                        if (cachedData) { try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} }
                    } finally { 
                        setIsLoadingHistory(false); 
                        setLastFetchedMonth(selectedMonth);
                    }
                };

                if (selectedMonth !== lastFetchedMonth || refreshTrigger > 0) {
                    const cacheKey = `history_data_${selectedMonth}`;
                    const cachedData = localStorage.getItem(cacheKey);
                    if (cachedData && selectedMonth !== lastFetchedMonth) { 
                        try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} 
                    }
                    fetchHistory();
                }
            }, [isActive, selectedMonth, refreshTrigger]);

            const getMonthlyStats = () => {
                const year = parseInt(selectedMonth.split('-')[0]);
                const month = parseInt(selectedMonth.split('-')[1]);
                const daysInMonth = new Date(year, month, 0).getDate();
                
                const stats = Array.from({length: daysInMonth}, () => ({ 
                    morning:0, afternoon:0, evening:0, 
                    urgent:0, total:0, 
                    before1Day: 0, before2DaysPlus: 0, sameDay: 0, afterDue: 0,
                    evening_before1Day: 0, evening_before2Days: 0, evening_before3DaysPlus: 0, evening_afterDue: 0
                }));
                
                let totalMonthCount = 0;
                let todayTotal = 0, todayMorning = 0, todayAfternoon = 0, todayEvening = 0;
                const todayStr = new Date().toLocaleDateString('en-CA');

                const parseDateLocal = (dStr) => {
                    const parts = dStr.split('-');
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                };

                monthHistoryData.forEach(item => {
                    const day = parseInt(item.date.split('-')[2]) - 1;
                    const count = Number(item.count) || 0;
                    
                    if (day >= 0 && day < daysInMonth) {
                        totalMonthCount += count;
                        stats[day].total += count;

                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) stats[day].morning += count;
                        else if (hour < 18) stats[day].afternoon += count;
                        else stats[day].evening += count;

                        const scanDateObj = parseDateLocal(item.date);
                        const dueDateObj = parseDateLocal(item.dueDate);
                        
                        const diffTime = dueDateObj.getTime() - scanDateObj.getTime();
                        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                        if (hour < 18) {
                            if (diffDays === 1) stats[day].before1Day += count; 
                            else if (diffDays >= 2) stats[day].before2DaysPlus += count; 
                            else if (diffDays === 0) stats[day].sameDay += count;    
                            else if (diffDays < 0) stats[day].afterDue += count;   
                        } else {
                            if (diffDays === 1) stats[day].evening_before1Day += count;
                            else if (diffDays === 2) stats[day].evening_before2Days += count;
                            else if (diffDays >= 3) stats[day].evening_before3DaysPlus += count;
                            else if (diffDays < 0) stats[day].evening_afterDue += count;
                        }

                        const sendDate = new Date(item.date); sendDate.setHours(0,0,0,0);
                        const nextDay = new Date(sendDate); nextDay.setDate(sendDate.getDate() + 1);
                        const dDate = new Date(item.dueDate); dDate.setHours(0,0,0,0);
                        if (dDate.getTime() <= nextDay.getTime()) stats[day].urgent += count;
                    }

                    if (item.date === todayStr) {
                        todayTotal += count;
                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) todayMorning += count;
                        else if (hour < 18) todayAfternoon += count;
                        else todayEvening += count;
                    }
                });
                return { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening };
            };

            const { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening } = getMonthlyStats();

            useEffect(() => {
                if (!isActive || !chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();
                
                const ctx = chartRef.current.getContext('2d');
                const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
                const dataTotals = stats.map(d => d.total);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'ปริมาณจัดส่ง (รายการ)', data: dataTotals, backgroundColor: '#3b82f6', borderRadius: 4, barPercentage: 0.6 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: {family: "'Prompt', sans-serif", size: 10} }, grid: { color: '#f1f5f9' }, border: { display: false } }, x: { grid: { display: false }, ticks: { font: {family: "'Prompt', sans-serif", size: 10} }, border: { display: false } } }, animation: { duration: 800 } }
                });
            }, [stats, isActive, daysInMonth]);

            const handleExportExcel = async () => {
                if (!window.ExcelJS) { alert('ระบบกำลังโหลด กรุณารอสักครู่...'); return; }
                setIsExporting(true);
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('สรุปยอดส่งบิล');
                    const year = parseInt(selectedMonth.split('-')[0]);
                    const month = parseInt(selectedMonth.split('-')[1]);
                    const thaiMonth = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month-1];
                    const thaiYear = year + 543;

                    const compHeader = ['วันที่'];
                    const compTotal = ['จำนวนเที่ยวทั้งหมด'];
                    const compBefore1Day = ['ส่งบิลก่อนวันนัดส่ง 1 วัน (งานด่วน)'];
                    const compBefore2DaysPlus = ['ส่งบิลก่อนดิวส่ง 2 วันขึ้นไป'];
                    const compSameDay = ['ส่งบิลในวันนัดส่ง'];
                    const compAfterDue = ['ส่งบิลหลังคิวส่ง (ล่าช้า)'];
                    const compEvening = ['ส่งบิลหลัง 18.00 น. (รวม)'];
                    const compEvening_b1 = ['    - ดิวส่งล่วงหน้า 1 วัน'];
                    const compEvening_b2 = ['    - ดิวส่งล่วงหน้า 2 วัน'];
                    const compEvening_b3p = ['    - ดิวส่งล่วงหน้า 3 วันขึ้นไป'];
                    const compEvening_after = ['    - ดิวส่งล่าช้า (หลังคิวส่ง)'];

                    let sumTotal=0, sumCompBefore1Day=0, sumCompBefore2DaysPlus=0, sumCompSameDay=0, sumCompAfterDue=0;
                    let sumEvening=0, sumCompEvening_b1=0, sumCompEvening_b2=0, sumCompEvening_b3p=0, sumCompEvening_after=0;

                    for(let i=0; i<daysInMonth; i++) {
                        compHeader.push(i+1);
                        compTotal.push(stats[i].total); sumTotal += stats[i].total;
                        compBefore1Day.push(stats[i].before1Day); sumCompBefore1Day += stats[i].before1Day;
                        compBefore2DaysPlus.push(stats[i].before2DaysPlus); sumCompBefore2DaysPlus += stats[i].before2DaysPlus;
                        compSameDay.push(stats[i].sameDay); sumCompSameDay += stats[i].sameDay;
                        compAfterDue.push(stats[i].afterDue); sumCompAfterDue += stats[i].afterDue;
                        compEvening.push(stats[i].evening); sumEvening += stats[i].evening;
                        compEvening_b1.push(stats[i].evening_before1Day); sumCompEvening_b1 += stats[i].evening_before1Day;
                        compEvening_b2.push(stats[i].evening_before2Days); sumCompEvening_b2 += stats[i].evening_before2Days;
                        compEvening_b3p.push(stats[i].evening_before3DaysPlus); sumCompEvening_b3p += stats[i].evening_before3DaysPlus;
                        compEvening_after.push(stats[i].evening_afterDue); sumCompEvening_after += stats[i].evening_afterDue;
                    }

                    compHeader.push('Total');
                    compTotal.push(sumTotal);
                    compBefore1Day.push(sumCompBefore1Day);
                    compBefore2DaysPlus.push(sumCompBefore2DaysPlus);
                    compSameDay.push(sumCompSameDay);
                    compAfterDue.push(sumCompAfterDue);
                    compEvening.push(sumEvening);
                    compEvening_b1.push(sumCompEvening_b1);
                    compEvening_b2.push(sumCompEvening_b2);
                    compEvening_b3p.push(sumCompEvening_b3p);
                    compEvening_after.push(sumCompEvening_after);

                    sheet.addRow([`เดือน ${thaiMonth} ${thaiYear}`]);
                    const titleCell = sheet.getCell('A1');
                    titleCell.font = { name: 'Angsana New', bold: true, size: 16 };
                    sheet.mergeCells('A1:C1');

                    const rComp1 = sheet.addRow(compHeader);
                    const rComp2 = sheet.addRow(compTotal);
                    const rComp3 = sheet.addRow(compBefore1Day); 
                    const rComp4 = sheet.addRow(compBefore2DaysPlus); 
                    const rComp5 = sheet.addRow(compSameDay);
                    const rComp6 = sheet.addRow(compAfterDue);
                    const rComp7 = sheet.addRow(compEvening);
                    const rComp7_1 = sheet.addRow(compEvening_b1);
                    const rComp7_2 = sheet.addRow(compEvening_b2);
                    const rComp7_3 = sheet.addRow(compEvening_b3p);
                    const rComp7_4 = sheet.addRow(compEvening_after);

                    const styleCompRow = (row, bgArgb, fontColorArgb, isBold = false) => {
                        row.eachCell((cell, colNumber) => {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } };
                            cell.font = { name: 'Angsana New', size: 12, color: { argb: fontColorArgb }, bold: isBold };
                            cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                            cell.alignment = { vertical: 'middle', horizontal: colNumber === 1 ? 'left' : 'center' };
                        });
                        const lastColNumber = daysInMonth + 2;
                        const lastCell = row.getCell(lastColNumber);
                        lastCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFF00' } };
                        lastCell.font = { name: 'Angsana New', size: 12, color: { argb: fontColorArgb }, bold: true };
                    };

                    rComp1.eachCell((cell, colNumber) => {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB4C6E7' } };
                        cell.font = { name: 'Angsana New', size: 12, color: { argb: 'FF000000' }, bold: true };
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    });

                    styleCompRow(rComp2, 'FFFFFFFF', 'FFFF0000', true); 
                    rComp2.getCell(1).font = { name: 'Angsana New', size: 12, color: { argb: 'FF000000' }, bold: true }; 

                    styleCompRow(rComp3, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp4, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp5, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp6, 'FFFFFFFF', 'FF000000');

                    styleCompRow(rComp7, 'FFEFF6FF', 'FF1E40AF', true); 
                    styleCompRow(rComp7_1, 'FFFFFFFF', 'FF475569'); 
                    styleCompRow(rComp7_2, 'FFFFFFFF', 'FF475569');
                    styleCompRow(rComp7_3, 'FFFFFFFF', 'FF475569');
                    styleCompRow(rComp7_4, 'FFFFFFFF', 'FF475569');
                    
                    rComp7_1.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_2.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_3.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_4.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };

                    sheet.getColumn(1).width = 40; 
                    for(let i=2; i<=daysInMonth+1; i++) sheet.getColumn(i).width = 5; 
                    sheet.getColumn(daysInMonth+2).width = 8;

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    window.saveAs(blob, `สรุปยอดส่งบิล_${thaiMonth}_${thaiYear}.xlsx`);
                } catch (err) { alert('เกิดข้อผิดพลาดในการส่งออกไฟล์ Excel'); } finally { setIsExporting(false); }
            };

            const handleGetDailySummary = async () => {
                setIsFetchingSummary(true);
                try {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDailySummaryText&date=${todayStr}`);
                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("ข้อผิดพลาดเซิร์ฟเวอร์"); return; }
                    
                    const result = JSON.parse(text);
                    if (result.status === 'success') {
                        setLineMessageToCopy(result.data);
                        setShowCopyModal(true);
                    } else { alert("เกิดข้อผิดพลาดในการดึงข้อมูล"); }
                } catch (error) { alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้"); } finally { setIsFetchingSummary(false); }
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {/* Copy Modal */}
                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl p-6 w-full max-w-sm shadow-xl border border-slate-200">
                                <div className="text-center mb-4">
                                    <h3 className="text-xl font-bold text-slate-800">คัดลอกสรุปยอดรายวัน</h3>
                                </div>
                                <div className="bg-slate-50 border border-slate-200 p-4 rounded-lg mb-5 max-h-[40vh] overflow-y-auto text-left">
                                    <pre className="text-[13px] text-slate-700 whitespace-pre-wrap font-sans leading-relaxed">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-press flex-1 py-3 bg-white border border-slate-300 rounded-lg font-semibold text-slate-700 hover:bg-slate-50">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-press flex-1 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold flex justify-center items-center gap-2"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        {/* Daily Action Card */}
                        <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex items-center justify-between">
                            <div>
                                <h4 className="text-sm font-semibold text-slate-500 mb-1">ปฏิบัติงานประจำวัน</h4>
                                <span className="text-slate-800 font-bold text-lg">สรุปยอดวันนี้</span>
                            </div>
                            <button onClick={handleGetDailySummary} disabled={isFetchingSummary} className="btn-press px-5 py-2.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-lg font-semibold text-sm flex items-center gap-2 transition-colors">
                                {isFetchingSummary ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-file-lines"></i>} ดึงข้อความ
                            </button>
                        </div>
                        
                        {/* Filter & Export Card */}
                        <div className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm flex items-center justify-between gap-4">
                            <div className="flex-1">
                                <label className="text-[11px] font-semibold text-slate-500 uppercase block mb-1">เลือกรอบบิล (เดือน)</label>
                                <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="w-full bg-slate-50 border border-slate-200 text-sm font-semibold text-slate-800 outline-none rounded-md px-3 py-1.5 focus:border-blue-400" />
                            </div>
                            <button onClick={handleExportExcel} disabled={isLoadingHistory || isExporting} className="btn-press px-5 py-2.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-lg font-semibold text-sm flex items-center gap-2 transition-colors self-end">
                                {isExporting ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-file-excel"></i>} Excel
                            </button>
                        </div>
                    </div>

                    {/* Main Metrics Card */}
                    <div className="bg-blue-600 rounded-xl p-8 text-white flex justify-between items-center shadow-md relative overflow-hidden">
                        <div className="absolute -right-10 -top-10 text-white/10 text-[150px] pointer-events-none">
                            <i className="fa-solid fa-chart-simple"></i>
                        </div>
                        <div className="relative z-10">
                            <h3 className="text-blue-100 text-sm font-semibold mb-1">ยอดจัดส่งรวมสะสมประจำเดือน</h3>
                            <div className="flex items-baseline gap-3">
                                <span className="text-5xl font-bold">{totalMonthCount}</span>
                                <span className="text-blue-100 font-semibold text-lg">รายการ</span>
                            </div>
                        </div>
                        <button onClick={() => setLastFetchedMonth(null)} className="btn-press relative z-10 w-12 h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 rounded-full transition-colors"><i className={`fa-solid fa-rotate-right text-xl ${isLoadingHistory ? 'animate-spin' : ''}`}></i></button>
                    </div>
                    
                    {/* Sub Metrics Grid */}
                    <div className="grid grid-cols-4 gap-3">
                        <div className="bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <span className="text-[11px] font-semibold text-slate-500 mb-1">รวมวันนี้</span><span className="text-2xl font-bold text-slate-800">{todayTotal}</span>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <span className="text-[11px] font-semibold text-slate-500 mb-1">ช่วงเช้า</span><span className="text-2xl font-bold text-slate-800">{todayMorning}</span>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <span className="text-[11px] font-semibold text-slate-500 mb-1">ช่วงบ่าย</span><span className="text-2xl font-bold text-slate-800">{todayAfternoon}</span>
                        </div>
                        <div className="bg-white border border-slate-200 rounded-xl p-4 flex flex-col items-center justify-center shadow-sm">
                            <span className="text-[11px] font-semibold text-slate-500 mb-1">หลัง 18.00</span><span className="text-2xl font-bold text-slate-800">{todayEvening}</span>
                        </div>
                    </div>

                    {/* Chart Section */}
                    <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
                        <div className="px-5 py-4 border-b border-slate-100 bg-slate-50 flex items-center">
                            <h3 className="text-sm font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-chart-column text-slate-400"></i> กราฟแสดงผลการปฏิบัติงานรายวัน</h3>
                        </div>
                        <div className="p-5">
                            <div className="w-full h-64 relative">
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('liff_profile_cache');
                return saved ? JSON.parse(saved) : null;
            });
            const [isLiffReady, setIsLiffReady] = useState(false);
            const [activeTab, setActiveTab] = useState('scan');
            const [refreshHistoryTrigger, setRefreshHistoryTrigger] = useState(0); 

            const wakeLockRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try { wakeLockRef.current = await navigator.wakeLock.request('screen'); } 
                    catch (err) {}
                }
            };

            useEffect(() => {
                const initLiff = async () => {
                    try {
                        await liff.init({ liffId: '2009934240-M2LO3My9' });
                        if (liff.isLoggedIn()) {
                            const profile = await liff.getProfile();
                            setUserProfile(profile);
                            localStorage.setItem('liff_profile_cache', JSON.stringify(profile));
                        } else {
                            setUserProfile(null);
                            localStorage.removeItem('liff_profile_cache');
                        }
                        setIsLiffReady(true);
                    } catch (err) {
                        console.error('LIFF init failed', err);
                        setIsLiffReady(true); 
                    }
                };
                initLiff();

                requestWakeLock();
                const handleVisibilityChange = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) wakeLockRef.current.release().catch(()=>{});
                };
            }, []);

            if (!isLiffReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-500 font-semibold text-sm">กำลังเชื่อมต่อระบบ...</p>
                    </div>
                );
            }

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-slate-50">
                        <div className="bg-white border border-slate-200 p-8 rounded-2xl max-w-sm w-full text-center shadow-sm">
                            <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fa-solid fa-shield-halved text-4xl text-blue-600"></i>
                            </div>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">ระบบจัดการการจัดส่ง</h2>
                            <p className="text-sm text-slate-500 mb-8 font-medium">กรุณายืนยันตัวตนผ่านบัญชีองค์กรก่อนเข้าใช้งาน</p>
                            
                            <button onClick={() => liff.login()} className="btn-press w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-semibold py-3.5 rounded-lg flex items-center justify-center gap-3 text-base transition-colors">
                                <i className="fa-brands fa-line text-2xl"></i> เข้าสู่ระบบด้วย LINE
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-24 relative bg-slate-50">
                    {/* Header Top Bar */}
                    <div className="bg-white px-5 py-3 flex items-center justify-between border-b border-slate-200 sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <img src={userProfile.pictureUrl} alt="profile" className="w-9 h-9 rounded-full border border-slate-200" />
                            <div className="flex flex-col">
                                <span className="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">บัญชีผู้ใช้งาน</span>
                                <span className="text-sm font-bold text-slate-700">{userProfile.displayName}</span>
                            </div>
                        </div>
                        <button onClick={() => {liff.logout(); setUserProfile(null); localStorage.removeItem('liff_profile_cache');}} className="btn-press text-[11px] text-slate-500 bg-slate-100 hover:bg-slate-200 px-3 py-1.5 rounded-md font-semibold transition-colors">ออกจากระบบ</button>
                    </div>

                    <ScannerTab 
                        isActive={activeTab === 'scan'} 
                        userProfile={userProfile} 
                        onSaveSuccess={() => setRefreshHistoryTrigger(prev => prev + 1)} 
                    />
                    
                    <HistoryTab 
                        isActive={activeTab === 'history'} 
                        refreshTrigger={refreshHistoryTrigger} 
                    />

                    {/* Fixed Bottom Navigation (Corporate Style) */}
                    <div className="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-slate-200 pb-[env(safe-area-inset-bottom)]">
                        <div className="flex w-full max-w-md mx-auto">
                            <button onClick={() => setActiveTab('scan')} className={`flex-1 flex flex-col justify-center items-center h-16 transition-colors ${activeTab === 'scan' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-barcode text-xl mb-1"></i>
                                <span className="text-[10px] font-bold">สแกนข้อมูล</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex flex-col justify-center items-center h-16 transition-colors ${activeTab === 'history' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-chart-pie text-xl mb-1"></i>
                                <span className="text-[10px] font-bold">ประวัติและสรุปยอด</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
