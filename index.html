<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดส่งเอกสาร</title>
    
    <meta name="apple-mobile-web-app-title" content="สแกนส่งบิล">
    <meta name="application-name" content="สแกนส่งบิล">
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" sizes="152x152" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" sizes="167x167" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        input, button, select {
            outline: none !important;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes scaleIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .animate-scale-in {
            animation: scaleIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased hide-scrollbar">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ดึงจุดลงทะเบียนหรือค่าเริ่มต้นของเว็บแอป
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQpM_zJpBscbW83XzE7vU88wV_6iK3Gqg2gX-tVp1r/exec"; 

        // ส่วนประกอบ: แถบสแกนและการเพิ่มข้อมูลด้วยมือ
        function ScanTab({ userName, targetDate, setTargetDate, refreshHistory }) {
            const [inputValue, setInputValue] = useState('');
            const [deliveryType, setDeliveryType] = useState('DC');
            const [dueDate, setDueDate] = useState('');
            const [currentItems, setCurrentItems] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [successMsg, setSuccessMsg] = useState('');
            
            const inputRef = useRef(null);

            // ตั้งค่าดิวดีฟอลต์เป็นพรุ่งนี้
            useEffect(() => {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                setDueDate(tomorrow.toISOString().split('T')[0]);
            }, []);

            // โฟกัสไปที่ช่องรับค่าตลอดเวลาเพื่อรองรับการสแกนเนอร์
            useEffect(() => {
                if (inputRef.current) inputRef.current.focus();
            });

            const checkDuplicate = (code) => {
                const cleanCode = code.trim().toUpperCase();
                return currentItems.some(item => item.code.trim().toUpperCase() === cleanCode);
            };

            // ดักจับข้อมูลจากการสแกน (คีย์บอร์ดเสมือนจากหัวสแกน)
            const handleInputChange = (e) => {
                const val = e.target.value;
                setInputValue(val);

                // ตรวจจับเมื่อเจอเครื่องหมายเว้นวรรคหรือขึ้นบรรทัดใหม่จากเครื่องสแกน
                if (val.endsWith(' ') || val.endsWith('\n') || val.endsWith('\r')) {
                    processScannedValue(val);
                }
            };

            const processScannedValue = (rawVal) => {
                const cleaned = rawVal.trim();
                if (!cleaned) return;

                const finalCode = deliveryType === 'FACTORY' ? `${cleaned}(รับโรงตัด)` : cleaned;
                
                if (!checkDuplicate(finalCode)) {
                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate, type: deliveryType }, ...prev]);
                    setSuccessMsg(`เพิ่มรายการ ${finalCode} สำเร็จ`);
                    setTimeout(() => setSuccessMsg(''), 1500);
                } else {
                    setErrorMsg(`รายการ ${finalCode} ซ้ำในรายการปัจจุบัน`);
                    setTimeout(() => setErrorMsg(''), 2000);
                }
                setInputValue('');
            };

            // 🌟 [จุดที่ปรับปรุง] ฟังก์ชันสำหรับจัดการเพิ่มข้อมูลกรณีที่ "พิมพ์คีย์เอง" และกดปุ่ม + หรือ Enter
            const handleManualAdd = (e) => {
                e.preventDefault();
                let val = inputValue.trim();
                if (!val) return;

                // ตรวจสอบเงื่อนไข: ถ้าพนักงานพิมพ์ตัวเลขมา 4 หลักถ้วน ให้เติม ปี ค.ศ. (2 หลัก) + เดือน (2 หลัก) + 00 ทันที
                if (val.length === 4 && /^\d{4}$/.test(val)) {
                    const d = new Date();
                    const yy = String(d.getFullYear()).slice(-2); // ได้ปี ค.ศ. ปัจจุบันแบบ 2 หลัก (เช่น 26)
                    const mm = String(d.getMonth() + 1).padStart(2, '0'); // ได้เดือนปัจจุบันแบบ 2 หลัก (เช่น 05)
                    val = yy + mm + "00" + val; // ประกอบเข้าด้วยกันเป็นรูปแบบเต็ม 10 หลัก
                }

                const finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                
                if (!checkDuplicate(finalCode)) {
                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate, type: deliveryType }, ...prev]);
                    setSuccessMsg(`เพิ่มรายการ ${finalCode} สำเร็จ`);
                    setTimeout(() => setSuccessMsg(''), 1500);
                } else {
                    setErrorMsg(`รายการ ${finalCode} ซ้ำในรายการปัจจุบัน`);
                    setTimeout(() => setErrorMsg(''), 2000);
                }
                setInputValue('');
            };

            const removeItem = (index) => {
                setCurrentItems(prev => prev.filter((_, i) => i !== index));
            };

            const handleSaveAll = async () => {
                if (currentItems.length === 0) return;
                setIsLoading(true);
                setErrorMsg('');
                
                try {
                    const payload = {
                        date: targetDate,
                        userName: userName,
                        items: currentItems.map(item => ({
                            code: item.code,
                            type: item.type,
                            note: `ดิว ${item.dueDate.split('-')[2]}/${item.dueDate.split('-')[1]}`
                        }))
                    };

                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // เนื่องจากเป็นโหมด no-cors จะไม่สามารถอ่านผลตอบรับได้โดยตรง ให้ถือว่าสำเร็จหากไม่ throw error
                    setCurrentItems([]);
                    setSuccessMsg('บันทึกข้อมูลเรียบร้อยแล้ว');
                    if (refreshHistory) refreshHistory();
                    setTimeout(() => setSuccessMsg(''), 3000);
                } catch (err) {
                    setErrorMsg('เกิดข้อผิดพลาดในการบันทึกข้อมูล: ' + err.toString());
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="space-y-5 animate-scale-in pb-32">
                    {/* ส่วนหัวการตั้งค่าของฟอร์ม */}
                    <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-4">
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">วันที่เอกสารหลัก</label>
                                <input type="date" value={targetDate} onChange={(e) => setTargetDate(e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 h-12 text-sm font-medium focus:border-emerald-500 transition-all text-slate-700" />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-slate-500 mb-1.5">วันที่ดิว (สินค้าถึง)</label>
                                <input type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 h-12 text-sm font-medium focus:border-emerald-500 transition-all text-slate-700" />
                            </div>
                        </div>

                        <div>
                            <label className="block text-xs font-semibold text-slate-500 mb-1.5">ประเภทงานจัดส่ง</label>
                            <div className="grid grid-cols-2 gap-2 bg-slate-50 p-1 rounded-2xl border border-slate-100">
                                <button type="button" onClick={() => setDeliveryType('DC')} className={`h-10 rounded-xl text-xs font-bold transition-all ${deliveryType === 'DC' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>🏢 รับสินค้าที่ DC</button>
                                <button type="button" onClick={() => setDeliveryType('FACTORY')} className={`h-10 rounded-xl text-xs font-bold transition-all ${deliveryType === 'FACTORY' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>🏭 รับโรงตัด</button>
                            </div>
                        </div>
                    </div>

                    {/* ช่องรับค่าข้อมูลบาร์โค้ด */}
                    <div className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm space-y-3 relative">
                        <label className="block text-xs font-semibold text-slate-500">ยิงสแกนเนอร์ หรือ พิมพ์เลขเที่ยว</label>
                        <form onSubmit={handleManualAdd} className="flex gap-2">
                            <div className="relative flex-1">
                                <input 
                                    ref={inputRef}
                                    type="text" 
                                    value={inputValue}
                                    onChange={handleInputChange}
                                    placeholder="พิมพ์ 4 หลักท้าย หรือ เลขเต็ม..."
                                    className="w-full bg-slate-50 border border-slate-100 rounded-2xl pl-4 pr-10 h-12 text-sm font-bold tracking-wider focus:border-emerald-500 focus:bg-white transition-all text-slate-800"
                                />
                                <div className="absolute right-3.5 top-3.5 text-slate-400 text-sm">
                                    <i className="fa-solid fa-keyboard animate-pulse text-emerald-500"></i>
                                </div>
                            </div>
                            <button type="submit" className="w-12 h-12 bg-slate-900 text-white rounded-2xl flex justify-center items-center active:scale-95 transition-all shadow-md shadow-slate-900/10">
                                <i className="fa-solid fa-plus text-sm"></i>
                            </button>
                        </form>

                        {/* แจ้งเตือนย่อย */}
                        {errorMsg && <div className="bg-rose-50 text-rose-600 text-xs px-4 py-2.5 rounded-xl font-medium flex items-center gap-2"><i className="fa-solid fa-circle-exclamation"></i> {errorMsg}</div>}
                        {successMsg && <div className="bg-emerald-50 text-emerald-600 text-xs px-4 py-2.5 rounded-xl font-medium flex items-center gap-2"><i className="fa-solid fa-circle-check"></i> {successMsg}</div>}
                    </div>

                    {/* ตะกร้าแสดงรายการปัจจุบัน */}
                    <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                        <div className="px-5 py-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                            <span className="text-xs font-bold text-slate-500 flex items-center gap-2">📋 รายการที่พร้อมบันทึก</span>
                            <span className="bg-slate-200/70 text-slate-700 text-xs px-2.5 py-1 rounded-full font-bold">{currentItems.length} รายการ</span>
                        </div>

                        {currentItems.length === 0 ? (
                            <div className="p-10 text-center text-slate-400 space-y-2">
                                <i className="fa-solid fa-barcode text-3xl opacity-30"></i>
                                <p className="text-xs font-medium">ยังไม่มีข้อมูล ยิงสแกนเนอร์เพื่อเริ่มงาน</p>
                            </div>
                        ) : (
                            <div className="divide-y divide-slate-50 max-h-[300px] overflow-y-auto">
                                {currentItems.map((item, idx) => (
                                    <div key={idx} className="p-4 flex justify-between items-center hover:bg-slate-50/30 transition-all">
                                        <div className="space-y-1">
                                            <p className="text-sm font-bold tracking-wide text-slate-800">{item.code}</p>
                                            <div className="flex gap-1.5 items-center">
                                                <span className={`text-[10px] px-2 py-0.5 rounded-md font-bold ${item.type === 'DC' ? 'bg-blue-50 text-blue-600' : 'bg-amber-50 text-amber-600'}`}>
                                                    {item.type === 'DC' ? '🏢 DC' : '🏭 โรงตัด'}
                                                </span>
                                                <span className="text-[10px] text-slate-400 font-medium">ดิว: {item.dueDate.split('-')[2]}/{item.dueDate.split('-')[1]}</span>
                                            </div>
                                        </div>
                                        <button onClick={() => removeItem(idx)} className="w-8 h-8 text-slate-400 hover:text-rose-500 active:bg-rose-50 rounded-full flex justify-center items-center transition-all">
                                            <i className="fa-solid fa-trash-can text-xs"></i>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* ปุ่มใหญ่เพื่อกดบันทึกทั้งหมดลงฐานข้อมูล */}
                    {currentItems.length > 0 && (
                        <button 
                            onClick={handleSaveAll} 
                            disabled={isLoading}
                            className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold h-14 rounded-2xl flex justify-center items-center gap-2 shadow-lg shadow-emerald-600/20 active:scale-[0.99] transition-all disabled:opacity-50"
                        >
                            {isLoading ? (
                                <><i className="fa-solid fa-circle-notch animate-spin"></i> กำลังบันทึกข้อมูล...</>
                            ) : (
                                <><i className="fa-solid fa-cloud-arrow-up"></i> บันทึกข้อมูลเข้าคลัง ({currentItems.length})</>
                            )}
                        </button>
                    )}
                </div>
            );
        }

        // ส่วนประกอบ: รายการประวัติการส่งงานประจำวันนั้นๆ
        function HistoryTab({ isActive, refreshTrigger }) {
            return (
                <div className="space-y-4 animate-scale-in pb-32">
                    <div className="bg-amber-50 border border-amber-200/60 p-4 rounded-2xl text-amber-800 text-xs font-medium leading-relaxed flex gap-2.5">
                        <i className="fa-solid fa-circle-info text-sm mt-0.5"></i>
                        <span>ส่วนแสดงสรุปรายงาน สามารถตรวจยอดรวมรายวันและประวัติบิลย้อนหลังได้โดยตรงที่ห้องแชทไลน์กลุ่มหลักของระบบ</span>
                    </div>
                    <div className="bg-white p-8 rounded-3xl border border-slate-100 text-center text-slate-400 space-y-2 shadow-sm">
                        <i className="fa-solid fa-folder-open text-3xl opacity-30"></i>
                        <p className="text-xs font-medium">ดูประวัติแบบเรียลไทม์ผ่านบอทสรุปยอดรายวันในไลน์</p>
                    </div>
                </div>
            );
        }

        // ส่วนควบคุมหลัก (App Container)
        function App() {
            const [userName, setUserName] = useState('');
            const [isRegister, setIsRegister] = useState(false);
            const [activeTab, setActiveTab] = useState('scan');
            const [targetDate, setTargetDate] = useState('');
            const [refreshHistoryTrigger, setRefreshHistoryTrigger] = useState(0);

            useEffect(() => {
                // โหลดประวัติชื่อจากหน่วยความจำภายในเครื่องเพื่อความสะดวกสบายของผู้ใช้
                const savedName = localStorage.getItem('pj_courier_name');
                if (savedName) {
                    setUserName(savedName);
                    setIsRegister(true);
                }
                setTargetDate(new Date().toISOString().split('T')[0]);
            }, []);

            const handleRegisterSubmit = (e) => {
                e.preventDefault();
                if (!userName.trim()) return;
                localStorage.setItem('pj_courier_name', userName.trim());
                setIsRegister(true);
            };

            const handleLogout = () => {
                if (confirm('ต้องการเปลี่ยนชื่อผู้ใช้งานหรือไม่?')) {
                    localStorage.removeItem('pj_courier_name');
                    setUserName('');
                    setIsRegister(false);
                }
            };

            const triggerRefreshHistory = () => {
                setRefreshHistoryTrigger(prev => prev + 1);
            };

            // แสดงหน้าต่างลงทะเบียนชื่อผู้ใช้งานก่อนใช้งานระบบ
            if (!isRegister) {
                return (
                    <div className="min-h-screen flex justify-center items-center p-4 bg-slate-50">
                        <div className="w-full max-w-sm bg-white rounded-[32px] border border-slate-100 shadow-xl shadow-slate-200/50 p-6 space-y-6 animate-scale-in">
                            <div className="text-center space-y-2">
                                <div className="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex justify-center items-center text-2xl mx-auto shadow-inner">
                                    <i className="fa-solid fa-truck-ramp-box"></i>
                                </div>
                                <h1 className="text-xl font-bold text-slate-800">ระบบจัดส่งเอกสาร (PJ.)</h1>
                                <p className="text-xs font-medium text-slate-400">กรอกชื่อผู้บันทึกข้อมูลเพื่อเริ่มต้นใช้งานระบบ</p>
                            </div>

                            <form onSubmit={handleRegisterSubmit} className="space-y-4">
                                <div className="space-y-1.5">
                                    <label className="text-xs font-bold text-slate-500 pl-1">ชื่อผู้คีย์ข้อมูล / ชื่อเล่น</label>
                                    <input 
                                        type="text" 
                                        required
                                        value={userName}
                                        onChange={(e) => setUserName(e.target.value)}
                                        placeholder="ตัวอย่างเช่น: สมชาย, อาร์ท" 
                                        className="w-full bg-slate-50 border border-slate-100 focus:border-emerald-500 focus:bg-white rounded-2xl px-4 h-12 text-sm font-semibold transition-all text-slate-800"
                                    />
                                </div>
                                <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 active:scale-[0.98] transition-all text-white font-bold h-12 rounded-2xl text-sm shadow-md shadow-slate-900/10">
                                    เข้าสู่ระบบงาน <i className="fa-solid fa-arrow-right text-xs ml-1"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 max-w-md mx-auto relative px-4 pt-4">
                    {/* แถบด้านบน: แสดงข้อมูลผู้ใช้งาน */}
                    <div className="bg-white px-5 py-4 rounded-3xl border border-slate-100 shadow-sm flex justify-between items-center mb-4">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-slate-100 rounded-xl flex justify-center items-center text-slate-600 font-bold text-sm shadow-inner">
                                {userName.substring(0, 2).toUpperCase()}
                            </div>
                            <div>
                                <p className="text-xs text-slate-400 font-medium">ยินดีต้อนรับ</p>
                                <p className="text-sm font-bold text-slate-800 flex items-center gap-1.5">
                                    {userName} 
                                    <button onClick={handleLogout} className="text-slate-400 hover:text-rose-500 text-xs p-1"><i className="fa-solid fa-pen-to-square"></i></button>
                                </p>
                            </div>
                        </div>
                        <div className="bg-emerald-50 text-emerald-600 text-[10px] font-bold px-2.5 py-1 rounded-full flex items-center gap-1">
                            <i className="fa-solid fa-circle text-[6px] animate-pulse"></i> ออนไลน์
                        </div>
                    </div>

                    {/* แสดงแท็บคอนเทนต์ตามการเลือกแถบนำทาง */}
                    {activeTab === 'scan' ? (
                        <ScanTab 
                            userName={userName} 
                            targetDate={targetDate} 
                            setTargetDate={setTargetDate}
                            refreshHistory={triggerRefreshHistory}
                        />
                    ) : (
                        <HistoryTab 
                            isActive={activeTab === 'history'} 
                            refreshTrigger={refreshHistoryTrigger} 
                        />
                    )}

                    {/* แถบนำทางด้านล่างสไตล์ iOS */}
                    <div className="fixed bottom-6 left-0 right-0 z-40 pb-[env(safe-area-inset-bottom)] flex justify-center px-4 pointer-events-none">
                        <div className="bg-white/40 backdrop-blur-md border border-white/60 p-1.5 rounded-[30px] flex w-full max-w-[320px] pointer-events-auto shadow-lg">
                            <button onClick={() => setActiveTab('scan')} className={`flex-1 flex justify-center items-center h-14 rounded-[24px] transition-all ${activeTab === 'scan' ? 'bg-white/90 text-emerald-600 shadow-sm' : 'text-slate-600'}`}><i className="fa-solid fa-barcode text-xl"></i><span className="ml-2.5 font-bold text-sm">สแกนบิล</span></button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex justify-center items-center h-14 rounded-[24px] transition-all ${activeTab === 'history' ? 'bg-white/90 text-emerald-600 shadow-sm' : 'text-slate-600'}`}><i className="fa-solid fa-clipboard-list text-xl"></i><span className="ml-2.5 font-bold text-sm">สรุป</span></button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
