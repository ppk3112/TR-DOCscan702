            var manifest = {
                "name": "สแกนส่งบิล",

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            margin: 0;
            background-color: #f1f5f9; /* Slate-100: เทาอ่อนสว่างสบายตา */
            padding-bottom: env(safe-area-inset-bottom);
            min-height: 100vh;
        }

        /* เงาแบบฟุ้งกระจายนุ่มนวล (Soft Depth) */
        .soft-shadow {
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);

        /* แถบ Scrollbar โมเดิร์น */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        
        /* แอนิเมชันปุ่มยุบตัวเวลาสัมผัส */

            transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.15s ease;
        }
        .btn-bouncy:active {
            transform: scale(0.96);

        /* สไตล์กรอกข้อมูล (Input) */

            transition: all 0.2s;

<body class="text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYAYulOU-9KV7t4y08pz_GhicwWL2S9laTWsRkTqHvo5Fk_UIbGPF_EI0-kHzyY1P57A/exec';

        const formatThaiDate = (dateString) => {
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return dateString;
            return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
        };

        const checkIsUrgent = (dateStr) => {
            if (!dateStr) return false;
            const targetDate = new Date(dateStr); targetDate.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
            return targetDate.getTime() <= tomorrow.getTime();
        };

        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
                if (navigator.vibrate) navigator.vibrate(200);
            } catch (e) {}
        };

        const playDuplicateVoice = () => {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance('บิลซ้ำค่ะ');
                    utterance.lang = 'th-TH'; 
                    const voices = window.speechSynthesis.getVoices();
                    const thaiVoice = voices.find(voice => voice.lang.includes('th'));
                    if (thaiVoice) utterance.voice = thaiVoice;
                    utterance.pitch = 1.3; utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) {}
        };

        const playSuccessBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } catch (e) {}
        };

        const handleCopyTextGlobal = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); alert("คัดลอกข้อความสำเร็จ!"); } catch (err) { alert("ไม่สามารถคัดลอกได้"); }
            document.body.removeChild(textArea);
        };

        const ScannerTab = ({ isActive, userProfile, onSaveSuccess }) => {
            const [currentItems, setCurrentItems] = useState(() => {
                const savedBasket = localStorage.getItem('delivery_basket');
                return savedBasket ? JSON.parse(savedBasket) : [];
            });
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(() => {
                const now = new Date();
                now.setDate(now.getDate() + 2);
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            });
            
            const [deliveryType, setDeliveryType] = useState('DC');
            const [deliveryZone, setDeliveryZone] = useState('NORMAL'); 
            const [showZoneDropdown, setShowZoneDropdown] = useState(false); 
            
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);

            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastSavedMessage, setLastSavedMessage] = useState(() => localStorage.getItem('last_saved_message') || '');
            
            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            const [editIsUpcountry, setEditIsUpcountry] = useState(false); 

            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const dueDateRef = useRef(dueDate);
            const deliveryTypeRef = useRef(deliveryType);
            const deliveryZoneRef = useRef(deliveryZone);
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { deliveryTypeRef.current = deliveryType; }, [deliveryType]);
            useEffect(() => { deliveryZoneRef.current = deliveryZone; }, [deliveryZone]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);
            useEffect(() => { localStorage.setItem('delivery_basket', JSON.stringify(currentItems)); }, [currentItems]);

            useEffect(() => {
                const fetchAllCodes = async () => {
                    const cachedCodes = localStorage.getItem('all_sent_codes_backup');
                    if (cachedCodes) { try { setAllSentCodesCache(new Set(JSON.parse(cachedCodes))); } catch(e) {} }
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) return;
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            const uppercaseCodes = json.data.map(code => String(code).trim().toUpperCase());
                            setAllSentCodesCache(new Set(uppercaseCodes));
                            localStorage.setItem('all_sent_codes_backup', JSON.stringify(uppercaseCodes));
                        }
                    } catch (e) { console.error("Failed to fetch all codes", e); }
                };
                fetchAllCodes();
                
                return () => {
                    if (html5QrCodeRef.current && isScanning) {
                        html5QrCodeRef.current.stop().catch(() => {});
                    }
                }
            }, []);

            const checkDuplicate = useCallback((code) => {
                const cleanCode = String(code).trim().toUpperCase(); 
                if (currentItemsRef.current.some(item => String(item.code).trim().toUpperCase() === cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`บิล ${cleanCode} สแกนไปแล้วในตะกร้า!`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                if (allSentCodesCacheRef.current.has(cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`บิล ${cleanCode} เคยถูกส่งไปแล้วในระบบ!`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                return false;
            }, []);

            const startScanner = async () => {
                if (!window.Html5Qrcode) { alert('ระบบสแกนกำลังโหลด...'); return; }
                const isLineApp = navigator.userAgent.indexOf("Line") > -1;
                if (isLineApp) alert("แจ้งเตือน: หากพบปัญหาเปิดกล้อง กรุณากดไอคอน '3 จุด' มุมขวาบน แล้วเลือก 'เปิดใน Safari / Browser'");

                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    const config = {
                        fps: 10,
                        qrbox: (vw, vh) => ({ width: Math.min(250, vw * 0.8), height: 150 }),
                        aspectRatio: 1.0, 
                        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                    };

                    html5QrCode.start(
                        { facingMode: "environment" }, config,
                        (decodedText) => {
                            if (lastScannedRef.current !== decodedText) {
                                lastScannedRef.current = decodedText;
                                
                                let finalCode = deliveryTypeRef.current === 'FACTORY' ? `${decodedText.trim()}(รับโรงตัด)` : decodedText.trim();
                                if (deliveryZoneRef.current === 'UPCOUNTRY') {
                                    finalCode += '(ตจว.)';
                                }

                                if (!checkDuplicate(finalCode)) {
                                    playBeep();
                                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                                }
                                setTimeout(() => { lastScannedRef.current = null }, 1500);
                            }
                        }, 
                        (err) => {}
                    ).catch((err) => { setIsScanning(false); alert("ไม่สามารถเปิดใช้งานกล้องได้ โปรดอนุญาตสิทธิ์การใช้กล้อง"); });
                }, 300);
            };

            const stopScanner = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        html5QrCodeRef.current.clear(); 
                        setIsScanning(false); setIsFlashlightOn(false);
                    }).catch(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const toggleFlashlight = async () => {
                if (html5QrCodeRef.current && isScanning) {
                    try {
                        const newState = !isFlashlightOn;
                        await html5QrCodeRef.current.applyVideoConstraints({ advanced: [{ torch: newState }] });
                        setIsFlashlightOn(newState);
                    } catch (error) { alert("อุปกรณ์ไม่รองรับการเปิดไฟฉายผ่านเบราว์เซอร์"); }
                }
            };

            const handleManualAdd = (e) => {
                e.preventDefault();
                let val = inputValue.trim();
                if (!val) return;

                if (val.length !== 4 && val.length !== 10) {
                    alert("กรุณาระบุเลขบิล 4 หรือ 10 หลัก");
                    return;
                }

                if (val.length === 4) {
                    const now = new Date();
                    const yy = String(now.getFullYear()).slice(-2);
                    const mm = String(now.getMonth() + 1).padStart(2, '0');
                    val = `${yy}${mm}00${val}`; 
                }

                let finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                if (deliveryZone === 'UPCOUNTRY') {
                    finalCode += '(ตจว.)';
                }

                if (!checkDuplicate(finalCode)) {
                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate }, ...prev]);
                }
                setInputValue('');
            };

            const saveEditItem = () => {
                if (editingIndex === null) return;
                const newItems = [...currentItems];
                
                let baseCode = newItems[editingIndex].code.replace('(รับโรงตัด)', '').replace('(ตจว.)', '').trim();
                let finalCode = editIsFactory ? `${baseCode}(รับโรงตัด)` : baseCode;
                if (editIsUpcountry) {
                    finalCode += '(ตจว.)';
                }

                const isDuplicate = newItems.some((item, idx) => idx !== editingIndex && String(item.code).trim().toUpperCase() === finalCode.toUpperCase());
                
                if (isDuplicate) { 
                    playDuplicateVoice();
                    setDuplicateWarning(`แก้ประเภทไม่ได้! บิลนี้มีอยู่ในตะกร้าแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return; 
                }

                newItems[editingIndex] = { ...newItems[editingIndex], code: finalCode, dueDate: editDueDate };
                setCurrentItems(newItems);
                setEditingIndex(null);
            };

            const handleTypeToggle = (type) => {
                if (deliveryType === type) {
                    setShowZoneDropdown(!showZoneDropdown);
                } else {
                    setDeliveryType(type);
                    setDeliveryZone('NORMAL');
                    setShowZoneDropdown(false);
                }
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0) return;
                setIsSaving(true); setSaveSuccess(false);

                const now = new Date();
                const currentDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                const newBatch = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: [...currentItems], date: currentDateStr, time: currentTimeStr, 
                    dueDate: dueDate, timestamp: now.getTime(),
                    userId: userProfile ? userProfile.userId : null
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(newBatch)
                    });

                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("เซิร์ฟเวอร์ตอบกลับผิดพลาด (URL อาจหมดอายุ)"); setIsSaving(false); return; }

                    const result = JSON.parse(text);
                    if (result.status === 'error') {
                        if (result.message === 'DUPLICATE_FOUND') { alert(`ตรวจพบการซ้ำซ้อนในฐานข้อมูล!\nบิลเลขที่: ${result.duplicateCode}`); } 
                        else { alert("เกิดข้อผิดพลาด: " + result.message); }
                        setIsSaving(false); return; 
                    }

                    setCurrentItems([]); localStorage.removeItem('delivery_basket');
                    setSaveSuccess(true); playSuccessBeep();
                    
                    if (window.confetti) {
                        confetti({
                            particleCount: 100, spread: 70, origin: { y: 0.6 },
                            colors: ['#3b82f6', '#10b981', '#f59e0b']
                        });
                    }
                    
                    if (result.lineMessage) {
                        setLineMessageToCopy(result.lineMessage);
                        setLastSavedMessage(result.lineMessage); 
                        localStorage.setItem('last_saved_message', result.lineMessage);
                        setTimeout(() => { setShowCopyModal(true); }, 1500); 
                    }
                    
                    onSaveSuccess();
                    
                    const newCodesSet = new Set(allSentCodesCache);
                    newBatch.items.forEach(item => newCodesSet.add(item.code.trim().toUpperCase()));
                    setAllSentCodesCache(newCodesSet);

                    setTimeout(() => setSaveSuccess(false), 3000);
                } catch (error) { alert(`การเชื่อมต่อล้มเหลว`); } finally { setIsSaving(false); }
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {/* Modals & Overlays */}
                    {saveSuccess && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] flex flex-col items-center justify-center animate-in fade-in duration-300">
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl flex flex-col items-center animate-in zoom-in-95 duration-300 w-full max-w-xs mx-4">
                                <div className="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mb-5 animate-bounce">
                                    <i className="fa-solid fa-check text-4xl text-emerald-600"></i>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-1">สำเร็จ!</h2>
                                <p className="text-slate-500 text-sm font-medium">บันทึกข้อมูลเข้าระบบเรียบร้อย</p>
                            </div>
                        </div>
                    )}

                    {duplicateWarning && (
                        <div className="fixed top-5 left-4 right-4 z-[110] bg-white border border-red-200 p-4 rounded-[1.5rem] shadow-lg flex items-center gap-3 animate-in slide-in-from-top-10 fade-in duration-300">
                            <div className="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center shrink-0"><i className="fa-solid fa-triangle-exclamation text-lg"></i></div>
                            <div className="flex-1 font-bold text-red-600 text-sm">{duplicateWarning}</div>
                        </div>
                    )}

                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-200 border border-slate-100">
                                <div className="text-center mb-4 border-b border-slate-100 pb-4">
                                    <h3 className="text-lg font-black text-slate-800">คัดลอกข้อความแจ้งเตือน</h3>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-[1.5rem] mb-5 max-h-[40vh] overflow-y-auto text-left border border-slate-200">
                                    <pre className="text-[13px] text-slate-700 whitespace-pre-wrap font-sans leading-relaxed">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-bouncy flex-1 py-3.5 bg-white border border-slate-200 text-slate-600 rounded-[1rem] font-bold text-sm">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-bouncy flex-1 py-3.5 bg-blue-600 hover:bg-blue-700 text-white rounded-[1rem] font-bold shadow-md flex justify-center items-center gap-2 text-sm"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showClearConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-8 w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-200 text-center border border-slate-100">
                                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i className="fa-solid fa-trash-can text-2xl"></i></div>
                                <h3 className="text-xl font-black text-slate-800">ยืนยันล้างตะกร้า?</h3>
                                <p className="text-sm text-slate-500 mt-2 mb-6">ข้อมูลบิลทั้งหมดจะถูกลบทิ้งชั่วคราว</p>
                                <div className="flex gap-3">

                                    <button onClick={() => { setCurrentItems([]); setShowClearConfirmModal(false); }} className="btn-bouncy flex-1 py-3.5 bg-red-500 hover:bg-red-600 text-white rounded-[1rem] font-bold shadow-md text-sm">ล้างทั้งหมด</button>

                    {editingIndex !== null && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95 duration-200 border border-slate-100">
                                <div className="flex justify-between items-center mb-5 border-b border-slate-100 pb-4">
                                    <h3 className="text-lg font-black text-slate-800 flex items-center gap-2"><div className="w-8 h-8 bg-blue-50 text-blue-500 rounded-lg flex justify-center items-center"><i className="fa-solid fa-pen-to-square text-[13px]"></i></div> แก้ไขข้อมูลบิล</h3>
                                    <button onClick={() => setEditingIndex(null)} className="btn-bouncy bg-slate-50 w-8 h-8 rounded-full text-slate-400 hover:bg-slate-100"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                                <div className="space-y-5 mb-6">
                                    <div>
                                        <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 block ml-1">ประเภทการรับ</label>
                                        <div className="flex bg-slate-50 p-1.5 rounded-xl gap-1 border border-slate-100">
                                            <button type="button" onClick={() => setEditIsFactory(false)} className={`btn-bouncy flex-1 py-2.5 text-sm font-bold rounded-lg transition-colors ${!editIsFactory ? 'bg-white text-blue-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'}`}>DC</button>
                                            <button type="button" onClick={() => setEditIsFactory(true)} className={`btn-bouncy flex-1 py-2.5 text-sm font-bold rounded-lg transition-colors ${editIsFactory ? 'bg-white text-orange-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'}`}>โรงตัด</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 block ml-1">โซนพื้นที่</label>
                                        <div className="flex bg-slate-50 p-1.5 rounded-xl gap-1 border border-slate-100">
                                            <button type="button" onClick={() => setEditIsUpcountry(false)} className={`btn-bouncy flex-1 py-2.5 text-sm font-bold rounded-lg transition-colors ${!editIsUpcountry ? 'bg-white text-slate-800 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'}`}>พื้นที่ปกติ</button>
                                            <button type="button" onClick={() => setEditIsUpcountry(true)} className={`btn-bouncy flex-1 py-2.5 text-sm font-bold rounded-lg transition-colors ${editIsUpcountry ? 'bg-white text-purple-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'}`}>ตจว.</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2 block ml-1">วันที่กำหนดส่ง</label>
                                        <input type="date" value={editDueDate} onChange={(e) => setEditDueDate(e.target.value)} className="w-full px-4 py-3 bg-slate-50 focus:bg-white border border-slate-200 rounded-xl outline-none font-medium text-slate-700 focus:border-blue-400 focus:ring-1 focus:ring-blue-400 input-focus" />
                                    </div>
                                </div>
                                <button onClick={saveEditItem} className="btn-bouncy w-full py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold text-base shadow-md">บันทึกการแก้ไข</button>
                            </div>
                        </div>
                    )}

                    {/* Layout โครงสร้างหลักแบบ 2 คอลัมน์ */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* ฝั่งซ้าย: ส่วนสแกนและกรอกข้อมูล */}
                        <div className="lg:col-span-7 space-y-5">
                            
                            <div className="bg-white p-5 rounded-[2rem] soft-shadow border border-slate-100">
                                {/* การตั้งค่ารูปแบบงาน */}
                                <div className="mb-5 relative border-b border-slate-50 pb-5">
                                    <div className="flex bg-slate-50 p-1.5 rounded-xl gap-1 border border-slate-100">
                                        <button onClick={() => handleTypeToggle('DC')} className={`btn-bouncy flex-1 py-3 font-bold rounded-lg flex justify-center items-center text-sm transition-colors ${deliveryType === 'DC' ? 'bg-white text-blue-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'}`}>
                                            <i className="fa-solid fa-box-open mr-1.5"></i> DC {deliveryType === 'DC' && deliveryZone === 'UPCOUNTRY' && '(ตจว.)'}
                                            {deliveryType === 'DC' && <i className={`fa-solid fa-chevron-down ml-2 text-[10px] transition-transform ${showZoneDropdown ? 'rotate-180' : ''}`}></i>}
                                        </button>
                                        <button onClick={() => handleTypeToggle('FACTORY')} className={`btn-bouncy flex-1 py-3 font-bold rounded-lg flex justify-center items-center text-sm transition-colors ${deliveryType === 'FACTORY' ? 'bg-white text-orange-600 shadow-sm border border-slate-200' : 'text-slate-500 hover:bg-slate-100'}`}>
                                            <i className="fa-solid fa-scissors mr-1.5"></i> โรงตัด {deliveryType === 'FACTORY' && deliveryZone === 'UPCOUNTRY' && '(ตจว.)'}
                                            {deliveryType === 'FACTORY' && <i className={`fa-solid fa-chevron-down ml-2 text-[10px] transition-transform ${showZoneDropdown ? 'rotate-180' : ''}`}></i>}
                                        </button>
                                    </div>
                                    
                                    {showZoneDropdown && (
                                        <div className="absolute top-full left-0 right-0 mt-2 p-1.5 bg-white rounded-xl shadow-lg border border-slate-100 z-20 flex gap-1 animate-in slide-in-from-top-2">
                                            <button onClick={() => { setDeliveryZone('NORMAL'); setShowZoneDropdown(false); }} className={`btn-bouncy flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${deliveryZone === 'NORMAL' ? 'bg-slate-800 text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}>พื้นที่ปกติ</button>
                                            <button onClick={() => { setDeliveryZone('UPCOUNTRY'); setShowZoneDropdown(false); }} className={`btn-bouncy flex-1 py-2.5 text-sm font-bold rounded-lg transition-all ${deliveryZone === 'UPCOUNTRY' ? 'bg-purple-50 text-purple-600 border border-purple-100' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}><i className="fa-solid fa-truck-fast mr-1"></i> งาน ตจว.</button>
                                        </div>
                                    )}
                                </div>
                                
                                {/* กล้องสแกน & กรอกข้อมูล */}
                                <div className="space-y-4">
                                    {isScanning ? (
                                        <div className="relative rounded-[1.5rem] border border-slate-200 bg-slate-900 overflow-hidden shadow-inner">
                                            <div id="reader" className="w-full h-[280px]"></div>
                                            <button onClick={stopScanner} className="btn-bouncy absolute top-3 right-3 bg-white/20 backdrop-blur-md text-white w-10 h-10 rounded-full z-10 hover:bg-white/30 transition-colors"><i className="fa-solid fa-xmark"></i></button>
                                            <button onClick={toggleFlashlight} className={`btn-bouncy absolute top-3 left-3 w-10 h-10 rounded-full z-10 backdrop-blur-md transition-colors ${isFlashlightOn ? 'bg-yellow-400 text-slate-900' : 'bg-white/20 text-white hover:bg-white/30'}`}><i className="fa-solid fa-bolt"></i></button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-3">
                                            <button onClick={startScanner} className="btn-bouncy w-full h-[120px] bg-slate-50 hover:bg-blue-50 border-2 border-dashed border-slate-200 hover:border-blue-300 text-slate-500 hover:text-blue-600 rounded-[1.5rem] flex flex-col items-center justify-center transition-colors group">
                                                <i className="fa-solid fa-barcode text-4xl mb-2 group-hover:scale-110 transition-transform duration-300"></i>
                                                <span className="font-bold text-sm">สแกนบาร์โค้ดบิล</span>
                                            </button>
                                            
                                            <form onSubmit={handleManualAdd} className="flex gap-2">
                                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="พิมพ์เลขบิล 4 หรือ 10 หลัก..." className="flex-1 px-5 bg-slate-50 focus:bg-white border border-slate-200 rounded-xl outline-none text-sm font-bold h-[52px] placeholder-slate-400 input-focus" />
                                                <button type="submit" className="btn-bouncy w-[52px] h-[52px] bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-lg flex items-center justify-center shadow-sm transition-colors"><i className="fa-solid fa-plus font-bold"></i></button>
                                            </form>
                                        </div>
                                    )}
                                </div>
                                
                                {lastSavedMessage && (
                                    <div className="mt-5 pt-4 border-t border-slate-100 flex items-center justify-between">
                                        <div className="flex-1 pr-3">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">สถานะล่าสุด</div>
                                            <h4 className="text-sm font-bold text-slate-700 truncate">บันทึกข้อความสำเร็จแล้ว</h4>
                                        </div>
                                        <button onClick={() => { setLineMessageToCopy(lastSavedMessage); setShowCopyModal(true); }} className="btn-bouncy px-4 py-2 bg-slate-50 text-slate-600 border border-slate-200 rounded-lg font-bold text-xs hover:bg-slate-100 transition-colors"><i className="fa-solid fa-eye mr-1"></i> ดูข้อความ</button>
                                    </div>
                                )}
                            </div>

                            {/* วันที่ส่งมอบ */}
                            <div className={`p-5 rounded-[2rem] border transition-colors duration-300 soft-shadow ${checkIsUrgent(dueDate) ? 'bg-red-50/50 border-red-100' : 'bg-white border-slate-100'}`}>
                                <div className="flex items-center justify-between mb-3">
                                    <label className={`text-sm font-bold flex items-center gap-2 ${checkIsUrgent(dueDate) ? 'text-red-600' : 'text-slate-800'}`}><i className="fa-regular fa-calendar-check text-lg"></i> วันที่กำหนดส่ง</label>
                                    {checkIsUrgent(dueDate) && <span className="bg-red-100 text-red-600 text-[10px] px-2.5 py-1 rounded-md font-bold border border-red-200">งานด่วน</span>}
                                </div>
                                <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full px-5 py-3.5 bg-slate-50 focus:bg-white border border-slate-200 rounded-xl outline-none font-bold text-slate-800 text-base input-focus" />
                            </div>
                        </div>

                        {/* ฝั่งขวา: ตะกร้าบิล (ล็อคความสูง มี Scrollbar) */}
                        <div className="lg:col-span-5 flex flex-col h-[500px] lg:h-[600px]">
                            <div className="flex flex-col bg-white rounded-[2rem] p-2 soft-shadow border border-slate-100 relative flex-1 overflow-hidden">
                                {isSaving && <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center rounded-[2rem]"><div className="w-12 h-12 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin mb-3"></div><span className="font-bold text-slate-600 text-sm">กำลังประมวลผล...</span></div>}
                                
                                {/* Header ตะกร้า */}
                                <div className="flex justify-between items-center px-4 py-4 shrink-0 bg-white z-10 border-b border-slate-100 mb-2">
                                    <h3 className="text-slate-800 font-black text-lg flex items-center gap-2">ตะกร้ารอส่ง</h3>
                                    <div className="flex items-center gap-2">
                                        {currentItems.length > 0 && <button onClick={() => setShowClearConfirmModal(true)} className="btn-bouncy text-slate-400 hover:text-red-500 text-xs font-bold px-2 py-1"><i className="fa-solid fa-trash-can"></i> ล้าง</button>}
                                        <span className="bg-slate-800 text-white text-[11px] font-bold px-3 py-1.5 rounded-lg">{currentItems.length} รายการ</span>
                                    </div>
                                </div>
                                
                                {/* 🟢 พื้นที่ Scroll (ตะกร้าที่ถูกล็อกความสูง) 🟢 */}
                                <div className="flex-1 overflow-y-auto bg-slate-50/50 rounded-[1.5rem] p-3 space-y-2.5 custom-scrollbar border border-slate-100">
                                    {currentItems.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400 opacity-60">
                                            <i className="fa-solid fa-inbox text-5xl mb-3"></i>
                                            <p className="font-medium text-sm">ยังไม่มีบิลในตะกร้า</p>
                                        </div>
                                    ) : (
                                        currentItems.map((item, index) => {
                                            const isUrgent = checkIsUrgent(item.dueDate);
                                            const isFactory = item.code.includes('(รับโรงตัด)');
                                            const isUpcountry = item.code.includes('(ตจว.)');
                                            return (
                                                <div key={index} className="flex justify-between bg-white border border-slate-200 p-4 rounded-xl shadow-sm hover:border-slate-300 hover:shadow-md transition-all animate-in slide-in-from-bottom-2">
                                                    <div className="flex flex-col justify-center">
                                                        <span className="font-bold text-[15px] text-slate-800 tracking-wide mb-1">{item.code.replace('(รับโรงตัด)','').replace('(ตจว.)','').trim()}</span>
                                                        <div className="flex items-center flex-wrap gap-1.5 mt-1">
                                                            {/* 🟢 ป้ายแท็กแยกสี DC (ฟ้า) / โรงตัด (ส้ม) แบบอ่านง่าย 🟢 */}
                                                            {isFactory ? (
                                                                <span className="text-[10px] bg-orange-50 text-orange-600 border border-orange-100 px-2 py-0.5 rounded-md font-bold">โรงตัด</span>
                                                            ) : (
                                                                <span className="text-[10px] bg-blue-50 text-blue-600 border border-blue-100 px-2 py-0.5 rounded-md font-bold">DC</span>
                                                            )}

                                                            <span className={`text-[10px] font-medium px-2 py-0.5 rounded-md border ${isUrgent ? 'bg-red-50 text-red-600 border-red-100 font-bold' : 'bg-slate-50 text-slate-500 border-slate-200'}`}>ดิว: {formatThaiDate(item.dueDate)}</span>
                                                            
                                                            {isUpcountry && <span className="text-[10px] bg-purple-50 text-purple-600 border border-purple-100 px-2 py-0.5 rounded-md font-bold"><i className="fa-solid fa-truck-fast"></i> ตจว.</span>}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1 items-center">
                                                        <button onClick={() => { setEditingIndex(index); setEditDueDate(item.dueDate); setEditIsFactory(isFactory); setEditIsUpcountry(isUpcountry); }} className="btn-bouncy text-slate-400 hover:text-blue-600 hover:bg-blue-50 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i className="fa-solid fa-pen text-xs"></i></button>
                                                        <button onClick={() => setCurrentItems(prev => prev.filter((_, i) => i !== index))} className="btn-bouncy text-slate-400 hover:text-red-500 hover:bg-red-50 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i className="fa-solid fa-trash-can text-xs"></i></button>
                                                    </div>
                                                </div>
                                            )
                                        })
                                    )}
                                </div>
                                
                                {/* ปุ่มส่งข้อมูล */}
                                <div className="p-2.5 mt-1 shrink-0 bg-white z-10">
                                    <button onClick={() => setShowConfirmModal(true)} disabled={currentItems.length === 0 || isSaving} className="btn-bouncy w-full text-white font-bold text-base py-4 rounded-xl bg-slate-800 disabled:bg-slate-200 disabled:text-slate-400 shadow-md shadow-slate-800/20 disabled:shadow-none flex justify-center items-center gap-2 transition-colors">
                                        บันทึกเข้าระบบ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const HistoryTab = ({ isActive, refreshTrigger }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [isFetchingSummary, setIsFetchingSummary] = useState(false); 
            
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastFetchedMonth, setLastFetchedMonth] = useState(null);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!isActive) return;

                const fetchHistory = async () => {
                    setIsLoadingHistory(true);
                    const cacheKey = `history_data_${selectedMonth}`;
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${selectedMonth}`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) throw new Error("เซิร์ฟเวอร์ส่งกลับเป็นหน้า HTML");
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            setMonthHistoryData(json.data);
                            localStorage.setItem(cacheKey, JSON.stringify(json.data));
                        }
                    } catch (error) { 
                        const cachedData = localStorage.getItem(cacheKey);
                        if (cachedData) { try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} }
                    } finally { 
                        setIsLoadingHistory(false); 
                        setLastFetchedMonth(selectedMonth);
                    }
                };

                if (selectedMonth !== lastFetchedMonth || refreshTrigger > 0) {
                    const cacheKey = `history_data_${selectedMonth}`;
                    const cachedData = localStorage.getItem(cacheKey);
                    if (cachedData && selectedMonth !== lastFetchedMonth) { 
                        try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} 
                    }
                    fetchHistory();
                }
            }, [isActive, selectedMonth, refreshTrigger]);

            const getMonthlyStats = () => {
                const year = parseInt(selectedMonth.split('-')[0]);
                const month = parseInt(selectedMonth.split('-')[1]);
                const daysInMonth = new Date(year, month, 0).getDate();
                
                const stats = Array.from({length: daysInMonth}, () => ({ 
                    morning:0, afternoon:0, evening:0, 
                    urgent:0, total:0, 
                    before1Day: 0, before2DaysPlus: 0, sameDay: 0, afterDue: 0,
                    evening_before1Day: 0, evening_before2Days: 0, evening_before3DaysPlus: 0, evening_afterDue: 0
                }));
                
                let totalMonthCount = 0;
                let todayTotal = 0, todayMorning = 0, todayAfternoon = 0, todayEvening = 0;
                const todayStr = new Date().toLocaleDateString('en-CA');

                const parseDateLocal = (dStr) => {
                    const parts = dStr.split('-');
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                };

                monthHistoryData.forEach(item => {
                    const day = parseInt(item.date.split('-')[2]) - 1;
                    const count = Number(item.count) || 0;
                    
                    if (day >= 0 && day < daysInMonth) {
                        totalMonthCount += count;
                        stats[day].total += count;

                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) stats[day].morning += count;
                        else if (hour < 18) stats[day].afternoon += count;
                        else stats[day].evening += count;

                        const scanDateObj = parseDateLocal(item.date);
                        const dueDateObj = parseDateLocal(item.dueDate);
                        
                        const diffTime = dueDateObj.getTime() - scanDateObj.getTime();
                        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                        if (hour < 18) {
                            if (diffDays === 1) stats[day].before1Day += count; 
                            else if (diffDays >= 2) stats[day].before2DaysPlus += count; 
                            else if (diffDays === 0) stats[day].sameDay += count;    
                            else if (diffDays < 0) stats[day].afterDue += count;   
                        } else {
                            if (diffDays === 1) stats[day].evening_before1Day += count;
                            else if (diffDays === 2) stats[day].evening_before2Days += count;
                            else if (diffDays >= 3) stats[day].evening_before3DaysPlus += count;
                            else if (diffDays < 0) stats[day].evening_afterDue += count;
                        }

                        const sendDate = new Date(item.date); sendDate.setHours(0,0,0,0);
                        const nextDay = new Date(sendDate); nextDay.setDate(sendDate.getDate() + 1);
                        const dDate = new Date(item.dueDate); dDate.setHours(0,0,0,0);
                        if (dDate.getTime() <= nextDay.getTime()) stats[day].urgent += count;
                    }

                    if (item.date === todayStr) {
                        todayTotal += count;
                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) todayMorning += count;
                        else if (hour < 18) todayAfternoon += count;
                        else todayEvening += count;
                    }
                });
                return { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening };
            };

            const { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening } = getMonthlyStats();

            useEffect(() => {
                if (!isActive || !chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();
                
                const ctx = chartRef.current.getContext('2d');
                const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
                const dataTotals = stats.map(d => d.total);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'จำนวน', data: dataTotals, backgroundColor: '#3b82f6', borderRadius: 4, barPercentage: 0.5 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: {family: "'Prompt', sans-serif"} }, grid: { color: '#f1f5f9', borderDash: [5, 5] }, border: {display: false} }, x: { grid: { display: false }, ticks: { font: {family: "'Prompt', sans-serif"} }, border: {display: false} } }, animation: { duration: 1000 } }
                });
            }, [stats, isActive, daysInMonth]);

            const handleExportExcel = async () => {
                if (!window.ExcelJS) { alert('กำลังโหลดระบบ...'); return; }
                setIsExporting(true);
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('สรุปยอด');
                    const year = parseInt(selectedMonth.split('-')[0]);
                    const month = parseInt(selectedMonth.split('-')[1]);
                    const thaiMonth = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month-1];
                    const thaiYear = year + 543;

                    const compHeader = ['วันที่'];
                    const compTotal = ['จำนวนเที่ยวทั้งหมด'];
                    const compBefore1Day = ['ส่งบิลก่อนวันนัดส่ง 1 วัน (งานด่วน)'];
                    const compBefore2DaysPlus = ['ส่งบิลก่อนดิวส่ง 2 วันขึ้นไป'];
                    const compSameDay = ['ส่งบิลในวันนัดส่ง'];
                    const compAfterDue = ['ส่งบิลหลังคิวส่ง (ล่าช้า)'];
                    const compEvening = ['ส่งบิลหลัง 18.00 น. (รวม)'];

                    let sumTotal=0;
                    for(let i=0; i<daysInMonth; i++) {
                        compHeader.push(i+1);
                        compTotal.push(stats[i].total); sumTotal += stats[i].total;
                    }

                    compHeader.push('Total');
                    compTotal.push(sumTotal);

                    sheet.addRow([`เดือน ${thaiMonth} ${thaiYear}`]);
                    const titleCell = sheet.getCell('A1');
                    titleCell.font = { name: 'Prompt', bold: true, size: 16 };
                    sheet.mergeCells('A1:C1');

                    sheet.addRow(compHeader);
                    sheet.addRow(compTotal);

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    window.saveAs(blob, `สรุปยอด_${thaiMonth}_${thaiYear}.xlsx`);
                } catch (err) { alert('ส่งออก Excel ไม่สำเร็จ'); } finally { setIsExporting(false); }
            };

            const handleGetDailySummary = async () => {
                setIsFetchingSummary(true);
                try {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDailySummaryText&date=${todayStr}`);
                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("เชื่อมต่อผิดพลาด"); return; }
                    
                    const result = JSON.parse(text);
                    if (result.status === 'success') {
                        setLineMessageToCopy(result.data);
                        setShowCopyModal(true);
                    } else { alert("เกิดข้อผิดพลาดจากฝั่งเซิร์ฟเวอร์"); }
                } catch (error) { alert("ดึงข้อมูลไม่สำเร็จ"); } finally { setIsFetchingSummary(false); }
            };

            const forceRefresh = () => {
                setLastFetchedMonth(null); 
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] p-6 w-full max-w-sm shadow-xl border border-slate-100 animate-in zoom-in-95 duration-200">
                                <div className="text-center mb-4 border-b border-slate-100 pb-4">
                                    <h3 className="text-lg font-bold text-slate-800">สรุปยอดประจำวัน</h3>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-xl mb-5 max-h-[40vh] overflow-y-auto border border-slate-200 text-left custom-scrollbar">
                                    <pre className="text-[13px] text-slate-600 whitespace-pre-wrap font-sans leading-relaxed">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-bouncy flex-1 py-3.5 bg-white border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl font-medium text-sm">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-bouncy flex-1 py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-medium shadow-md shadow-slate-800/20 flex justify-center items-center gap-2 text-sm"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex items-center justify-between bg-white p-4 pl-5 rounded-[1.5rem] soft-shadow border border-slate-100">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-slate-50 rounded-full flex items-center justify-center border border-slate-100"><i className="fa-regular fa-comment-dots text-slate-500"></i></div>
                            <span className="text-slate-700 font-bold text-sm">สรุปยอดวันนี้</span>
                        </div>
                        <button onClick={handleGetDailySummary} disabled={isFetchingSummary} className="btn-bouncy px-4 py-2.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg font-medium text-sm flex items-center justify-center gap-2 transition-colors">
                            {isFetchingSummary ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-download"></i>} ดึงข้อความ
                        </button>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-between items-center bg-white p-5 rounded-[1.5rem] soft-shadow border border-slate-100 gap-4">
                        <div className="flex-1 w-full">
                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">เลือกเดือน</label>
                            <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm font-bold text-slate-700 outline-none w-full focus:border-blue-400 focus:ring-1 focus:ring-blue-400" />
                        </div>
                        <button onClick={handleExportExcel} disabled={isLoadingHistory || isExporting} className="btn-bouncy w-full sm:w-auto flex items-center justify-center gap-2 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 px-5 py-3 rounded-lg font-medium text-sm transition-colors mt-2 sm:mt-0 border border-emerald-100">
                            {isExporting ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-file-excel"></i>} โหลด Excel
                        </button>
                    </div>

                    <div className="bg-slate-800 rounded-[1.5rem] p-6 text-white flex justify-between items-center shadow-lg shadow-slate-800/20 relative overflow-hidden">
                        <i className="fa-solid fa-chart-line absolute -right-6 -bottom-6 text-7xl text-slate-700 rotate-12 opacity-50"></i>
                        <div className="relative z-10">
                            <h3 className="text-slate-300 text-xs font-medium tracking-wide mb-1">ยอดส่งบิลสะสม (เดือนนี้)</h3>
                            <div className="flex items-baseline gap-2">
                                <span className="text-5xl font-bold">{totalMonthCount}</span>
                                <span className="text-slate-300 font-medium text-sm">รายการ</span>
                            </div>
                        </div>
                        <button onClick={forceRefresh} className="btn-bouncy relative z-10 bg-white/10 w-10 h-10 rounded-full flex items-center justify-center border border-white/10 hover:bg-white/20 transition-colors"><i className={`fa-solid fa-rotate-right text-sm ${isLoadingHistory ? 'animate-spin' : ''}`}></i></button>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-3">
                        <div className="bg-white rounded-xl p-3 flex flex-col items-center justify-center border border-slate-100 shadow-sm">
                            <span className="text-[10px] font-medium text-slate-400 mb-0.5">รวมวันนี้</span><span className="text-xl font-bold text-slate-800">{todayTotal}</span>
                        </div>
                        <div className="bg-white rounded-xl p-3 flex flex-col items-center justify-center border border-slate-100 shadow-sm">
                            <span className="text-[10px] font-medium text-slate-400 mb-0.5">ก่อนเที่ยง</span><span className="text-xl font-bold text-slate-800">{todayMorning}</span>
                        </div>
                        <div className="bg-white rounded-xl p-3 flex flex-col items-center justify-center border border-slate-100 shadow-sm">
                            <span className="text-[10px] font-medium text-slate-400 mb-0.5">รอบบ่าย</span><span className="text-xl font-bold text-slate-800">{todayAfternoon}</span>
                        </div>
                        <div className="bg-white rounded-xl p-3 flex flex-col items-center justify-center border border-slate-100 shadow-sm">
                            <span className="text-[10px] font-medium text-slate-400 mb-0.5">หลัง 18.00</span><span className="text-xl font-bold text-slate-800">{todayEvening}</span>
                        </div>
                    </div>

                    <div className="bg-white rounded-[1.5rem] shadow-sm border border-slate-100 overflow-hidden p-4">
                        <div className="mb-4">
                            <h3 className="text-sm font-bold text-slate-700">สถิติรายวัน</h3>
                        </div>
                        <div className="w-full h-56 relative">
                            <canvas ref={chartRef}></canvas>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('liff_profile_cache');
                return saved ? JSON.parse(saved) : null;
            });
            const [isLiffReady, setIsLiffReady] = useState(false);
            const [activeTab, setActiveTab] = useState('scan');
            const [refreshHistoryTrigger, setRefreshHistoryTrigger] = useState(0); 

            const wakeLockRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try { wakeLockRef.current = await navigator.wakeLock.request('screen'); } 
                    catch (err) {}
                }
            };

            useEffect(() => {
                const initLiff = async () => {
                    try {
                        await liff.init({ liffId: '2009934240-M2LO3My9' });
                        if (liff.isLoggedIn()) {
                            const profile = await liff.getProfile();
                            setUserProfile(profile);
                            localStorage.setItem('liff_profile_cache', JSON.stringify(profile));
                        } else {
                            setUserProfile(null);
                            localStorage.removeItem('liff_profile_cache');
                        }
                        setIsLiffReady(true);
                    } catch (err) {
                        console.error('LIFF init failed', err);
                        setIsLiffReady(true); 
                    }
                };
                initLiff();

                requestWakeLock();
                const handleVisibilityChange = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) wakeLockRef.current.release().catch(()=>{});
                };
            }, []);

            if (!isLiffReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50">
                        <div className="w-10 h-10 border-[3px] border-slate-200 border-t-slate-800 rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-500 font-medium text-sm">กำลังเชื่อมต่อ...</p>
                    </div>
                );
            }

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
                        <div className="bg-white p-8 rounded-[2rem] max-w-sm w-full text-center soft-shadow border border-slate-100">
                            <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-5 border border-slate-100">
                                <i className="fa-solid fa-qrcode text-2xl text-slate-700"></i>
                            </div>
                            <h2 className="text-xl font-bold text-slate-800 mb-2">สแกนส่งบิล</h2>
                            <p className="text-xs text-slate-500 mb-8 font-medium">เข้าสู่ระบบผ่านบัญชี LINE</p>
                            
                            <button onClick={() => liff.login()} className="btn-bouncy w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-semibold py-3.5 rounded-xl shadow-md shadow-[#06C755]/20 flex items-center justify-center gap-2 text-sm transition-colors">
                                <i className="fa-brands fa-line text-lg"></i> ล็อกอินด้วย LINE
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-28 relative">
                    {/* Header แบบเรียบหรู */}
                    <div className="bg-white/90 backdrop-blur-md px-5 py-3 flex items-center justify-between border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <img src={userProfile.pictureUrl} alt="profile" className="w-9 h-9 rounded-full border border-slate-200" />
                            <div className="flex flex-col">
                                <span className="text-[10px] text-slate-400 font-semibold uppercase tracking-wider">บัญชี</span>
                                <span className="text-sm font-bold text-slate-800">{userProfile.displayName}</span>
                            </div>
                        </div>
                        <button onClick={() => {liff.logout(); setUserProfile(null); localStorage.removeItem('liff_profile_cache');}} className="btn-bouncy text-[10px] text-slate-500 bg-slate-50 hover:bg-slate-100 px-3 py-1.5 rounded-md font-semibold border border-slate-200 transition-colors">ออกจากระบบ</button>
                    </div>

                    <ScannerTab 
                        isActive={activeTab === 'scan'} 
                        userProfile={userProfile} 
                        onSaveSuccess={() => setRefreshHistoryTrigger(prev => prev + 1)} 
                    />
                    
                    <HistoryTab 
                        isActive={activeTab === 'history'} 
                        refreshTrigger={refreshHistoryTrigger} 
                    />

                    {/* เมนูล่างแบบเรียบง่าย (Docked Bar) */}
                    <div className="fixed bottom-0 left-0 right-0 z-40 bg-white border-t border-slate-200 pb-[env(safe-area-inset-bottom)] shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
                        <div className="flex w-full max-w-md mx-auto">
                            <button onClick={() => setActiveTab('scan')} className={`flex-1 flex flex-col justify-center items-center h-16 transition-colors ${activeTab === 'scan' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-barcode text-xl mb-1"></i>
                                <span className="text-[10px] font-bold">สแกน</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex flex-col justify-center items-center h-16 transition-colors ${activeTab === 'history' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-chart-pie text-xl mb-1"></i>
                                <span className="text-[10px] font-bold">สรุปยอด</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
