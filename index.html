<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบจัดส่งเอกสาร</title>
    
    <meta name="apple-mobile-web-app-title" content="สแกนส่งบิล">
    <meta name="application-name" content="สแกนส่งบิล">
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/SxDzdXD5/79162.jpg">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f8fafc">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(152,100%,94%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(210,100%,97%,1) 0, transparent 50%);
            background-attachment: fixed;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRclDdXGntRfw_W6ygYGrSw0tLOrUmBLDRd12l-KNVahVWzX3rr-wkfzMcZt8o7fky3Q/exec';

            // 🌟 ปรับปรุง: ใช้การดึงข้อมูลจาก Cache เพื่อลดการกดล็อกอินซ้ำ
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('liff_profile_cache');
                return saved ? JSON.parse(saved) : null;
            });
            const [isLiffReady, setIsLiffReady] = useState(false);

            const [activeTab, setActiveTab] = useState('scan');
            const [currentItems, setCurrentItems] = useState([]); 
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(''); 
            const [deliveryType, setDeliveryType] = useState('DC'); 
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [isFetchingSummary, setIsFetchingSummary] = useState(false); 
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastSavedMessage, setLastSavedMessage] = useState(() => localStorage.getItem('last_saved_message') || '');
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);
            
            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            const dueDateRef = useRef(dueDate); 
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);

            useEffect(() => {
                const initLiff = async () => {
                    try {
                        await liff.init({ liffId: '2009934240-M2LO3My9' });
                        if (liff.isLoggedIn()) {
                            const profile = await liff.getProfile();
                            setUserProfile(profile);
                            localStorage.setItem('liff_profile_cache', JSON.stringify(profile)); // 🌟 บันทึกแคช
                            fetchAllCodes(); 
                        } else {
                            localStorage.removeItem('liff_profile_cache');
                            setUserProfile(null);
                        }
                        setIsLiffReady(true);
                    } catch (err) {
                        console.error('LIFF init failed', err);
                        setIsLiffReady(true); 
                    }
                };
                initLiff();

                const savedBasket = localStorage.getItem('delivery_basket');
                if (savedBasket) { try { setCurrentItems(JSON.parse(savedBasket)); } catch (e) {} }
                
                const now = new Date();
                const defaultDue = new Date(now);
                defaultDue.setDate(defaultDue.getDate() + 2);
                setDueDate(`${defaultDue.getFullYear()}-${String(defaultDue.getMonth() + 1).padStart(2, '0')}-${String(defaultDue.getDate()).padStart(2, '0')}`);
            }, []);

            useEffect(() => { localStorage.setItem('delivery_basket', JSON.stringify(currentItems)); }, [currentItems]);
            useEffect(() => { if (userProfile) fetchHistoryForMonth(selectedMonth); }, [selectedMonth, userProfile]);

            // --- ฟังก์ชันช่วยเหลือ (ดึงข้อมูล/สแกน/บันทึก) คงเดิมเหมือนเวอร์ชันที่แล้ว ---
            const fetchAllCodes = async () => {
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                    const json = await res.json();
                    if (json.status === 'success' && json.data) {
                        setAllSentCodesCache(new Set(json.data.map(code => String(code).trim().toUpperCase())));
                    }
                } catch (e) {}
            };

            const fetchHistoryForMonth = async (monthStr) => {
                setIsLoadingHistory(true);
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${monthStr}`);
                    const json = await res.json();
                    if (json.status === 'success') setMonthHistoryData(json.data);
                } catch (error) {} finally { setIsLoadingHistory(false); }
            };

            const handleGetDailySummary = async () => {
                setIsFetchingSummary(true);
                try {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDailySummaryText&date=${todayStr}`);
                    const result = await res.json();
                    if (result.status === 'success') {
                        setLineMessageToCopy(result.data);
                        setShowCopyModal(true);
                    }
                } catch (error) { alert("❌ ไม่สามารถดึงข้อมูลสรุปได้"); } finally { setIsFetchingSummary(false); }
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0) return;
                setIsSaving(true);
                const now = new Date();
                const payload = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: currentItems, 
                    date: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`, 
                    time: `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`, 
                    userId: userProfile ? userProfile.userId : null
                };
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await response.json();
                    if (result.status === 'success') {
                        setCurrentItems([]);
                        setSaveSuccess(true);
                        setLineMessageToCopy(result.lineMessage);
                        setTimeout(() => setShowCopyModal(true), 1200);
                        fetchHistoryForMonth(selectedMonth);
                    } else { alert("เกิดข้อผิดพลาด: " + result.message); }
                } catch (error) { alert("การเชื่อมต่อผิดพลาด"); } finally { setIsSaving(false); setTimeout(() => setSaveSuccess(false), 3000); }
            };

            // ส่วนอื่นๆ ของ Logic (สแกน, ล้างตะกร้า, ฯลฯ) คงเดิม...
            const startScanner = () => {
                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                        const finalCode = deliveryType === 'FACTORY' ? `${decodedText.trim()}(รับโรงตัด)` : decodedText.trim();
                        setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                    }).catch(() => setIsScanning(false));
                }, 300);
            };

            const stopScanner = () => { if (html5QrCodeRef.current) html5QrCodeRef.current.stop().then(() => setIsScanning(false)); };

            if (!isLiffReady) return <div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-emerald-500"></div></div>;
            if (!userProfile) return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-[32px] shadow-lg max-w-sm w-full text-center">
                        <div className="w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-6"><i className="fa-solid fa-barcode text-5xl text-emerald-500"></i></div>
                        <h2 className="text-2xl font-black mb-8">เข้าสู่ระบบสแกนส่งบิล</h2>
                        <button onClick={() => liff.login()} className="w-full bg-[#06C755] text-white font-bold py-4 rounded-[20px] shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-all"><i className="fa-brands fa-line text-2xl"></i> Login with LINE</button>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-32 bg-slate-50/50">
                    <div className="bg-white/80 backdrop-blur-md px-5 py-3.5 flex items-center justify-between shadow-sm sticky top-0 z-50">
                        <div className="flex items-center gap-3.5">
                            <img src={userProfile.pictureUrl} className="w-10 h-10 rounded-full border-2 border-emerald-100" />
                            <span className="text-sm font-black">{userProfile.displayName}</span>
                        </div>
                        <button onClick={() => {liff.logout(); setUserProfile(null); localStorage.removeItem('liff_profile_cache');}} className="text-[10px] text-red-400 font-bold uppercase">Logout</button>
                    </div>

                    {/* หน้าสแกน */}
                    <div className={`${activeTab === 'scan' ? 'block' : 'hidden'} p-4 max-w-4xl mx-auto space-y-6`}>
                        <div className="bg-white/95 p-6 rounded-[32px] shadow-sm border border-white/60">
                            <div className="flex bg-slate-100/80 p-1 rounded-[20px] mb-6">
                                <button onClick={() => setDeliveryType('DC')} className={`flex-1 py-3 font-bold rounded-2xl ${deliveryType === 'DC' ? 'bg-emerald-200 text-emerald-800 shadow-sm' : 'text-slate-500'}`}>DC</button>
                                <button onClick={() => setDeliveryType('FACTORY')} className={`flex-1 py-3 font-bold rounded-2xl ${deliveryType === 'FACTORY' ? 'bg-orange-200 text-orange-800 shadow-sm' : 'text-slate-500'}`}>โรงตัด</button>
                            </div>
                            {isScanning ? (
                                <div className="relative rounded-3xl border-4 border-emerald-400 bg-black overflow-hidden">
                                    <div id="reader" className="w-full h-[280px]"></div>
                                    <button onClick={stopScanner} className="absolute top-3 right-3 bg-white/20 text-white w-10 h-10 rounded-full z-10"><i className="fa-solid fa-xmark"></i></button>
                                </div>
                            ) : (
                                <button onClick={startScanner} className="w-full h-16 bg-slate-800 text-white rounded-[20px] text-3xl active:scale-95"><i className="fa-solid fa-camera"></i></button>
                            )}
                        </div>

                        <div className="bg-slate-800 rounded-[32px] p-2 shadow-xl">
                            <div className="flex justify-between items-center px-5 py-4">
                                <h3 className="text-white font-bold">ตะกร้ารอส่ง ({currentItems.length})</h3>
                                {currentItems.length > 0 && <button onClick={() => setCurrentItems([])} className="text-red-400 text-xs font-bold bg-slate-700 px-3 py-1.5 rounded-lg">ล้าง</button>}
                            </div>
                            <div className="bg-slate-50 rounded-[28px] p-3 space-y-2 max-h-80 overflow-y-auto">
                                {currentItems.map((item, i) => (
                                    <div key={i} className="flex justify-between bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                                        <span className="font-bold">{item.code}</span>
                                        <button onClick={() => setCurrentItems(prev => prev.filter((_, idx) => idx !== i))} className="text-red-400"><i className="fa-solid fa-trash-can"></i></button>
                                    </div>
                                ))}
                            </div>
                            <div className="p-2"><button onClick={executeSaveBatch} disabled={currentItems.length===0 || isSaving} className="w-full py-4 bg-emerald-600 text-white font-bold rounded-2xl disabled:bg-slate-700">ส่งข้อมูลทั้งหมด</button></div>
                        </div>
                    </div>

                    {/* หน้าสรุป (History Tab) */}
                    <div className={`${activeTab === 'history' ? 'block' : 'hidden'} p-4 max-w-4xl mx-auto space-y-6`}>
                        
                        {/* 🌟 กลับมาแล้ว: บล็อกปุ่มดึงข้อความสรุปประจำวัน 🌟 */}
                        <div className="flex items-center justify-between bg-blue-50 border border-blue-100 p-2.5 pl-5 rounded-[24px] shadow-sm">
                            <div className="flex items-center gap-3">
                                <i className="fa-solid fa-comment-dots text-blue-500 text-lg"></i>
                                <span className="text-blue-900 font-bold text-sm">คัดลอกสรุปยอดวันนี้</span>
                            </div>
                            <button onClick={handleGetDailySummary} disabled={isFetchingSummary}
                                className="px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-[18px] font-bold transition-all active:scale-95 text-xs shadow-md shadow-blue-500/20 flex items-center justify-center gap-2 disabled:opacity-50">
                                {isFetchingSummary ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-copy"></i>}
                                <span className="whitespace-nowrap">ดึงข้อความ</span>
                            </button>
                        </div>

                        <div className="bg-white/95 p-6 rounded-[32px] shadow-sm border border-slate-100">
                            <div className="flex justify-between items-center mb-6">
                                <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-slate-50 px-4 py-2 rounded-xl font-bold border-none" />
                                <button onClick={handleExportExcel} className="text-emerald-700 font-bold px-4 py-2 bg-emerald-50 rounded-xl"><i className="fa-solid fa-file-excel"></i> Excel</button>
                            </div>
                            <div className="bg-slate-900 rounded-3xl p-6 text-white text-center">
                                <span className="text-xs text-slate-400 uppercase font-bold">รวมเดือนนี้</span>
                                <div className="text-5xl font-black text-emerald-400 mt-1">{monthHistoryData.reduce((acc, cur) => acc + (parseInt(cur.count) || 0), 0)} เที่ยว</div>
                            </div>
                        </div>
                    </div>

                    {/* เมนูนำทาง */}
                    <div className="fixed bottom-6 left-0 right-0 z-40 flex justify-center px-4">
                        <div className="bg-white/50 backdrop-blur-md border border-white/60 p-1.5 rounded-[30px] flex w-full max-w-[300px] shadow-lg">
                            <button onClick={() => setActiveTab('scan')} className={`flex-1 flex justify-center items-center h-12 rounded-[24px] ${activeTab === 'scan' ? 'bg-white text-emerald-600' : 'text-slate-600'}`}><i className="fa-solid fa-barcode text-xl"></i></button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex justify-center items-center h-12 rounded-[24px] ${activeTab === 'history' ? 'bg-white text-emerald-600' : 'text-slate-600'}`}><i className="fa-solid fa-clipboard-list text-xl"></i></button>
                        </div>
                    </div>

                    {/* Copy Modal */}
                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[28px] p-6 w-full max-w-sm animate-in zoom-in-95">
                                <h3 className="text-center font-black mb-4">คัดลอกข้อความ</h3>
                                <div className="bg-slate-50 p-3 rounded-xl mb-5 max-h-60 overflow-y-auto border text-xs whitespace-pre-wrap">{lineMessageToCopy}</div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowCopyModal(false)} className="flex-1 py-3 bg-slate-100 rounded-xl font-bold">ปิด</button>
                                    <button onClick={() => {navigator.clipboard.writeText(lineMessageToCopy); alert('คัดลอกแล้ว');}} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
