        (function() {
            var manifest = {
                "name": "สแกนส่งบิล",
                "short_name": "สแกนส่งบิล",

                "background_color": "#f2f2f7",
                "theme_color": "#007aff",
                "icons": [
                    { "src": "https://i.postimg.cc/SxDzdXD5/79162.jpg", "sizes": "192x192", "type": "image/jpeg" },

    <style>
        body { 
            font-family: 'Prompt', sans-serif; /* ใช้ Prompt เพราะใกล้เคียงฟอนต์ iOS ภาษาไทย */
            -webkit-tap-highlight-color: transparent; 
            background-color: #f2f2f7; /* iOS System Gray 6 */
            margin: 0;

        /* Scrollbar สไตล์เรียบง่าย */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #d1d5db; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #9ca3af; }
        
        .btn-ios { transition: transform 0.1s ease, opacity 0.1s ease; }
        .btn-ios:active { transform: scale(0.97); opacity: 0.8; }
        
        /* สไตล์ Segmented Control แบบ iOS */
        .ios-segment-container {
            background-color: #e3e3e8;
            border-radius: 12px;
            padding: 3px;
            display: flex;
        }

            flex: 1;
            padding: 8px 0;

            color: #8e8e93;

        /* สไตล์ป้อนข้อมูลแบบ iOS */

            transition: all 0.2s;

<body class="text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYAYulOU-9KV7t4y08pz_GhicwWL2S9laTWsRkTqHvo5Fk_UIbGPF_EI0-kHzyY1P57A/exec';

        const formatThaiDate = (dateString) => {
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return dateString;
            return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
        };

        const checkIsUrgent = (dateStr) => {
            if (!dateStr) return false;
            const targetDate = new Date(dateStr); targetDate.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
            return targetDate.getTime() <= tomorrow.getTime();
        };

        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
                if (navigator.vibrate) navigator.vibrate(150);
            } catch (e) {}
        };

        const playDuplicateVoice = () => {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance('บิลซ้ำค่ะ');
                    utterance.lang = 'th-TH'; 
                    const voices = window.speechSynthesis.getVoices();
                    const thaiVoice = voices.find(voice => voice.lang.includes('th'));
                    if (thaiVoice) utterance.voice = thaiVoice;
                    utterance.pitch = 1.3; utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) {}
        };

        const playSuccessBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } catch (e) {}
        };

        const handleCopyTextGlobal = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); alert("คัดลอกข้อความสำเร็จ"); } catch (err) { alert("ไม่สามารถคัดลอกได้"); }
            document.body.removeChild(textArea);
        };

        const ScannerTab = ({ isActive, userProfile, onSaveSuccess }) => {
            const [currentItems, setCurrentItems] = useState(() => {
                const savedBasket = localStorage.getItem('delivery_basket');
                return savedBasket ? JSON.parse(savedBasket) : [];
            });
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(() => {
                const now = new Date();
                now.setDate(now.getDate() + 2);
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            });
            
            const [deliveryType, setDeliveryType] = useState('DC');
            const [deliveryZone, setDeliveryZone] = useState('NORMAL'); 
            
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);

            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastSavedMessage, setLastSavedMessage] = useState(() => localStorage.getItem('last_saved_message') || '');
            
            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            const [editIsUpcountry, setEditIsUpcountry] = useState(false); 

            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const dueDateRef = useRef(dueDate);
            const deliveryTypeRef = useRef(deliveryType);
            const deliveryZoneRef = useRef(deliveryZone);
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { deliveryTypeRef.current = deliveryType; }, [deliveryType]);
            useEffect(() => { deliveryZoneRef.current = deliveryZone; }, [deliveryZone]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);
            useEffect(() => { localStorage.setItem('delivery_basket', JSON.stringify(currentItems)); }, [currentItems]);

            useEffect(() => {
                const fetchAllCodes = async () => {
                    const cachedCodes = localStorage.getItem('all_sent_codes_backup');
                    if (cachedCodes) { try { setAllSentCodesCache(new Set(JSON.parse(cachedCodes))); } catch(e) {} }
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) return;
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            const uppercaseCodes = json.data.map(code => String(code).trim().toUpperCase());
                            setAllSentCodesCache(new Set(uppercaseCodes));
                            localStorage.setItem('all_sent_codes_backup', JSON.stringify(uppercaseCodes));
                        }
                    } catch (e) { console.error("Failed to fetch all codes", e); }
                };
                fetchAllCodes();
                
                return () => {
                    if (html5QrCodeRef.current && isScanning) {
                        html5QrCodeRef.current.stop().catch(() => {});
                    }
                }
            }, []);

            const checkDuplicate = useCallback((code) => {
                const cleanCode = String(code).trim().toUpperCase(); 
                if (currentItemsRef.current.some(item => String(item.code).trim().toUpperCase() === cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`บิล ${cleanCode} ถูกสแกนลงตะกร้าไปแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 4000); 
                    return true;
                }
                if (allSentCodesCacheRef.current.has(cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`บิล ${cleanCode} เคยถูกส่งเข้าระบบไปแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 4000); 
                    return true;
                }
                return false;
            }, []);

            const startScanner = async () => {
                if (!window.Html5Qrcode) { alert('กำลังโหลดระบบสแกน กรุณารอสักครู่'); return; }
                const isLineApp = navigator.userAgent.indexOf("Line") > -1;
                if (isLineApp) alert("พบการใช้งานผ่านแอป LINE\nกรุณากดไอคอน '3 จุด' แล้วเลือก 'เปิดในเบราว์เซอร์'");

                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    const config = {
                        fps: 10,
                        qrbox: (vw, vh) => ({ width: Math.min(250, vw * 0.8), height: 150 }),
                        aspectRatio: 1.0, 
                        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                    };

                    html5QrCode.start(
                        { facingMode: "environment" }, config,
                        (decodedText) => {
                            if (lastScannedRef.current !== decodedText) {
                                lastScannedRef.current = decodedText;
                                
                                let finalCode = deliveryTypeRef.current === 'FACTORY' ? `${decodedText.trim()}(รับโรงตัด)` : decodedText.trim();
                                if (deliveryZoneRef.current === 'UPCOUNTRY') {
                                    finalCode += '(ตจว.)';
                                }

                                if (!checkDuplicate(finalCode)) {
                                    playBeep();
                                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                                }
                                setTimeout(() => { lastScannedRef.current = null }, 1500);
                            }
                        }, 
                        (err) => {}
                    ).catch((err) => { setIsScanning(false); alert("ไม่สามารถเปิดกล้องได้ โปรดตรวจสอบการตั้งค่าสิทธิ์"); });
                }, 300);
            };

            const stopScanner = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        html5QrCodeRef.current.clear(); 
                        setIsScanning(false); setIsFlashlightOn(false);
                    }).catch(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const toggleFlashlight = async () => {
                if (html5QrCodeRef.current && isScanning) {
                    try {
                        const newState = !isFlashlightOn;
                        await html5QrCodeRef.current.applyVideoConstraints({ advanced: [{ torch: newState }] });
                        setIsFlashlightOn(newState);
                    } catch (error) { alert("อุปกรณ์ไม่รองรับการเปิดไฟฉายผ่านเบราว์เซอร์"); }
                }
            };

            const handleManualAdd = (e) => {
                e.preventDefault();
                let val = inputValue.trim();
                if (!val) return;

                if (val.length !== 4 && val.length !== 10) {
                    alert("กรุณาระบุเลขบิล 4 หรือ 10 หลักเท่านั้น");
                    return;
                }

                if (val.length === 4) {
                    const now = new Date();
                    const yy = String(now.getFullYear()).slice(-2);
                    const mm = String(now.getMonth() + 1).padStart(2, '0');
                    val = `${yy}${mm}00${val}`; 
                }

                let finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                if (deliveryZone === 'UPCOUNTRY') {
                    finalCode += '(ตจว.)';
                }

                if (!checkDuplicate(finalCode)) {
                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate }, ...prev]);
                }
                setInputValue('');
            };

            const saveEditItem = () => {
                if (editingIndex === null) return;
                const newItems = [...currentItems];
                
                let baseCode = newItems[editingIndex].code.replace('(รับโรงตัด)', '').replace('(ตจว.)', '').trim();
                let finalCode = editIsFactory ? `${baseCode}(รับโรงตัด)` : baseCode;
                if (editIsUpcountry) {
                    finalCode += '(ตจว.)';
                }

                const isDuplicate = newItems.some((item, idx) => idx !== editingIndex && String(item.code).trim().toUpperCase() === finalCode.toUpperCase());
                
                if (isDuplicate) { 
                    playDuplicateVoice();
                    setDuplicateWarning(`แก้ไขไม่ได้: บิลนี้มีซ้ำอยู่ในรายการแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 4000); 
                    return; 
                }

                newItems[editingIndex] = { ...newItems[editingIndex], code: finalCode, dueDate: editDueDate };
                setCurrentItems(newItems);
                setEditingIndex(null);
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0) return;
                setIsSaving(true); setSaveSuccess(false);

                const now = new Date();
                const currentDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                const newBatch = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: [...currentItems], date: currentDateStr, time: currentTimeStr, 
                    dueDate: dueDate, timestamp: now.getTime(),
                    userId: userProfile ? userProfile.userId : null
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(newBatch)
                    });

                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("เซิร์ฟเวอร์ตอบกลับผิดพลาด"); setIsSaving(false); return; }

                    const result = JSON.parse(text);
                    if (result.status === 'error') {
                        if (result.message === 'DUPLICATE_FOUND') { alert(`ตรวจพบการซ้ำซ้อนในฐานข้อมูล!\nบิลเลขที่: ${result.duplicateCode}`); } 
                        else { alert("เกิดข้อผิดพลาด: " + result.message); }
                        setIsSaving(false); return; 
                    }

                    setCurrentItems([]); localStorage.removeItem('delivery_basket');
                    setSaveSuccess(true); playSuccessBeep();
                    
                    if (window.confetti) {
                        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#007aff', '#34c759', '#ff9500'] });
                    }
                    
                    if (result.lineMessage) {
                        setLineMessageToCopy(result.lineMessage);
                        setLastSavedMessage(result.lineMessage); 
                        localStorage.setItem('last_saved_message', result.lineMessage);
                        setTimeout(() => { setShowCopyModal(true); }, 1500); 
                    }
                    
                    onSaveSuccess();
                    
                    const newCodesSet = new Set(allSentCodesCache);
                    newBatch.items.forEach(item => newCodesSet.add(item.code.trim().toUpperCase()));
                    setAllSentCodesCache(newCodesSet);

                    setTimeout(() => setSaveSuccess(false), 3000);
                } catch (error) { alert(`การเชื่อมต่อล้มเหลว กรุณาลองใหม่`); } finally { setIsSaving(false); }
            };

            return (
                <div className={`pt-4 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-5 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {/* Modals สไตล์ iOS */}
                    {saveSuccess && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[150] flex flex-col items-center justify-center animate-in fade-in duration-300">
                            <div className="bg-white/90 backdrop-blur-xl p-8 rounded-3xl shadow-2xl flex flex-col items-center max-w-[280px] w-full animate-in zoom-in-95">
                                <div className="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mb-4"><i className="fa-solid fa-check text-4xl text-white"></i></div>
                                <h2 className="text-xl font-bold text-gray-900 mb-1">สำเร็จ</h2>
                                <p className="text-gray-500 text-sm text-center">บันทึกข้อมูลเรียบร้อย</p>
                            </div>
                        </div>
                    )}

                    {duplicateWarning && (
                        <div className="fixed top-12 left-4 right-4 z-[110] max-w-md mx-auto bg-white/90 backdrop-blur-xl border border-red-200 p-4 rounded-2xl shadow-lg flex items-center gap-3 animate-in slide-in-from-top-4">
                            <i className="fa-solid fa-circle-exclamation text-red-500 text-xl"></i>
                            <div className="flex-1 text-gray-800 text-sm font-medium">{duplicateWarning}</div>
                        </div>
                    )}

                    {showCopyModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white/95 backdrop-blur-xl rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95">
                                <div className="text-center mb-4">
                                    <h3 className="text-lg font-bold text-gray-900">รายละเอียดข้อมูล</h3>
                                </div>
                                <div className="bg-[#f2f2f7] p-4 rounded-2xl mb-5 max-h-[40vh] overflow-y-auto text-left">
                                    <pre className="text-[13px] text-gray-700 whitespace-pre-wrap font-sans">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-ios flex-1 py-3.5 bg-[#e5e5ea] text-gray-800 rounded-xl font-semibold text-sm">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-ios flex-1 py-3.5 bg-[#007aff] text-white rounded-xl font-semibold flex justify-center items-center gap-2 text-sm"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showClearConfirmModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white/95 backdrop-blur-xl rounded-3xl p-6 w-full max-w-[300px] shadow-2xl text-center animate-in zoom-in-95">
                                <h3 className="text-lg font-bold text-gray-900 mb-2 mt-2">ล้างตะกร้าทั้งหมด?</h3>
                                <p className="text-sm text-gray-500 mb-6">ข้อมูลที่สแกนไว้จะถูกลบออก ไม่สามารถกู้คืนได้</p>
                                <div className="space-y-2">
                                    <button onClick={() => { setCurrentItems([]); setShowClearConfirmModal(false); }} className="btn-ios w-full py-3.5 bg-red-500 text-white rounded-xl font-semibold text-base">ล้างข้อมูล</button>
                                    <button onClick={() => setShowClearConfirmModal(false)} className="btn-ios w-full py-3.5 bg-[#e5e5ea] text-gray-800 rounded-xl font-semibold text-base">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingIndex !== null && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white/95 backdrop-blur-xl rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95">
                                <div className="flex justify-between items-center mb-5">
                                    <h3 className="text-lg font-bold text-gray-900">แก้ไขบิล</h3>
                                    <button onClick={() => setEditingIndex(null)} className="w-7 h-7 bg-[#e5e5ea] rounded-full text-gray-500 flex justify-center items-center"><i className="fa-solid fa-xmark text-sm"></i></button>
                                </div>
                                <div className="space-y-5 mb-6">
                                    <div>
                                        <label className="text-[13px] font-semibold text-gray-500 mb-2 block ml-1">ประเภท</label>
                                        <div className="ios-segment-container">
                                            <button type="button" onClick={() => setEditIsFactory(false)} className={`ios-segment-btn ${!editIsFactory ? 'active text-[#007aff]' : 'inactive'}`}>DC</button>
                                            <button type="button" onClick={() => setEditIsFactory(true)} className={`ios-segment-btn ${editIsFactory ? 'active text-[#ff9500]' : 'inactive'}`}>โรงตัด</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[13px] font-semibold text-gray-500 mb-2 block ml-1">พื้นที่</label>
                                        <div className="ios-segment-container">
                                            <button type="button" onClick={() => setEditIsUpcountry(false)} className={`ios-segment-btn ${!editIsUpcountry ? 'active text-gray-900' : 'inactive'}`}>ปกติ</button>
                                            <button type="button" onClick={() => setEditIsUpcountry(true)} className={`ios-segment-btn ${editIsUpcountry ? 'active text-[#5856d6]' : 'inactive'}`}>ตจว.</button>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-[13px] font-semibold text-gray-500 mb-2 block ml-1">กำหนดส่ง</label>
                                        <input type="date" value={editDueDate} onChange={(e) => setEditDueDate(e.target.value)} className="w-full ios-input rounded-xl px-4 py-3 font-medium text-gray-900 outline-none" />
                                    </div>
                                </div>
                                <button onClick={saveEditItem} className="btn-ios w-full py-3.5 bg-[#007aff] text-white rounded-xl font-bold text-base">บันทึก</button>
                            </div>
                        </div>
                    )}

                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white/95 backdrop-blur-xl rounded-3xl p-6 w-full max-w-[300px] shadow-2xl text-center animate-in zoom-in-95">
                                <h3 className="text-lg font-bold text-gray-900 mb-2 mt-2">ยืนยันส่งข้อมูล</h3>
                                <p className="text-sm text-gray-500 mb-6">ดำเนินการจัดส่งข้อมูลจำนวน {currentItems.length} รายการเข้าระบบ</p>
                                <div className="space-y-2">
                                    <button onClick={() => { setShowConfirmModal(false); executeSaveBatch(); }} className="btn-ios w-full py-3.5 bg-[#007aff] text-white rounded-xl font-semibold text-base">ยืนยัน</button>
                                    <button onClick={() => setShowConfirmModal(false)} className="btn-ios w-full py-3.5 bg-[#e5e5ea] text-gray-800 rounded-xl font-semibold text-base">ยกเลิก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* เมนเลย์เอาต์ */}
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-5">
                        
                        {/* ฝั่งซ้าย: สแกนและตั้งค่า */}
                        <div className="lg:col-span-6 space-y-5">
                            
                            {/* Card: การตั้งค่าก่อนสแกน (iOS Style) */}
                            <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                                <div className="mb-5">
                                    <label className="text-[13px] font-semibold text-gray-500 mb-2 block ml-1 uppercase tracking-wide">รูปแบบงาน (แยกสีชัดเจน)</label>
                                    <div className="ios-segment-container mb-3">
                                        <button onClick={() => setDeliveryType('DC')} className={`ios-segment-btn ${deliveryType === 'DC' ? 'active text-[#007aff]' : 'inactive'}`}>คลังสินค้า (DC)</button>
                                        <button onClick={() => setDeliveryType('FACTORY')} className={`ios-segment-btn ${deliveryType === 'FACTORY' ? 'active text-[#ff9500]' : 'inactive'}`}>รับโรงตัด</button>
                                    </div>
                                    <div className="ios-segment-container">
                                        <button onClick={() => setDeliveryZone('NORMAL')} className={`ios-segment-btn ${deliveryZone === 'NORMAL' ? 'active text-gray-900' : 'inactive'}`}>พื้นที่ปกติ</button>
                                        <button onClick={() => setDeliveryZone('UPCOUNTRY')} className={`ios-segment-btn ${deliveryZone === 'UPCOUNTRY' ? 'active text-[#5856d6]' : 'inactive'}`}>งานต่างจังหวัด (ตจว.)</button>
                                    </div>
                                </div>

                                {/* กล่องสแกน */}
                                <div className="space-y-4">
                                    {isScanning ? (
                                        <div className="relative rounded-2xl bg-black overflow-hidden shadow-inner border border-gray-200">
                                            <div id="reader" className="w-full h-[260px]"></div>
                                            <button onClick={stopScanner} className="absolute top-3 right-3 bg-white/30 backdrop-blur-md text-white w-9 h-9 rounded-full flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
                                            <button onClick={toggleFlashlight} className={`absolute top-3 left-3 w-9 h-9 rounded-full flex items-center justify-center backdrop-blur-md ${isFlashlightOn ? 'bg-yellow-400 text-black' : 'bg-white/30 text-white'}`}><i className="fa-solid fa-bolt text-sm"></i></button>
                                        </div>
                                    ) : (
                                        <div className="flex flex-col gap-3">
                                            <button onClick={startScanner} className="btn-ios w-full h-[110px] bg-[#f2f2f7] text-[#007aff] rounded-2xl flex flex-col items-center justify-center transition-colors hover:bg-[#e5e5ea]">
                                                <i className="fa-solid fa-camera text-3xl mb-1"></i>
                                                <span className="font-semibold text-sm">แตะเพื่อเปิดกล้อง</span>
                                            </button>
                                            
                                            <form onSubmit={handleManualAdd} className="flex gap-2">
                                                <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="ป้อนเลขบิล 4 หรือ 10 หลัก" className="flex-1 ios-input rounded-xl px-4 font-medium h-[46px] text-sm" />
                                                <button type="submit" className="btn-ios w-[46px] h-[46px] bg-[#e5e5ea] text-[#007aff] rounded-xl text-lg font-bold flex items-center justify-center"><i className="fa-solid fa-plus"></i></button>
                                            </form>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Card: วันที่ */}
                            <div className={`p-5 rounded-3xl transition-colors duration-200 shadow-sm border ${checkIsUrgent(dueDate) ? 'bg-[#fff0f0] border-red-100' : 'bg-white border-gray-100'}`}>
                                <div className="flex items-center justify-between mb-3">
                                    <label className={`text-[13px] font-semibold uppercase tracking-wide ml-1 ${checkIsUrgent(dueDate) ? 'text-red-500' : 'text-gray-500'}`}>กำหนดวันส่งมอบ</label>
                                    {checkIsUrgent(dueDate) && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-md font-bold">ด่วน</span>}
                                </div>
                                <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full ios-input rounded-xl px-4 py-3 font-medium text-gray-900 text-base outline-none" />
                            </div>
                        </div>

                        {/* ฝั่งขวา: ตะกร้าบิล (Fixed Height + Scrollbar) */}
                        <div className="lg:col-span-6 flex flex-col h-[480px] lg:h-[580px]">
                            <div className="flex flex-col bg-white rounded-3xl p-0 shadow-sm border border-gray-100 relative flex-1 overflow-hidden">
                                {isSaving && <div className="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center rounded-3xl"><div className="w-10 h-10 border-[3px] border-gray-200 border-t-[#007aff] rounded-full animate-spin"></div></div>}
                                
                                {/* Header ตะกร้า */}
                                <div className="flex justify-between items-center px-5 py-4 border-b border-gray-100 bg-white z-10 shrink-0">
                                    <h3 className="text-gray-900 font-bold text-base">รายการในตะกร้า</h3>
                                    <div className="flex items-center gap-2">
                                        {currentItems.length > 0 && <button onClick={() => setShowClearConfirmModal(true)} className="text-red-500 text-xs font-semibold px-2 py-1 bg-red-50 rounded-md">ล้าง</button>}
                                        <span className="bg-[#f2f2f7] text-gray-800 text-xs font-bold px-2.5 py-1.5 rounded-md">{currentItems.length} รายการ</span>
                                    </div>
                                </div>
                                
                                {/* พื้นที่ Scroll (รายการบิล) */}
                                <div className="flex-1 overflow-y-auto bg-[#f9f9fb] p-4 space-y-3 custom-scrollbar">
                                    {currentItems.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-400">
                                            <i className="fa-solid fa-box-open text-4xl mb-3 opacity-30"></i>
                                            <p className="font-medium text-sm">ยังไม่มีรายการสแกน</p>
                                        </div>
                                    ) : (
                                        currentItems.map((item, index) => {
                                            const isUrgent = checkIsUrgent(item.dueDate);
                                            const isFactory = item.code.includes('(รับโรงตัด)');
                                            const isUpcountry = item.code.includes('(ตจว.)');
                                            
                                            return (
                                                <div key={index} className={`flex justify-between bg-white border border-gray-100 p-3.5 rounded-2xl shadow-sm animate-in slide-in-from-bottom-2 border-l-[5px] ${isFactory ? 'border-l-[#ff9500]' : 'border-l-[#007aff]'}`}>
                                                    <div className="flex flex-col justify-center">
                                                        <div className="flex items-center gap-2 mb-1.5">
                                                            <span className="font-bold text-base text-gray-900">{item.code}</span>
                                                        </div>
                                                        <div className="flex items-center flex-wrap gap-1.5">
                                                            {/* ป้ายกำกับแยกสีชัดเจน */}
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${isFactory ? 'bg-[#fff5e5] text-[#ff9500]' : 'bg-[#e5f0ff] text-[#007aff]'}`}>{isFactory ? 'โรงตัด' : 'DC'}</span>
                                                            <span className={`text-[10px] font-medium px-1.5 py-0.5 rounded-md ${isUrgent ? 'bg-[#fff0f0] text-red-600 font-bold' : 'bg-[#f2f2f7] text-gray-500'}`}>ดิว: {formatThaiDate(item.dueDate)}</span>
                                                            {isUpcountry && <span className="text-[10px] bg-[#f0effb] text-[#5856d6] px-1.5 py-0.5 rounded-md font-bold">ตจว.</span>}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-1.5 items-center">
                                                        <button onClick={() => { setEditingIndex(index); setEditDueDate(item.dueDate); setEditIsFactory(isFactory); setEditIsUpcountry(isUpcountry); }} className="btn-ios text-gray-400 hover:text-gray-600 w-8 h-8 bg-[#f2f2f7] rounded-full flex items-center justify-center"><i className="fa-solid fa-pen text-[11px]"></i></button>
                                                        <button onClick={() => setCurrentItems(prev => prev.filter((_, i) => i !== index))} className="btn-ios text-gray-400 hover:text-red-500 w-8 h-8 bg-[#f2f2f7] rounded-full flex items-center justify-center"><i className="fa-solid fa-trash-can text-[11px]"></i></button>
                                                    </div>
                                                </div>
                                            )
                                        })
                                    )}
                                </div>
                                
                                {/* Footer */}
                                <div className="p-4 bg-white border-t border-gray-100 z-10 shrink-0">
                                    <button onClick={() => setShowConfirmModal(true)} disabled={currentItems.length === 0 || isSaving} className="btn-ios w-full text-white font-semibold text-base py-3.5 rounded-[14px] bg-[#007aff] disabled:bg-[#e5e5ea] disabled:text-gray-400 flex justify-center items-center gap-2">
                                        บันทึกเข้าระบบ
                                    </button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const HistoryTab = ({ isActive, refreshTrigger }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [isFetchingSummary, setIsFetchingSummary] = useState(false); 
            
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastFetchedMonth, setLastFetchedMonth] = useState(null);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!isActive) return;

                const fetchHistory = async () => {
                    setIsLoadingHistory(true);
                    const cacheKey = `history_data_${selectedMonth}`;
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${selectedMonth}`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) throw new Error("Server error");
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            setMonthHistoryData(json.data);
                            localStorage.setItem(cacheKey, JSON.stringify(json.data));
                        }
                    } catch (error) { 
                        const cachedData = localStorage.getItem(cacheKey);
                        if (cachedData) { try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} }
                    } finally { 
                        setIsLoadingHistory(false); 
                        setLastFetchedMonth(selectedMonth);
                    }
                };

                if (selectedMonth !== lastFetchedMonth || refreshTrigger > 0) {
                    const cacheKey = `history_data_${selectedMonth}`;
                    const cachedData = localStorage.getItem(cacheKey);
                    if (cachedData && selectedMonth !== lastFetchedMonth) { 
                        try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} 
                    }
                    fetchHistory();
                }
            }, [isActive, selectedMonth, refreshTrigger]);

            const getMonthlyStats = () => {
                const year = parseInt(selectedMonth.split('-')[0]);
                const month = parseInt(selectedMonth.split('-')[1]);
                const daysInMonth = new Date(year, month, 0).getDate();
                
                const stats = Array.from({length: daysInMonth}, () => ({ 
                    morning:0, afternoon:0, evening:0, 
                    urgent:0, total:0, 
                    before1Day: 0, before2DaysPlus: 0, sameDay: 0, afterDue: 0,
                    evening_before1Day: 0, evening_before2Days: 0, evening_before3DaysPlus: 0, evening_afterDue: 0
                }));
                
                let totalMonthCount = 0;
                let todayTotal = 0, todayMorning = 0, todayAfternoon = 0, todayEvening = 0;
                const todayStr = new Date().toLocaleDateString('en-CA');

                const parseDateLocal = (dStr) => {
                    const parts = dStr.split('-');
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                };

                monthHistoryData.forEach(item => {
                    const day = parseInt(item.date.split('-')[2]) - 1;
                    const count = Number(item.count) || 0;
                    
                    if (day >= 0 && day < daysInMonth) {
                        totalMonthCount += count;
                        stats[day].total += count;

                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) stats[day].morning += count;
                        else if (hour < 18) stats[day].afternoon += count;
                        else stats[day].evening += count;

                        const scanDateObj = parseDateLocal(item.date);
                        const dueDateObj = parseDateLocal(item.dueDate);
                        
                        const diffTime = dueDateObj.getTime() - scanDateObj.getTime();
                        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                        if (hour < 18) {
                            if (diffDays === 1) stats[day].before1Day += count; 
                            else if (diffDays >= 2) stats[day].before2DaysPlus += count; 
                            else if (diffDays === 0) stats[day].sameDay += count;    
                            else if (diffDays < 0) stats[day].afterDue += count;   
                        } else {
                            if (diffDays === 1) stats[day].evening_before1Day += count;
                            else if (diffDays === 2) stats[day].evening_before2Days += count;
                            else if (diffDays >= 3) stats[day].evening_before3DaysPlus += count;
                            else if (diffDays < 0) stats[day].evening_afterDue += count;
                        }

                        const sendDate = new Date(item.date); sendDate.setHours(0,0,0,0);
                        const nextDay = new Date(sendDate); nextDay.setDate(sendDate.getDate() + 1);
                        const dDate = new Date(item.dueDate); dDate.setHours(0,0,0,0);
                        if (dDate.getTime() <= nextDay.getTime()) stats[day].urgent += count;
                    }

                    if (item.date === todayStr) {
                        todayTotal += count;
                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) todayMorning += count;
                        else if (hour < 18) todayAfternoon += count;
                        else todayEvening += count;
                    }
                });
                return { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening };
            };

            const { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening } = getMonthlyStats();

            useEffect(() => {
                if (!isActive || !chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();
                
                const ctx = chartRef.current.getContext('2d');
                const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
                const dataTotals = stats.map(d => d.total);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'จำนวน', data: dataTotals, backgroundColor: '#007aff', borderRadius: 6, barPercentage: 0.6 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: {family: "'Prompt', sans-serif", size: 10} }, grid: { color: '#f2f2f7' }, border: {display: false} }, x: { grid: { display: false }, ticks: { font: {family: "'Prompt', sans-serif", size: 10} }, border: {display: false} } }, animation: { duration: 800 } }
                });
            }, [stats, isActive, daysInMonth]);

            const handleExportExcel = async () => {
                if (!window.ExcelJS) { alert('กำลังโหลดระบบ...'); return; }
                setIsExporting(true);
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('สรุปยอด');
                    const year = parseInt(selectedMonth.split('-')[0]);
                    const month = parseInt(selectedMonth.split('-')[1]);
                    const thaiMonth = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month-1];
                    const thaiYear = year + 543;

                    const compHeader = ['วันที่'];
                    const compTotal = ['จำนวนเที่ยวทั้งหมด'];
                    const compBefore1Day = ['ส่งบิลก่อนวันนัดส่ง 1 วัน (งานด่วน)'];
                    const compBefore2DaysPlus = ['ส่งบิลก่อนดิวส่ง 2 วันขึ้นไป'];
                    const compSameDay = ['ส่งบิลในวันนัดส่ง'];
                    const compAfterDue = ['ส่งบิลหลังคิวส่ง (ล่าช้า)'];
                    const compEvening = ['ส่งบิลหลัง 18.00 น. (รวม)'];

                    let sumTotal=0;
                    for(let i=0; i<daysInMonth; i++) {
                        compHeader.push(i+1);
                        compTotal.push(stats[i].total); sumTotal += stats[i].total;
                    }

                    compHeader.push('Total');
                    compTotal.push(sumTotal);

                    sheet.addRow([`เดือน ${thaiMonth} ${thaiYear}`]);
                    const titleCell = sheet.getCell('A1');
                    titleCell.font = { name: 'Sarabun', bold: true, size: 16 };
                    sheet.mergeCells('A1:C1');

                    sheet.addRow(compHeader);
                    sheet.addRow(compTotal);

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    window.saveAs(blob, `สรุปยอด_${thaiMonth}_${thaiYear}.xlsx`);
                } catch (err) { alert('ส่งออก Excel ไม่สำเร็จ'); } finally { setIsExporting(false); }
            };

            const handleGetDailySummary = async () => {
                setIsFetchingSummary(true);
                try {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDailySummaryText&date=${todayStr}`);
                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("เชื่อมต่อผิดพลาด"); return; }
                    
                    const result = JSON.parse(text);
                    if (result.status === 'success') {
                        setLineMessageToCopy(result.data);
                        setShowCopyModal(true);
                    } else { alert("เกิดข้อผิดพลาดจากฝั่งเซิร์ฟเวอร์"); }
                } catch (error) { alert("ดึงข้อมูลไม่สำเร็จ"); } finally { setIsFetchingSummary(false); }
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto space-y-5 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {showCopyModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white/95 backdrop-blur-xl rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-in zoom-in-95">
                                <div className="text-center mb-4">
                                    <h3 className="text-lg font-bold text-gray-900">สรุปยอดประจำวัน</h3>
                                </div>
                                <div className="bg-[#f2f2f7] p-4 rounded-2xl mb-5 max-h-[40vh] overflow-y-auto text-left">
                                    <pre className="text-[13px] text-gray-700 whitespace-pre-wrap font-sans">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-ios flex-1 py-3.5 bg-[#e5e5ea] text-gray-800 rounded-xl font-semibold text-sm">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-ios flex-1 py-3.5 bg-[#007aff] text-white rounded-xl font-semibold flex justify-center items-center gap-2 text-sm"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* เมนูด้านบน */}
                    <div className="flex items-center justify-between bg-white p-4 pl-5 rounded-3xl shadow-sm border border-gray-100">
                        <span className="text-gray-900 font-bold text-sm">ดึงสรุปยอดประจำวัน</span>
                        <button onClick={handleGetDailySummary} disabled={isFetchingSummary} className="btn-ios px-4 py-2.5 bg-[#f2f2f7] text-[#007aff] rounded-xl font-semibold text-xs flex items-center gap-2">
                            {isFetchingSummary ? <i className="fa-solid fa-circle-notch animate-spin"></i> : 'ดึงข้อมูล'}
                        </button>
                    </div>

                    {/* ตัวเลือกเดือน & ปุ่ม Excel */}
                    <div className="flex flex-col sm:flex-row justify-between items-center bg-white p-5 rounded-3xl shadow-sm border border-gray-100 gap-4">
                        <div className="flex-1 w-full">
                            <label className="text-[11px] font-semibold text-gray-500 uppercase block mb-1">เลือกเดือน</label>
                            <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="ios-input rounded-xl px-3 py-2 text-sm font-bold text-gray-900 w-full" />
                        </div>
                        <button onClick={handleExportExcel} disabled={isLoadingHistory || isExporting} className="btn-ios w-full sm:w-auto flex items-center justify-center gap-2 bg-[#f2f2f7] text-gray-900 px-5 py-3 rounded-xl font-semibold text-sm">
                            {isExporting ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-download"></i>} โหลด Excel
                        </button>
                    </div>

                    {/* กล่องยอดรวม */}
                    <div className="bg-gradient-to-r from-[#007aff] to-[#5856d6] rounded-3xl p-6 text-white flex justify-between items-center shadow-md">
                        <div>
                            <h3 className="text-blue-100 text-xs font-medium mb-1">ยอดส่งบิลสะสม (เดือนนี้)</h3>
                            <div className="flex items-baseline gap-2">
                                <span className="text-5xl font-bold">{totalMonthCount}</span>
                                <span className="text-blue-100 font-medium text-sm">รายการ</span>
                            </div>
                        </div>
                        <button onClick={() => setLastFetchedMonth(null)} className="btn-ios w-10 h-10 bg-white/20 rounded-full flex items-center justify-center backdrop-blur-sm"><i className={`fa-solid fa-rotate-right text-sm ${isLoadingHistory ? 'animate-spin' : ''}`}></i></button>
                    </div>
                    
                    {/* สถิติย่อย */}
                    <div className="grid grid-cols-4 gap-3">
                        <div className="bg-white rounded-2xl p-3 flex flex-col items-center shadow-sm border border-gray-100">
                            <span className="text-[10px] font-medium text-gray-500 mb-1">รวมวันนี้</span><span className="text-lg font-bold text-gray-900">{todayTotal}</span>
                        </div>
                        <div className="bg-white rounded-2xl p-3 flex flex-col items-center shadow-sm border border-gray-100">
                            <span className="text-[10px] font-medium text-gray-500 mb-1">เช้า</span><span className="text-lg font-bold text-gray-900">{todayMorning}</span>
                        </div>
                        <div className="bg-white rounded-2xl p-3 flex flex-col items-center shadow-sm border border-gray-100">
                            <span className="text-[10px] font-medium text-gray-500 mb-1">บ่าย</span><span className="text-lg font-bold text-gray-900">{todayAfternoon}</span>
                        </div>
                        <div className="bg-white rounded-2xl p-3 flex flex-col items-center shadow-sm border border-gray-100">
                            <span className="text-[10px] font-medium text-gray-500 mb-1">หลัง 18:00</span><span className="text-lg font-bold text-gray-900">{todayEvening}</span>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-4">
                        <div className="mb-4 pl-1">
                            <h3 className="text-sm font-bold text-gray-900">สถิติรายวัน</h3>
                        </div>
                        <div className="w-full h-56 relative">
                            <canvas ref={chartRef}></canvas>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🧩 Component หลัก (App Wrapper)
        // ==========================================
        function App() {
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('liff_profile_cache');
                return saved ? JSON.parse(saved) : null;
            });
            const [isLiffReady, setIsLiffReady] = useState(false);
            const [activeTab, setActiveTab] = useState('scan');
            const [refreshHistoryTrigger, setRefreshHistoryTrigger] = useState(0); 

            const wakeLockRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try { wakeLockRef.current = await navigator.wakeLock.request('screen'); } 
                    catch (err) {}
                }
            };

            useEffect(() => {
                const initLiff = async () => {
                    try {
                        await liff.init({ liffId: '2009934240-M2LO3My9' });
                        if (liff.isLoggedIn()) {
                            const profile = await liff.getProfile();
                            setUserProfile(profile);
                            localStorage.setItem('liff_profile_cache', JSON.stringify(profile));
                        } else {
                            setUserProfile(null);
                            localStorage.removeItem('liff_profile_cache');
                        }
                        setIsLiffReady(true);
                    } catch (err) {
                        console.error('LIFF init failed', err);
                        setIsLiffReady(true); 
                    }
                };
                initLiff();

                requestWakeLock();
                const handleVisibilityChange = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) wakeLockRef.current.release().catch(()=>{});
                };
            }, []);

            if (!isLiffReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-[#f2f2f7]">
                        <div className="w-8 h-8 border-[3px] border-gray-300 border-t-[#007aff] rounded-full animate-spin mb-4"></div>
                    </div>
                );
            }

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 bg-[#f2f2f7]">
                        <div className="bg-white p-8 rounded-[32px] max-w-sm w-full text-center shadow-sm border border-gray-100">
                            <div className="w-16 h-16 bg-[#f2f2f7] rounded-full flex items-center justify-center mx-auto mb-5">
                                <i className="fa-solid fa-qrcode text-2xl text-gray-900"></i>
                            </div>
                            <h2 className="text-xl font-bold text-gray-900 mb-2">สแกนส่งบิล</h2>
                            <p className="text-xs text-gray-500 mb-8 font-medium">เข้าสู่ระบบเพื่อใช้งาน</p>
                            
                            <button onClick={() => liff.login()} className="btn-ios w-full bg-[#24c759] text-white font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 text-base">
                                <i className="fa-brands fa-line text-xl"></i> เข้าสู่ระบบผ่าน LINE
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-28 relative">
                    {/* Header แบบ iOS (โปร่งแสง) */}
                    <div className="bg-white/70 backdrop-blur-xl px-5 py-3.5 flex items-center justify-between border-b border-gray-200 sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <img src={userProfile.pictureUrl} alt="profile" className="w-10 h-10 rounded-full bg-gray-100" />
                            <div className="flex flex-col">
                                <span className="text-[10px] text-gray-500 font-medium">ยินดีต้อนรับ</span>
                                <span className="text-sm font-bold text-gray-900">{userProfile.displayName}</span>
                            </div>
                        </div>
                        <button onClick={() => {liff.logout(); setUserProfile(null); localStorage.removeItem('liff_profile_cache');}} className="btn-ios text-[11px] text-red-500 bg-[#fff0f0] px-3 py-1.5 rounded-lg font-semibold">ออกจากระบบ</button>
                    </div>

                    <ScannerTab 
                        isActive={activeTab === 'scan'} 
                        userProfile={userProfile} 
                        onSaveSuccess={() => setRefreshHistoryTrigger(prev => prev + 1)} 
                    />
                    
                    <HistoryTab 
                        isActive={activeTab === 'history'} 
                        refreshTrigger={refreshHistoryTrigger} 
                    />

                    {/* Bottom Tab Bar สไตล์ iOS */}
                    <div className="fixed bottom-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-xl border-t border-gray-200 pb-[env(safe-area-inset-bottom)]">
                        <div className="flex w-full max-w-md mx-auto h-[60px]">
                            <button onClick={() => setActiveTab('scan')} className={`flex-1 flex flex-col justify-center items-center transition-colors ${activeTab === 'scan' ? 'text-[#007aff]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-barcode text-[22px] mb-1"></i><span className="text-[10px] font-semibold">สแกน</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex flex-col justify-center items-center transition-colors ${activeTab === 'history' ? 'text-[#007aff]' : 'text-gray-400'}`}>
                                <i className="fa-solid fa-chart-pie text-[22px] mb-1"></i><span className="text-[10px] font-semibold">สรุปยอด</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
