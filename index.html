            font-family: 'Sarabun', sans-serif;

<body class="text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYAYulOU-9KV7t4y08pz_GhicwWL2S9laTWsRkTqHvo5Fk_UIbGPF_EI0-kHzyY1P57A/exec';

        const formatThaiDate = (dateString) => {
            const d = new Date(dateString);
            if (isNaN(d.getTime())) return dateString;
            return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
        };

        const checkIsUrgent = (dateStr) => {
            if (!dateStr) return false;
            const targetDate = new Date(dateStr); targetDate.setHours(0, 0, 0, 0);
            const today = new Date(); today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
            return targetDate.getTime() <= tomorrow.getTime();
        };

        const playBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
                if (navigator.vibrate) navigator.vibrate(200);
            } catch (e) {}
        };

        const playDuplicateVoice = () => {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance('บิลซ้ำค่ะ');
                    utterance.lang = 'th-TH'; 
                    const voices = window.speechSynthesis.getVoices();
                    const thaiVoice = voices.find(voice => voice.lang.includes('th'));
                    if (thaiVoice) utterance.voice = thaiVoice;
                    utterance.pitch = 1.3; utterance.rate = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) {}
        };

        const playSuccessBeep = () => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                osc.connect(gainNode); gainNode.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } catch (e) {}
        };

        const handleCopyTextGlobal = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); alert("คัดลอกข้อความสำเร็จ!"); } catch (err) { alert("ไม่สามารถคัดลอกได้"); }
            document.body.removeChild(textArea);
        };

        // ==========================================
        // 🧩 Component: แท็บสแกน (Scanner Tab)
        // ==========================================
        const ScannerTab = ({ isActive, userProfile, onSaveSuccess }) => {
            const [currentItems, setCurrentItems] = useState(() => {
                const savedBasket = localStorage.getItem('delivery_basket');
                return savedBasket ? JSON.parse(savedBasket) : [];
            });
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(() => {
                const now = new Date();
                now.setDate(now.getDate() + 2);
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
            });
            
            const [deliveryType, setDeliveryType] = useState('DC');
            const [deliveryZone, setDeliveryZone] = useState('NORMAL'); 
            const [showZoneDropdown, setShowZoneDropdown] = useState(false); 
            
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);

            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastSavedMessage, setLastSavedMessage] = useState(() => localStorage.getItem('last_saved_message') || '');
            
            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            const [editIsUpcountry, setEditIsUpcountry] = useState(false); 

            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const dueDateRef = useRef(dueDate);
            const deliveryTypeRef = useRef(deliveryType);
            const deliveryZoneRef = useRef(deliveryZone);
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { deliveryTypeRef.current = deliveryType; }, [deliveryType]);
            useEffect(() => { deliveryZoneRef.current = deliveryZone; }, [deliveryZone]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);
            useEffect(() => { localStorage.setItem('delivery_basket', JSON.stringify(currentItems)); }, [currentItems]);

            useEffect(() => {
                const fetchAllCodes = async () => {
                    const cachedCodes = localStorage.getItem('all_sent_codes_backup');
                    if (cachedCodes) { try { setAllSentCodesCache(new Set(JSON.parse(cachedCodes))); } catch(e) {} }
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) return;
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            const uppercaseCodes = json.data.map(code => String(code).trim().toUpperCase());
                            setAllSentCodesCache(new Set(uppercaseCodes));
                            localStorage.setItem('all_sent_codes_backup', JSON.stringify(uppercaseCodes));
                        }
                    } catch (e) { console.error("Failed to fetch all codes", e); }
                };
                fetchAllCodes();
                
                return () => {
                    if (html5QrCodeRef.current && isScanning) {
                        html5QrCodeRef.current.stop().catch(() => {});
                    }
                }
            }, []);

            const checkDuplicate = useCallback((code) => {
                const cleanCode = String(code).trim().toUpperCase(); 
                if (currentItemsRef.current.some(item => String(item.code).trim().toUpperCase() === cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`อุ๊ย! บิล ${cleanCode} สแกนไปแล้วในตะกร้า!`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                if (allSentCodesCacheRef.current.has(cleanCode)) {
                    playDuplicateVoice();
                    setDuplicateWarning(`ช้าก่อน! บิล ${cleanCode} เคยถูกส่งไปแล้วในระบบ!`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return true;
                }
                return false;
            }, []);

            const startScanner = async () => {
                if (!window.Html5Qrcode) { alert('ระบบสแกนยังโหลดไม่เสร็จ...'); return; }
                const isLineApp = navigator.userAgent.indexOf("Line") > -1;
                if (isLineApp) alert("⚠️ ตรวจพบการใช้งานผ่านแอป LINE\n👉 กรุณากดไอคอน '3 จุด' มุมขวาบน แล้วเลือก 'เปิดใน Safari / Browser' ครับ");

                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    const config = {
                        fps: 10,
                        qrbox: (vw, vh) => ({ width: Math.min(250, vw * 0.8), height: 150 }),
                        aspectRatio: 1.0, 
                        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                    };

                    html5QrCode.start(
                        { facingMode: "environment" }, config,
                        (decodedText) => {
                            if (lastScannedRef.current !== decodedText) {
                                lastScannedRef.current = decodedText;
                                let finalCode = deliveryTypeRef.current === 'FACTORY' ? `${decodedText.trim()}(รับโรงตัด)` : decodedText.trim();
                                if (deliveryZoneRef.current === 'UPCOUNTRY') {
                                    finalCode += '(ตจว.)';
                                }
                                if (!checkDuplicate(finalCode)) {
                                    playBeep();
                                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                                }
                                setTimeout(() => { lastScannedRef.current = null }, 1500);
                            }
                        }, 
                        (err) => {}
                    ).catch((err) => { setIsScanning(false); alert("❌ ไม่สามารถเปิดกล้องได้"); });
                }, 300);
            };

            const stopScanner = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        html5QrCodeRef.current.clear(); 
                        setIsScanning(false); setIsFlashlightOn(false);
                    }).catch(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const toggleFlashlight = async () => {
                if (html5QrCodeRef.current && isScanning) {
                    try {
                        const newState = !isFlashlightOn;
                        await html5QrCodeRef.current.applyVideoConstraints({ advanced: [{ torch: newState }] });
                        setIsFlashlightOn(newState);
                    } catch (error) { alert("อุปกรณ์ไม่รองรับไฟฉายผ่านเว็บครับ"); }
                }
            };

            const handleManualAdd = (e) => {
                e.preventDefault();
                let val = inputValue.trim();
                if (!val) return;

                if (val.length !== 4 && val.length !== 10) {
                    alert("กรุณาพิมพ์เลขเที่ยว 4 หลัก หรือ 10 หลัก เท่านั้นครับ");
                    return;
                }

                if (val.length === 4) {
                    const now = new Date();
                    const yy = String(now.getFullYear()).slice(-2);
                    const mm = String(now.getMonth() + 1).padStart(2, '0');
                    val = `${yy}${mm}00${val}`; 
                }

                let finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                if (deliveryZone === 'UPCOUNTRY') {
                    finalCode += '(ตจว.)';
                }

                if (!checkDuplicate(finalCode)) {
                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate }, ...prev]);
                }
                setInputValue('');
            };

            const saveEditItem = () => {
                if (editingIndex === null) return;
                const newItems = [...currentItems];
                
                let baseCode = newItems[editingIndex].code.replace('(รับโรงตัด)', '').replace('(ตจว.)', '').trim();
                let finalCode = editIsFactory ? `${baseCode}(รับโรงตัด)` : baseCode;
                if (editIsUpcountry) {
                    finalCode += '(ตจว.)';
                }

                const isDuplicate = newItems.some((item, idx) => idx !== editingIndex && String(item.code).trim().toUpperCase() === finalCode.toUpperCase());
                
                if (isDuplicate) { 
                    playDuplicateVoice();
                    setDuplicateWarning(`แก้ประเภทไม่ได้! บิลนี้มีอยู่ในตะกร้าแล้ว`);
                    setTimeout(() => setDuplicateWarning(null), 5000); 
                    return; 
                }

                newItems[editingIndex] = { ...newItems[editingIndex], code: finalCode, dueDate: editDueDate };
                setCurrentItems(newItems);
                setEditingIndex(null);
            };

            const handleTypeToggle = (type) => {
                if (deliveryType === type) {
                    setShowZoneDropdown(!showZoneDropdown);
                } else {
                    setDeliveryType(type);
                    setDeliveryZone('NORMAL');
                    setShowZoneDropdown(false);
                }
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0) return;
                setIsSaving(true); setSaveSuccess(false);

                const now = new Date();
                const currentDateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const currentTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

                const newBatch = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: [...currentItems], date: currentDateStr, time: currentTimeStr, 
                    dueDate: dueDate, timestamp: now.getTime(),
                    userId: userProfile ? userProfile.userId : null
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(newBatch)
                    });

                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("❌ เซิร์ฟเวอร์ตอบกลับผิดพลาด (URL อาจหมดอายุ)"); setIsSaving(false); return; }

                    const result = JSON.parse(text);
                    if (result.status === 'error') {
                        if (result.message === 'DUPLICATE_FOUND') { alert(`❌ ตรวจพบการซ้ำซ้อนในฐานข้อมูล!\nบิลเลขที่: ${result.duplicateCode}`); } 
                        else { alert("❌ เกิดข้อผิดพลาด: " + result.message); }
                        setIsSaving(false); return; 
                    }

                    setCurrentItems([]); localStorage.removeItem('delivery_basket');
                    setSaveSuccess(true); playSuccessBeep();
                    
                    if (result.lineMessage) {
                        setLineMessageToCopy(result.lineMessage);
                        setLastSavedMessage(result.lineMessage); 
                        localStorage.setItem('last_saved_message', result.lineMessage);
                        setTimeout(() => { setShowCopyModal(true); }, 1200); 
                    }
                    
                    onSaveSuccess();
                    
                    const newCodesSet = new Set(allSentCodesCache);
                    newBatch.items.forEach(item => newCodesSet.add(item.code.trim().toUpperCase()));
                    setAllSentCodesCache(newCodesSet);

                    setTimeout(() => setSaveSuccess(false), 3000);
                } catch (error) { alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อ"); } finally { setIsSaving(false); }
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    
                    {/* Modals ต่างๆ ปรับพื้นหลังเป็นขาวสว่าง อ่านง่าย */}
                    {saveSuccess && (
                        <div className="fixed inset-0 bg-indigo-900/80 backdrop-blur-sm z-[150] flex flex-col items-center justify-center animate-in fade-in zoom-in duration-300">
                            <div className="w-28 h-28 bg-white rounded-full flex items-center justify-center mb-6 shadow-[0_0_40px_rgba(255,255,255,0.3)] animate-bounce"><i className="fa-solid fa-check text-6xl text-indigo-500"></i></div>
                            <h2 className="text-4xl font-black text-white drop-shadow-lg mb-2">ส่งสำเร็จ!</h2>
                            <p className="text-indigo-100 text-lg font-medium">ข้อมูลเข้าระบบเรียบร้อยแล้ว</p>
                        </div>
                    )}

                    {duplicateWarning && (
                        <div className="fixed top-5 left-4 right-4 z-[110] bg-rose-500/95 backdrop-blur-md text-white p-4 rounded-2xl shadow-xl flex items-center gap-3 animate-in slide-in-from-top-5 border border-rose-400">
                            <i className="fa-solid fa-triangle-exclamation text-xl"></i><div className="flex-1 font-bold text-sm">{duplicateWarning}</div>
                        </div>
                    )}

                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl animate-in zoom-in-95 border border-slate-100">
                                <div className="text-center mb-5">
                                    <div className="w-16 h-16 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center mx-auto mb-3"><i className="fa-regular fa-copy text-2xl"></i></div>
                                    <h3 className="text-xl font-black text-slate-800">คัดลอกข้อความ</h3>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-[20px] mb-6 max-h-[40vh] overflow-y-auto border border-slate-200 text-left">
                                    <pre className="text-sm font-medium text-slate-700 whitespace-pre-wrap font-sans">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-press flex-1 py-4 bg-slate-100 text-slate-600 rounded-[18px] font-bold text-sm hover:bg-slate-200">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-press flex-1 py-4 bg-indigo-600 text-white rounded-[18px] font-bold text-sm flex justify-center items-center gap-2 shadow-lg shadow-indigo-600/30"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showClearConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl animate-in zoom-in-95 border border-slate-100">
                                <div className="text-center mb-6">
                                    <div className="w-20 h-20 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-5"><i className="fa-solid fa-trash-can text-3xl"></i></div>
                                    <h3 className="text-xl font-black text-slate-800">ยืนยันการล้างตะกร้า?</h3>
                                    <p className="text-slate-500 text-sm mt-2">ข้อมูลที่สแกนมาจะถูกลบทั้งหมด</p>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowClearConfirmModal(false)} className="btn-press flex-1 py-4 bg-slate-100 text-slate-600 rounded-[18px] font-bold hover:bg-slate-200">ยกเลิก</button>
                                    <button onClick={() => { setCurrentItems([]); setShowClearConfirmModal(false); }} className="btn-press flex-1 py-4 bg-rose-600 text-white rounded-[18px] font-bold shadow-lg shadow-rose-600/30">ล้างทั้งหมด</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingIndex !== null && (

                        <div className="lg:col-span-7 space-y-6">
                            
                            {/* กล่องเลือกงานและสแกน */}

                                    </div>

                            {/* กล่องเลือกดิวส่ง */}
                            <div className={`p-6 rounded-[32px] border-2 transition-colors duration-300 shadow-[0_8px_30px_rgb(0,0,0,0.04)] ${checkIsUrgent(dueDate) ? 'bg-rose-50 border-rose-200' : 'bg-white border-slate-100'}`}>
                                <div className="flex items-center justify-between mb-4">
                                    <label className={`text-base font-black flex items-center gap-2 ${checkIsUrgent(dueDate) ? 'text-rose-700' : 'text-slate-800'}`}><i className="fa-regular fa-calendar-check text-xl"></i> กำหนดวันดิวส่ง</label>
                                    {checkIsUrgent(dueDate) && <span className="bg-rose-500 text-white text-[11px] px-3 py-1.5 rounded-full font-bold shadow-sm animate-pulse"><i className="fa-solid fa-bolt mr-1"></i> ด่วนพิเศษ</span>}
                                </div>
                                <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)} className="w-full px-5 py-4 bg-slate-50 focus:bg-white border border-slate-200 rounded-[20px] outline-none font-bold text-slate-800 text-lg focus:border-indigo-400 focus:ring-2 focus:ring-indigo-50 transition-all" />
                            </div>
                        </div>

                        {/* ฝั่งขวา: ตะกร้าบิล (ล็อคความสูง มี Scrollbar) */}
                        <div className="lg:col-span-5 flex flex-col h-[500px] lg:h-[600px]">
                            {/* กล่องตะกร้าพื้นสีขาว สว่างอ่านง่าย */}
                            <div className="flex flex-col bg-white rounded-[36px] p-4 shadow-xl shadow-slate-200/50 border border-slate-100 relative flex-1 overflow-hidden">
                                {isSaving && <div className="absolute inset-0 bg-white/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center rounded-[36px]"><div className="w-14 h-14 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div><span className="font-bold text-indigo-700 text-lg">กำลังประมวลผล...</span></div>}
                                
                                {/* Header ตะกร้า */}
                                <div className="flex justify-between items-center px-4 py-3 shrink-0 border-b border-slate-100 mb-3">
                                    <h3 className="text-slate-800 font-black text-xl flex items-center gap-2">
                                        <div className="w-8 h-8 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center"><i className="fa-solid fa-layer-group"></i></div>
                                        ตะกร้ารอส่ง
                                    </h3>
                                    <div className="flex items-center gap-3">
                                        {currentItems.length > 0 && <button onClick={() => setShowClearConfirmModal(true)} className="text-rose-400 hover:text-rose-600 text-xs font-bold transition-colors"><i className="fa-solid fa-trash-can mr-1"></i> ล้าง</button>}
                                        <span className="bg-indigo-600 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md shadow-indigo-600/20">{currentItems.length} เที่ยว</span>
                                    </div>
                                </div>
                                
                                {/* List รายการบิล (ตรงนี้ที่มี Scrollbar) */}
                                <div className="flex-1 overflow-y-auto bg-slate-50/50 rounded-[24px] p-3 space-y-3 custom-scrollbar border border-slate-100">
                                    {currentItems.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                            <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4"><i className="fa-solid fa-inbox text-4xl text-slate-300"></i></div>
                                            <p className="font-bold text-base">ตะกร้ายังว่างเปล่า</p>
                                        </div>
                                    ) : (
                                        currentItems.map((item, index) => {
                                            const isUrgent = checkIsUrgent(item.dueDate);
                                            const isFactory = item.code.includes('(รับโรงตัด)');
                                            const isUpcountry = item.code.includes('(ตจว.)');
                                            return (
                                                <div key={index} className="flex justify-between bg-white border border-slate-100 p-4 rounded-[20px] shadow-sm hover:shadow-md transition-all animate-in slide-in-from-bottom-2">
                                                    <div className="flex flex-col justify-center">
                                                        <span className="font-black text-lg text-slate-800 tracking-wide">{item.code}</span>
                                                        <div className="flex items-center flex-wrap gap-1.5 mt-2">
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-md ${isUrgent ? 'bg-rose-100 text-rose-700' : 'bg-sky-50 text-sky-700'}`}>ดิว: {formatThaiDate(item.dueDate)}</span>
                                                            {isUrgent && <span className="text-[10px] bg-rose-500 text-white px-2 py-0.5 rounded-md font-bold shadow-sm animate-pulse"><i className="fa-solid fa-bolt"></i> ด่วน</span>}
                                                            {isUpcountry && <span className="text-[10px] bg-violet-100 text-violet-700 px-2 py-0.5 rounded-md font-bold"><i className="fa-solid fa-truck-fast mr-1"></i> ตจว.</span>}
                                                            {isFactory && <span className="text-[10px] bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md font-bold">โรงตัด</span>}
                                                        </div>
                                                    </div>
                                                    <div className="flex gap-2 items-center">
                                                        <button onClick={() => { setEditingIndex(index); setEditDueDate(item.dueDate); setEditIsFactory(isFactory); setEditIsUpcountry(isUpcountry); }} className="btn-press text-slate-400 hover:text-indigo-600 w-10 h-10 bg-slate-50 hover:bg-indigo-50 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-pen-to-square"></i></button>
                                                        <button onClick={() => setCurrentItems(prev => prev.filter((_, i) => i !== index))} className="btn-press text-slate-400 hover:text-rose-600 w-10 h-10 bg-slate-50 hover:bg-rose-50 rounded-xl flex items-center justify-center transition-colors"><i className="fa-solid fa-trash-can"></i></button>

                                </div>
                                
                                {/* Footer ปุ่มส่งข้อมูล */}
                                <div className="pt-4 pb-1 shrink-0">
                                    <button onClick={() => setShowConfirmModal(true)} disabled={currentItems.length === 0 || isSaving} className="btn-press w-full text-white font-bold text-lg py-4 rounded-[20px] bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-200 disabled:text-slate-400 shadow-lg shadow-indigo-600/30 disabled:shadow-none transition-all flex justify-center items-center gap-2">

            );
        };

        // ==========================================
        // 🧩 Component: แท็บสรุปประวัติ (History Tab)
        // ==========================================
        const HistoryTab = ({ isActive, refreshTrigger }) => {
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [isFetchingSummary, setIsFetchingSummary] = useState(false); 
            
            const [showCopyModal, setShowCopyModal] = useState(false);
            const [lineMessageToCopy, setLineMessageToCopy] = useState('');
            const [lastFetchedMonth, setLastFetchedMonth] = useState(null);

            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!isActive) return;

                const fetchHistory = async () => {
                    setIsLoadingHistory(true);
                    const cacheKey = `history_data_${selectedMonth}`;
                    try {
                        const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${selectedMonth}`);
                        const text = await res.text();
                        if (text.trim().startsWith('<')) throw new Error("เซิร์ฟเวอร์ส่งกลับเป็นหน้า HTML");
                        const json = JSON.parse(text);
                        if (json.status === 'success' && json.data) {
                            setMonthHistoryData(json.data);
                            localStorage.setItem(cacheKey, JSON.stringify(json.data));
                        }
                    } catch (error) { 
                        const cachedData = localStorage.getItem(cacheKey);
                        if (cachedData) { try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} }
                    } finally { 
                        setIsLoadingHistory(false); 
                        setLastFetchedMonth(selectedMonth);
                    }
                };

                if (selectedMonth !== lastFetchedMonth || refreshTrigger > 0) {
                    const cacheKey = `history_data_${selectedMonth}`;
                    const cachedData = localStorage.getItem(cacheKey);
                    if (cachedData && selectedMonth !== lastFetchedMonth) { 
                        try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {} 
                    }
                    fetchHistory();
                }
            }, [isActive, selectedMonth, refreshTrigger]);

            const getMonthlyStats = () => {
                const year = parseInt(selectedMonth.split('-')[0]);
                const month = parseInt(selectedMonth.split('-')[1]);
                const daysInMonth = new Date(year, month, 0).getDate();
                
                const stats = Array.from({length: daysInMonth}, () => ({ 
                    morning:0, afternoon:0, evening:0, 
                    urgent:0, total:0, 
                    before1Day: 0, before2DaysPlus: 0, sameDay: 0, afterDue: 0,
                    evening_before1Day: 0, evening_before2Days: 0, evening_before3DaysPlus: 0, evening_afterDue: 0
                }));
                
                let totalMonthCount = 0;
                let todayTotal = 0, todayMorning = 0, todayAfternoon = 0, todayEvening = 0;
                const todayStr = new Date().toLocaleDateString('en-CA');

                const parseDateLocal = (dStr) => {
                    const parts = dStr.split('-');
                    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
                };

                monthHistoryData.forEach(item => {
                    const day = parseInt(item.date.split('-')[2]) - 1;
                    const count = Number(item.count) || 0;
                    
                    if (day >= 0 && day < daysInMonth) {
                        totalMonthCount += count;
                        stats[day].total += count;

                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) stats[day].morning += count;
                        else if (hour < 18) stats[day].afternoon += count;
                        else stats[day].evening += count; 

                        const scanDateObj = parseDateLocal(item.date);
                        const dueDateObj = parseDateLocal(item.dueDate);
                        
                        const diffTime = dueDateObj.getTime() - scanDateObj.getTime();
                        const diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24));

                        if (hour < 18) {
                            if (diffDays === 1) stats[day].before1Day += count; 
                            else if (diffDays >= 2) stats[day].before2DaysPlus += count; 
                            else if (diffDays === 0) stats[day].sameDay += count;    
                            else if (diffDays < 0) stats[day].afterDue += count;   
                        } else {
                            if (diffDays === 1) stats[day].evening_before1Day += count;
                            else if (diffDays === 2) stats[day].evening_before2Days += count;
                            else if (diffDays >= 3) stats[day].evening_before3DaysPlus += count;
                            else if (diffDays < 0) stats[day].evening_afterDue += count;
                        }

                        const sendDate = new Date(item.date); sendDate.setHours(0,0,0,0);
                        const nextDay = new Date(sendDate); nextDay.setDate(sendDate.getDate() + 1);
                        const dDate = new Date(item.dueDate); dDate.setHours(0,0,0,0);
                        if (dDate.getTime() <= nextDay.getTime()) stats[day].urgent += count;
                    }

                    if (item.date === todayStr) {
                        todayTotal += count;
                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) todayMorning += count;
                        else if (hour < 18) todayAfternoon += count;
                        else todayEvening += count;
                    }
                });
                return { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening };
            };

            const { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening } = getMonthlyStats();

            useEffect(() => {
                if (!isActive || !chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();
                
                const ctx = chartRef.current.getContext('2d');
                const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
                const dataTotals = stats.map(d => d.total);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'bar',
                    data: { labels: labels, datasets: [{ label: 'รวมเที่ยวส่ง', data: dataTotals, backgroundColor: 'rgba(79, 70, 229, 0.8)', borderColor: 'rgb(67, 56, 202)', borderWidth: 1, borderRadius: 6 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: {family: "'Sarabun', sans-serif"} } }, x: { grid: { display: false }, ticks: { font: {family: "'Sarabun', sans-serif"} } } }, animation: { duration: 1000 } }
                });
            }, [stats, isActive, daysInMonth]);

            const handleExportExcel = async () => {
                if (!window.ExcelJS) { alert('ระบบสร้างไฟล์กำลังโหลด...'); return; }
                setIsExporting(true);
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('สรุปยอดส่งบิล');
                    const year = parseInt(selectedMonth.split('-')[0]);
                    const month = parseInt(selectedMonth.split('-')[1]);
                    const thaiMonth = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month-1];
                    const thaiYear = year + 543;

                    const compHeader = ['วันที่'];
                    const compTotal = ['จำนวนเที่ยวทั้งหมด'];
                    const compBefore1Day = ['ส่งบิลก่อนวันนัดส่ง 1 วัน (งานด่วน)'];
                    const compBefore2DaysPlus = ['ส่งบิลก่อนดิวส่ง 2 วันขึ้นไป'];
                    const compSameDay = ['ส่งบิลในวันนัดส่ง'];
                    const compAfterDue = ['ส่งบิลหลังคิวส่ง (ล่าช้า)'];
                    const compEvening = ['ส่งบิลหลัง 18.00 น. (รวม)'];
                    const compEvening_b1 = ['    - ดิวส่งล่วงหน้า 1 วัน'];
                    const compEvening_b2 = ['    - ดิวส่งล่วงหน้า 2 วัน'];
                    const compEvening_b3p = ['    - ดิวส่งล่วงหน้า 3 วันขึ้นไป'];
                    const compEvening_after = ['    - ดิวส่งล่าช้า (หลังคิวส่ง)'];

                    let sumTotal=0, sumCompBefore1Day=0, sumCompBefore2DaysPlus=0, sumCompSameDay=0, sumCompAfterDue=0;
                    let sumEvening=0, sumCompEvening_b1=0, sumCompEvening_b2=0, sumCompEvening_b3p=0, sumCompEvening_after=0;

                    for(let i=0; i<daysInMonth; i++) {
                        compHeader.push(i+1);
                        compTotal.push(stats[i].total); sumTotal += stats[i].total;
                        compBefore1Day.push(stats[i].before1Day); sumCompBefore1Day += stats[i].before1Day;
                        compBefore2DaysPlus.push(stats[i].before2DaysPlus); sumCompBefore2DaysPlus += stats[i].before2DaysPlus;
                        compSameDay.push(stats[i].sameDay); sumCompSameDay += stats[i].sameDay;
                        compAfterDue.push(stats[i].afterDue); sumCompAfterDue += stats[i].afterDue;
                        compEvening.push(stats[i].evening); sumEvening += stats[i].evening;
                        compEvening_b1.push(stats[i].evening_before1Day); sumCompEvening_b1 += stats[i].evening_before1Day;
                        compEvening_b2.push(stats[i].evening_before2Days); sumCompEvening_b2 += stats[i].evening_before2Days;
                        compEvening_b3p.push(stats[i].evening_before3DaysPlus); sumCompEvening_b3p += stats[i].evening_before3DaysPlus;
                        compEvening_after.push(stats[i].evening_afterDue); sumCompEvening_after += stats[i].evening_afterDue;
                    }

                    compHeader.push('Total');
                    compTotal.push(sumTotal);
                    compBefore1Day.push(sumCompBefore1Day);
                    compBefore2DaysPlus.push(sumCompBefore2DaysPlus);
                    compSameDay.push(sumCompSameDay);
                    compAfterDue.push(sumCompAfterDue);
                    compEvening.push(sumEvening);
                    compEvening_b1.push(sumCompEvening_b1);
                    compEvening_b2.push(sumCompEvening_b2);
                    compEvening_b3p.push(sumCompEvening_b3p);
                    compEvening_after.push(sumCompEvening_after);

                    sheet.addRow([`เดือน ${thaiMonth} ${thaiYear}`]);
                    const titleCell = sheet.getCell('A1');
                    titleCell.font = { name: 'Sarabun', bold: true, size: 16 };
                    sheet.mergeCells('A1:C1');

                    const rComp1 = sheet.addRow(compHeader);
                    const rComp2 = sheet.addRow(compTotal);
                    const rComp3 = sheet.addRow(compBefore1Day); 
                    const rComp4 = sheet.addRow(compBefore2DaysPlus); 
                    const rComp5 = sheet.addRow(compSameDay);
                    const rComp6 = sheet.addRow(compAfterDue);
                    const rComp7 = sheet.addRow(compEvening);
                    const rComp7_1 = sheet.addRow(compEvening_b1);
                    const rComp7_2 = sheet.addRow(compEvening_b2);
                    const rComp7_3 = sheet.addRow(compEvening_b3p);
                    const rComp7_4 = sheet.addRow(compEvening_after);

                    const styleCompRow = (row, bgArgb, fontColorArgb, isBold = false) => {
                        row.eachCell((cell, colNumber) => {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } };
                            cell.font = { name: 'Sarabun', size: 12, color: { argb: fontColorArgb }, bold: isBold };
                            cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                            cell.alignment = { vertical: 'middle', horizontal: colNumber === 1 ? 'left' : 'center' };
                        });
                        const lastColNumber = daysInMonth + 2;
                        const lastCell = row.getCell(lastColNumber);
                        lastCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFF00' } };
                        lastCell.font = { name: 'Sarabun', size: 12, color: { argb: fontColorArgb }, bold: true };
                    };

                    rComp1.eachCell((cell, colNumber) => {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB4C6E7' } };
                        cell.font = { name: 'Sarabun', size: 12, color: { argb: 'FF000000' }, bold: true };
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        cell.alignment = { vertical: 'middle', horizontal: 'center' };
                    });

                    styleCompRow(rComp2, 'FFFFFFFF', 'FFFF0000', true); 
                    rComp2.getCell(1).font = { name: 'Sarabun', size: 12, color: { argb: 'FF000000' }, bold: true }; 

                    styleCompRow(rComp3, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp4, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp5, 'FFFFFFFF', 'FF000000');
                    styleCompRow(rComp6, 'FFFFFFFF', 'FF000000');

                    styleCompRow(rComp7, 'FFEFF6FF', 'FF1E40AF', true); 
                    styleCompRow(rComp7_1, 'FFFFFFFF', 'FF475569'); 
                    styleCompRow(rComp7_2, 'FFFFFFFF', 'FF475569');
                    styleCompRow(rComp7_3, 'FFFFFFFF', 'FF475569');
                    styleCompRow(rComp7_4, 'FFFFFFFF', 'FF475569');
                    
                    rComp7_1.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_2.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_3.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };
                    rComp7_4.getCell(1).alignment = { vertical: 'middle', horizontal: 'left', indent: 1 };

                    sheet.getColumn(1).width = 40; 
                    for(let i=2; i<=daysInMonth+1; i++) sheet.getColumn(i).width = 5; 
                    sheet.getColumn(daysInMonth+2).width = 8;

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    window.saveAs(blob, `สรุปยอดส่งบิล_${thaiMonth}_${thaiYear}.xlsx`);
                } catch (err) { alert('เกิดข้อผิดพลาดในการสร้างไฟล์ Excel'); } finally { setIsExporting(false); }
            };

            const handleGetDailySummary = async () => {
                setIsFetchingSummary(true);
                try {
                    const todayStr = new Date().toLocaleDateString('en-CA');
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDailySummaryText&date=${todayStr}`);
                    const text = await response.text();
                    if (text.trim().startsWith('<')) { alert("❌ เซิร์ฟเวอร์ตอบกลับผิดพลาด"); return; }
                    
                    const result = JSON.parse(text);
                    if (result.status === 'success') {
                        setLineMessageToCopy(result.data);
                        setShowCopyModal(true);
                    } else { alert("❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์"); }
                } catch (error) { alert("❌ ไม่สามารถดึงข้อมูลสรุปได้"); } finally { setIsFetchingSummary(false); }
            };

            const forceRefresh = () => {
                setLastFetchedMonth(null); 
            };

            return (
                <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto space-y-6 ${isActive ? 'block' : 'hidden'}`}>
                    {showCopyModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[160] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[32px] p-8 w-full max-w-sm shadow-2xl animate-in zoom-in-95 border border-slate-100">
                                <div className="text-center mb-5">
                                    <div className="w-16 h-16 bg-sky-100 text-sky-600 rounded-full flex items-center justify-center mx-auto mb-3"><i className="fa-regular fa-copy text-2xl"></i></div>
                                    <h3 className="text-xl font-black text-slate-800">คัดลอกข้อความแจ้งเตือน</h3>
                                </div>
                                <div className="bg-slate-50 p-4 rounded-[20px] mb-6 max-h-[40vh] overflow-y-auto border border-slate-200 text-left">
                                    <pre className="text-sm font-medium text-slate-700 whitespace-pre-wrap font-sans">{lineMessageToCopy}</pre>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowCopyModal(false)} className="btn-press flex-1 py-4 bg-slate-100 text-slate-600 rounded-[18px] font-bold text-sm hover:bg-slate-200">ปิด</button>
                                    <button onClick={() => handleCopyTextGlobal(lineMessageToCopy)} className="btn-press flex-1 py-4 bg-indigo-600 text-white rounded-[18px] font-bold text-sm flex justify-center items-center gap-2 shadow-lg shadow-indigo-600/30"><i className="fa-solid fa-copy"></i> คัดลอก</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="flex items-center justify-between bg-white border border-slate-100 p-4 pl-6 rounded-[28px] shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                        <div className="flex items-center gap-3">
                            <i className="fa-solid fa-comment-dots text-indigo-500 text-xl"></i>
                            <span className="text-slate-800 font-bold text-sm">คัดลอกสรุปยอดวันนี้</span>
                        </div>
                        <button onClick={handleGetDailySummary} disabled={isFetchingSummary} className="btn-press px-5 py-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-[16px] font-bold text-xs flex items-center justify-center gap-2 transition-colors">
                            {isFetchingSummary ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-copy"></i>} ดึงข้อความ
                        </button>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-between items-center bg-white px-6 py-6 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 gap-4">
                        <div className="flex items-center gap-4 w-full sm:w-auto">
                            <div className="bg-slate-50 p-4 rounded-[20px] text-slate-400 border border-slate-100"><i className="fa-regular fa-calendar-days text-xl"></i></div>
                            <div className="flex-1">
                                <label className="text-[10px] font-bold text-slate-400 tracking-wider">เลือกเดือนที่ต้องการ</label>
                                <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-transparent text-base font-black text-slate-800 outline-none w-full mt-1" />
                            </div>
                        </div>
                        <button onClick={handleExportExcel} disabled={isLoadingHistory || isExporting} className="btn-press w-full sm:w-auto flex items-center justify-center gap-2 bg-indigo-600 text-white px-6 py-4 rounded-[20px] font-bold shadow-lg shadow-indigo-600/20 hover:bg-indigo-700 transition-colors">
                            {isExporting ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-file-excel"></i>} ดาวน์โหลด Excel
                        </button>
                    </div>

                    <div className="bg-gradient-to-br from-indigo-500 to-blue-600 rounded-[36px] p-8 text-white flex justify-between items-center shadow-xl shadow-indigo-500/20 relative overflow-hidden">
                        <i className="fa-solid fa-chart-line absolute -right-10 -bottom-10 text-9xl text-white/10 rotate-12"></i>
                        <div className="relative z-10">
                            <h3 className="text-indigo-100 text-xs font-bold uppercase tracking-wider mb-2">ยอดส่งบิลสะสมเดือนนี้</h3>
                            <div className="flex items-baseline gap-3"><span className="text-6xl font-black">{totalMonthCount}</span><span className="text-indigo-100 font-bold text-lg">เที่ยว</span></div>
                        </div>
                        <button onClick={forceRefresh} className="btn-press relative z-10 bg-white/20 p-4 rounded-full border border-white/20 hover:bg-white/30 transition-colors"><i className={`fa-solid fa-rotate-right text-xl ${isLoadingHistory ? 'animate-spin' : ''}`}></i></button>
                    </div>
                    
                    <div className="grid grid-cols-4 gap-3 sm:gap-4">
                        <div className="bg-white rounded-[24px] p-5 border border-slate-100 flex flex-col items-center justify-center shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                            <span className="text-[10px] sm:text-xs font-bold text-slate-400 mb-1.5 uppercase">รวมวันนี้</span><span className="text-2xl sm:text-3xl font-black text-slate-800">{todayTotal}</span>
                        </div>
                        <div className="bg-white rounded-[24px] p-5 border border-sky-100 flex flex-col items-center justify-center shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                            <span className="text-[10px] sm:text-xs font-bold text-sky-500 mb-1.5 uppercase">ก่อนเที่ยง</span><span className="text-2xl sm:text-3xl font-black text-sky-600">{todayMorning}</span>
                        </div>
                        <div className="bg-white rounded-[24px] p-5 border border-amber-100 flex flex-col items-center justify-center shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                            <span className="text-[10px] sm:text-xs font-bold text-amber-500 mb-1.5 uppercase">รอบบ่าย</span><span className="text-2xl sm:text-3xl font-black text-amber-600">{todayAfternoon}</span>
                        </div>
                        <div className="bg-white rounded-[24px] p-5 border border-indigo-100 flex flex-col items-center justify-center shadow-[0_8px_30px_rgb(0,0,0,0.04)]">
                            <span className="text-[10px] sm:text-xs font-bold text-indigo-500 mb-1.5 uppercase">หลัง 18.00</span><span className="text-2xl sm:text-3xl font-black text-indigo-600">{todayEvening}</span>
                        </div>
                    </div>

                    <div className="bg-white rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 overflow-hidden">
                        <div className="px-6 py-5 border-b border-slate-100"><h3 className="text-sm font-black text-slate-800"><i className="fa-solid fa-chart-simple text-indigo-500 mr-2"></i>กราฟจำนวนเที่ยวรายวัน</h3></div>
                        <div className="p-6 bg-slate-50/50">
                            <div className="w-full h-64 bg-white p-4 rounded-[24px] border border-slate-100 relative">
                                <canvas ref={chartRef}></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🧩 Component หลัก: โครงสร้างและส่วนเชื่อมโยงทั้งหมด (App Wrapper)
        // ==========================================
        function App() {
            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('liff_profile_cache');
                return saved ? JSON.parse(saved) : null;
            });
            const [isLiffReady, setIsLiffReady] = useState(false);
            const [activeTab, setActiveTab] = useState('scan');
            const [refreshHistoryTrigger, setRefreshHistoryTrigger] = useState(0); 

            const wakeLockRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try { wakeLockRef.current = await navigator.wakeLock.request('screen'); } 
                    catch (err) {}
                }
            };

            useEffect(() => {
                const initLiff = async () => {
                    try {
                        await liff.init({ liffId: '2009934240-M2LO3My9' });
                        if (liff.isLoggedIn()) {
                            const profile = await liff.getProfile();
                            setUserProfile(profile);
                            localStorage.setItem('liff_profile_cache', JSON.stringify(profile));
                        } else {
                            setUserProfile(null);
                            localStorage.removeItem('liff_profile_cache');
                        }
                        setIsLiffReady(true);
                    } catch (err) {
                        console.error('LIFF init failed', err);
                        setIsLiffReady(true); 
                    }
                };
                initLiff();

                requestWakeLock();
                const handleVisibilityChange = () => { if (document.visibilityState === 'visible') requestWakeLock(); };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) wakeLockRef.current.release().catch(()=>{});
                };
            }, []);

            if (!isLiffReady) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center">
                        <div className="w-14 h-14 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-500 font-bold text-sm animate-pulse">กำลังตรวจสอบข้อมูล...</p>
                    </div>
                );
            }

            if (!userProfile) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-[36px] shadow-2xl shadow-indigo-100/50 border border-white max-w-sm w-full text-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-bl-[100px] -z-10"></div>
                            <div className="w-24 h-24 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6 relative z-10 border-4 border-white shadow-sm">
                                <i className="fa-solid fa-qrcode text-5xl"></i>
                            </div>
                            <h2 className="text-2xl font-black text-slate-800 mb-2 relative z-10">ระบบสแกนส่งบิล</h2>
                            <p className="text-sm text-slate-500 mb-8 font-medium relative z-10">กรุณาเข้าสู่ระบบผ่านบัญชี LINE ของคุณเพื่อยืนยันตัวตนก่อนจัดส่งข้อมูล</p>
                            
                            <button onClick={() => liff.login()} className="btn-press w-full bg-[#06C755] hover:bg-[#05b34c] text-white font-bold py-4 rounded-[20px] shadow-lg shadow-[#06C755]/30 transition-all flex items-center justify-center gap-3 relative z-10">
                                <i className="fa-brands fa-line text-2xl"></i> เข้าสู่ระบบด้วย LINE
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-32 relative">
                    <div className="bg-white/80 backdrop-blur-md px-5 py-3.5 flex items-center justify-between shadow-sm sticky top-0 z-50 border-b border-slate-100">
                        <div className="flex items-center gap-3.5">
                            <img src={userProfile.pictureUrl} alt="profile" className="w-11 h-11 rounded-full border-[3px] border-indigo-100 shadow-sm" />
                            <div className="flex flex-col">
                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">เข้าสู่ระบบแล้ว</span>
                                <span className="text-sm font-black text-slate-800">{userProfile.displayName}</span>
                            </div>
                        </div>
                        <button onClick={() => {liff.logout(); setUserProfile(null); localStorage.removeItem('liff_profile_cache');}} className="btn-press text-[10px] text-rose-500 bg-rose-50 px-3.5 py-1.5 rounded-full font-bold hover:bg-rose-100">ออกจากระบบ</button>
                    </div>

                    <ScannerTab 
                        isActive={activeTab === 'scan'} 
                        userProfile={userProfile} 
                        onSaveSuccess={() => setRefreshHistoryTrigger(prev => prev + 1)} 
                    />
                    
                    <HistoryTab 
                        isActive={activeTab === 'history'} 
                        refreshTrigger={refreshHistoryTrigger} 
                    />

                    {/* แถบนำทางด้านล่าง (Bottom Nav) ปรับเป็นสี Indigo แบบ Capsule */}
                    <div className="fixed bottom-6 left-0 right-0 z-40 pb-[env(safe-area-inset-bottom)] flex justify-center px-4 pointer-events-none">
                        <div className="bg-white/90 backdrop-blur-md border border-slate-100 p-1.5 rounded-[32px] flex w-full max-w-[320px] pointer-events-auto shadow-[0_10px_40px_rgba(0,0,0,0.08)]">
                            <button onClick={() => setActiveTab('scan')} className={`btn-press flex-1 flex justify-center items-center h-14 rounded-[28px] transition-all ${activeTab === 'scan' ? 'bg-indigo-600 text-white shadow-md shadow-indigo-600/20' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fa-solid fa-barcode text-xl"></i><span className="ml-2.5 font-bold text-sm">สแกนบิล</span></button>
                            <button onClick={() => setActiveTab('history')} className={`btn-press flex-1 flex justify-center items-center h-14 rounded-[28px] transition-all ${activeTab === 'history' ? 'bg-indigo-600 text-white shadow-md shadow-indigo-600/20' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fa-solid fa-clipboard-list text-xl"></i><span className="ml-2.5 font-bold text-sm">สรุปยอด</span></button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
