        body { 
            font-family: 'Sarabun', sans-serif; 
            -webkit-tap-highlight-color: transparent;

            /* สีพื้นหลัง ธีมเดิมเป๊ะๆ */
            background-image: radial-gradient(at 0% 0%, hsla(152,100%,94%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(210,100%,97%,1) 0, transparent 50%);

<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // ==========================================
            // ⚠️ URL จาก Google Apps Script (ใส่ URL ของคุณที่นี่)
            // ==========================================
            const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwlTjz4vhFqiuQ2YJjhyego-NbSTdBPO-eF1-MveHH5ciMf71uQrDxWa-Ow4WIjYJMANg/exec';

            const [activeTab, setActiveTab] = useState('scan');
            const [currentItems, setCurrentItems] = useState([]); 
            const [inputValue, setInputValue] = useState('');
            const [dueDate, setDueDate] = useState(''); 
            
            // 🏷️ State สำหรับเลือกประเภท (DC หรือ โรงตัด)
            const [deliveryType, setDeliveryType] = useState('DC'); // 'DC' หรือ 'FACTORY'
            
            const [date, setDate] = useState('');
            const [time, setTime] = useState('');
            const [isTimeLocked, setIsTimeLocked] = useState(true);
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinValue, setPinValue] = useState('');
            
            const [selectedMonth, setSelectedMonth] = useState(new Date().toLocaleDateString('en-CA').substring(0, 7));
            const [monthHistoryData, setMonthHistoryData] = useState([]);
            const [isLoadingHistory, setIsLoadingHistory] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            
            // 🛡️ State สำหรับเก็บเลขบิลทั้งหมดที่เคยส่งไปแล้วในระบบ
            const [allSentCodesCache, setAllSentCodesCache] = useState(new Set());
            
            const [duplicateWarning, setDuplicateWarning] = useState(null);
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            
            // 🗑️ State ใหม่ สำหรับจัดการ Pop-up ล้างตะกร้าทั้งหมด
            const [showClearConfirmModal, setShowClearConfirmModal] = useState(false);
            
            const [isScanning, setIsScanning] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [saveSuccess, setSaveSuccess] = useState(false);

            // ✏️ State สำหรับแก้ไขบิลในตะกร้า
            const [editingIndex, setEditingIndex] = useState(null);
            const [editDueDate, setEditDueDate] = useState('');
            const [editIsFactory, setEditIsFactory] = useState(false);
            
            // 🔦 State สำหรับไฟฉาย
            const [isFlashlightOn, setIsFlashlightOn] = useState(false);
            
            const html5QrCodeRef = useRef(null);
            const lastScannedRef = useRef(null);
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            
            // ใช้ Ref เก็บค่าล่าสุดป้องกันปัญหา Stale Closure ในฟังก์ชันสแกน
            const dueDateRef = useRef(dueDate); 
            const deliveryTypeRef = useRef(deliveryType);
            const currentItemsRef = useRef(currentItems);
            const allSentCodesCacheRef = useRef(allSentCodesCache);

            useEffect(() => { dueDateRef.current = dueDate; }, [dueDate]);
            useEffect(() => { deliveryTypeRef.current = deliveryType; }, [deliveryType]);
            useEffect(() => { currentItemsRef.current = currentItems; }, [currentItems]);
            useEffect(() => { allSentCodesCacheRef.current = allSentCodesCache; }, [allSentCodesCache]);

            // ==========================================
            // 🌟 ระบบป้องกันหน้าจอดับ (Screen Wake Lock)
            // ==========================================
            const wakeLockRef = useRef(null);

            const requestWakeLock = async () => {
                if ('wakeLock' in navigator) {
                    try {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                    } catch (err) {
                        console.log(`Wake Lock error: ${err.message}`);
                    }
                }
            };

            // ดึงข้อมูลบิลทั้งหมดจากระบบ
            const fetchAllCodes = async () => {
                const cachedCodes = localStorage.getItem('all_sent_codes_backup');
                if (cachedCodes) {
                    try {
                        setAllSentCodesCache(new Set(JSON.parse(cachedCodes)));
                    } catch(e) {}
                }

                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getAllCodes`);
                    const text = await res.text();
                    
                    // ดักจับการตอบกลับผิดพลาด (ถ้าส่งกลับมาเป็นหน้า HTML เช่น หน้า Error ของ Google)
                    if (text.trim().startsWith('<')) {
                        console.error("API returned HTML instead of JSON. Check deployment settings (Who has access must be 'Anyone').");
                        return;
                    }

                    const json = JSON.parse(text);
                    if (json.status === 'success' && json.data) {
                        const uppercaseCodes = json.data.map(code => String(code).trim().toUpperCase());
                        setAllSentCodesCache(new Set(uppercaseCodes));
                        localStorage.setItem('all_sent_codes_backup', JSON.stringify(uppercaseCodes));
                    }
                } catch (e) { console.error("Failed to fetch all codes", e); }
            };

            useEffect(() => {
                requestWakeLock();
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible') requestWakeLock();
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                const savedBasket = localStorage.getItem('delivery_basket');
                if (savedBasket) {
                    try { setCurrentItems(JSON.parse(savedBasket)); } catch (e) {}
                }
                
                // 🗓️ ตั้งค่าเริ่มต้น ดิวส่งเป็น "วันมะรืน" (+2 วัน)
                const now = new Date();
                const defaultDue = new Date(now);
                defaultDue.setDate(defaultDue.getDate() + 2);
                setDueDate(`${defaultDue.getFullYear()}-${String(defaultDue.getMonth() + 1).padStart(2, '0')}-${String(defaultDue.getDate()).padStart(2, '0')}`);
                
                fetchAllCodes(); 
                fetchHistoryForMonth(selectedMonth);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current !== null) wakeLockRef.current.release().catch(()=>{});
                    if (html5QrCodeRef.current && isScanning) html5QrCodeRef.current.stop().catch(() => {});
                };
            }, []);

            useEffect(() => {
                localStorage.setItem('delivery_basket', JSON.stringify(currentItems));
            }, [currentItems]);

            useEffect(() => {
                if (!isTimeLocked) return;
                const updateCurrentTime = () => {
                    const now = new Date();
                    setDate(`${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`);
                    setTime(`${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
                };
                updateCurrentTime(); 
                const interval = setInterval(updateCurrentTime, 10000);
                return () => clearInterval(interval);
            }, [isTimeLocked]);

            useEffect(() => { fetchHistoryForMonth(selectedMonth); }, [selectedMonth]);

            // 🚀 ฟังก์ชันดึงประวัติ (เพิ่มระบบ Cache ให้โหลดข้อมูลทันที)
            const fetchHistoryForMonth = async (monthStr) => {
                const cacheKey = `history_data_${monthStr}`;
                const cachedData = localStorage.getItem(cacheKey);
                
                // ถ้ามีข้อมูลในเครื่องให้เอามาแสดงก่อนเลย ไม่ต้องรอโหลด
                if (cachedData) {
                    try { setMonthHistoryData(JSON.parse(cachedData)); } catch(e) {}
                } else {
                    setMonthHistoryData([]); // เคลียร์ถ้าไม่มีแคช
                }

                setIsLoadingHistory(true);
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getHistory&month=${monthStr}`);
                    const text = await res.text();
                    
                    // ป้องกันการพังจากการแปลง JSON ผิดพลาด ถ้า Apps Script ส่ง HTML กลับมา
                    if (text.trim().startsWith('<')) {
                        throw new Error("เซิร์ฟเวอร์ส่งกลับเป็นหน้า HTML (กรุณาตรวจสอบว่าตั้งค่า Deployment 'Who has access' เป็น 'Anyone' หรือยัง)");
                    }

                    const json = JSON.parse(text);
                    if (json.status === 'success' && json.data) {
                        setMonthHistoryData(json.data);
                        localStorage.setItem(cacheKey, JSON.stringify(json.data)); // บันทึกทับข้อมูลล่าสุด
                    }
                } catch (error) { 
                    console.error('Failed to fetch history:', error.message || error); 
                } finally { 
                    setIsLoadingHistory(false); 
                }
            };

            const formatThaiDate = (dateString) => {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString;
                return new Intl.DateTimeFormat('th-TH', { year: 'numeric', month: 'short', day: 'numeric' }).format(d);
            };

            const checkIsUrgent = (dateStr) => {
                if (!dateStr) return false;
                const targetDate = new Date(dateStr); targetDate.setHours(0, 0, 0, 0);
                const today = new Date(); today.setHours(0, 0, 0, 0);
                const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
                return targetDate.getTime() <= tomorrow.getTime();
            };

            const playBeep = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                    osc.connect(gainNode); gainNode.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                    if (navigator.vibrate) navigator.vibrate(200);
                } catch (e) {}
            };

            const playErrorBeep = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.3);
                    osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.3);
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } catch (e) {}
            };

            // 🎶 เพิ่มเสียงตริ๊งตอนบันทึกสำเร็จ
            const playSuccessBeep = () => {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(880.00, ctx.currentTime + 0.1); // A5
                    gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                    osc.connect(gainNode); gainNode.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                } catch (e) {}
            };

            // 🛡️ เช็คบิลซ้ำ
            const checkDuplicate = (code) => {
                const cleanCode = String(code).trim().toUpperCase(); 
                
                if (currentItemsRef.current.some(item => String(item.code).trim().toUpperCase() === cleanCode)) {
                    showDuplicateError(`บิล ${cleanCode} สแกนไปแล้วในตะกร้า!`); 
                    return true;
                }
                
                if (allSentCodesCacheRef.current.has(cleanCode)) {
                    showDuplicateError(`บิล ${cleanCode} เคยถูกส่งไปแล้วในระบบ!`); 
                    return true;
                }
                
                return false;
            };

            const showDuplicateError = (msg) => {
                playErrorBeep(); 
                setDuplicateWarning(msg);
                setTimeout(() => setDuplicateWarning(null), 5000); 
            };

            // ==========================================
            // 📸 ระบบสแกนกล้อง
            // ==========================================
            const startScanner = async () => {
                if (!window.Html5Qrcode) { alert('ระบบสแกนยังโหลดไม่เสร็จ...'); return; }
                const isLineApp = navigator.userAgent.indexOf("Line") > -1;
                if (isLineApp) {
                    alert("⚠️ ตรวจพบการใช้งานผ่านแอป LINE\nระบบกล้องของ iPhone มักจะไม่ทำงานในนี้\n👉 กรุณากดไอคอน '3 จุด' (มุมจอ) แล้วเลือก 'เปิดใน Safari' ครับ");
                }

                setIsScanning(true);
                setTimeout(() => {
                    const html5QrCode = new window.Html5Qrcode("reader");
                    html5QrCodeRef.current = html5QrCode;
                    
                    const config = {
                        fps: 10,
                        qrbox: function(viewfinderWidth, viewfinderHeight) {
                            let width = Math.min(250, viewfinderWidth * 0.8);
                            return { width: width, height: 150 };
                        },
                        aspectRatio: 1.0, 
                        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
                    };

                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        config,
                        (decodedText) => {
                            if (lastScannedRef.current !== decodedText) {
                                lastScannedRef.current = decodedText;
                                
                                const finalCode = deliveryTypeRef.current === 'FACTORY' 
                                    ? `${decodedText.trim()}(รับโรงตัด)` 
                                    : decodedText.trim();
                                    
                                if (!checkDuplicate(finalCode)) {
                                    playBeep();
                                    setCurrentItems(prev => [{ code: finalCode, dueDate: dueDateRef.current }, ...prev]);
                                }
                                setTimeout(() => { lastScannedRef.current = null }, 1500);
                            }
                        }, 
                        (err) => {}
                    ).catch((err) => { 
                        setIsScanning(false); 
                        console.error(err);
                        alert("❌ ไม่สามารถเปิดกล้องได้\n1. คุณอาจยังไม่อนุญาตให้ใช้กล้อง\n2. กรุณาเปิดลิงก์นี้ใน Safari แทนแอป LINE ครับ"); 
                    });
                }, 300);
            };

            const stopScanner = () => {
                if (html5QrCodeRef.current) {
                    html5QrCodeRef.current.stop().then(() => {
                        html5QrCodeRef.current.clear(); 
                        setIsScanning(false);
                        setIsFlashlightOn(false);
                    }).catch(() => setIsScanning(false));
                } else setIsScanning(false);
            };

            const toggleFlashlight = async () => {
                if (html5QrCodeRef.current && isScanning) {
                    try {
                        const newState = !isFlashlightOn;
                        await html5QrCodeRef.current.applyVideoConstraints({ advanced: [{ torch: newState }] });
                        setIsFlashlightOn(newState);
                    } catch (error) {
                        console.error("Flashlight error:", error);
                        alert("เบราว์เซอร์หรืออุปกรณ์ของคุณไม่รองรับการเปิดไฟฉายผ่านเว็บครับ");
                    }
                }
            };

            const handleManualAdd = (e) => {
                e.preventDefault();
                const val = inputValue.trim();
                if (!val) return;
                
                const finalCode = deliveryType === 'FACTORY' ? `${val}(รับโรงตัด)` : val;
                if (!checkDuplicate(finalCode)) setCurrentItems(prev => [{ code: finalCode, dueDate: dueDate }, ...prev]);
                setInputValue('');
            };

            const handleRemoveItem = (indexToRemove) => {
                setCurrentItems(prev => prev.filter((_, index) => index !== indexToRemove));
            };

            // ==========================================
            // ✏️ ฟังก์ชันสำหรับแก้ไขบิลในตะกร้า
            // ==========================================
            const openEditModal = (index) => {
                const item = currentItems[index];
                setEditingIndex(index);
                setEditDueDate(item.dueDate);
                setEditIsFactory(item.code.includes('(รับโรงตัด)'));
            };

            const saveEditItem = () => {
                if (editingIndex === null) return;
                const newItems = [...currentItems];
                let baseCode = newItems[editingIndex].code.replace('(รับโรงตัด)', '').trim();
                const finalCode = editIsFactory ? `${baseCode}(รับโรงตัด)` : baseCode;
                
                // เช็คว่าแก้ประเภทแล้วไปซ้ำกับบิลอื่นในตะกร้าหรือไม่
                const isDuplicate = newItems.some((item, idx) => idx !== editingIndex && String(item.code).trim().toUpperCase() === finalCode.toUpperCase());
                
                if (isDuplicate) {
                    showDuplicateError(`แก้ประเภทไม่ได้! บิลนี้มีอยู่ในตะกร้าแล้ว`);
                    return;
                }

                newItems[editingIndex] = { ...newItems[editingIndex], code: finalCode, dueDate: editDueDate };
                setCurrentItems(newItems);
                setEditingIndex(null);
            };

            const executeSaveBatch = async () => {
                if (currentItems.length === 0 || !date || !time) return;
                setIsSaving(true); setSaveSuccess(false);

                const newBatch = {
                    id: "BATCH-" + Date.now().toString().slice(-6),
                    items: [...currentItems], date: date, time: time, dueDate: dueDate, timestamp: new Date().getTime()
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(newBatch)
                    });

                    const text = await response.text();
                    
                    // ป้องกันการพัง ถ้า Apps Script พังแล้วส่ง HTML กลับมา
                    if (text.trim().startsWith('<')) {
                        alert("❌ เซิร์ฟเวอร์ตอบกลับผิดพลาด (เป็นหน้าเว็บ HTML)\n\n👉 วิธีแก้:\n1. ไปที่ Google Apps Script\n2. กด Deploy > Manage deployments\n3. เช็คว่า 'Who has access' เลือกเป็น 'Anyone' (ทุกคน) หรือไม่");
                        setIsSaving(false);
                        return;
                    }

                    const result = JSON.parse(text);

                    if (result.status === 'error') {
                        if (result.message === 'DUPLICATE_FOUND') {
                            alert(`❌ ตรวจพบการซ้ำซ้อนในฐานข้อมูล!\nบิลเลขที่: ${result.duplicateCode}\nถูกส่งไปแล้วก่อนหน้านี้ กรุณาลบออกจากตะกร้าก่อนส่งใหม่`);
                        } else {
                            alert("❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: " + result.message);
                        }
                        setIsSaving(false);
                        return; 
                    }

                    setCurrentItems([]); 
                    localStorage.removeItem('delivery_basket');
                    
                    // 🎉 แสดงเอฟเฟกต์ส่งสำเร็จ!
                    setSaveSuccess(true);
                    playSuccessBeep();
                    
                    fetchAllCodes(); 
                    fetchHistoryForMonth(selectedMonth);
                    setTimeout(() => setSaveSuccess(false), 3000);

                } catch (error) { 
                    alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่อีกครั้ง"); 
                } finally { 
                    setIsSaving(false); 
                }
            };

            const getMonthlyStats = () => {
                const year = parseInt(selectedMonth.split('-')[0]);
                const month = parseInt(selectedMonth.split('-')[1]);
                const daysInMonth = new Date(year, month, 0).getDate();
                
                const stats = Array.from({length: daysInMonth}, () => ({ morning:0, afternoon:0, evening:0, urgent:0, total:0 }));
                let totalMonthCount = 0;
                
                let todayTotal = 0, todayMorning = 0, todayAfternoon = 0, todayEvening = 0;
                const todayStr = new Date().toLocaleDateString('en-CA');

                monthHistoryData.forEach(item => {
                    const day = parseInt(item.date.split('-')[2]) - 1;
                    const count = Number(item.count) || 0;
                    
                    if (day >= 0 && day < daysInMonth) {
                        totalMonthCount += count;
                        stats[day].total += count;

                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) stats[day].morning += count;
                        else if (hour < 18) stats[day].afternoon += count;
                        else stats[day].evening += count;

                        const sendDate = new Date(item.date); sendDate.setHours(0,0,0,0);
                        const nextDay = new Date(sendDate); nextDay.setDate(sendDate.getDate() + 1);
                        const dDate = new Date(item.dueDate); dDate.setHours(0,0,0,0);
                        if (dDate.getTime() <= nextDay.getTime()) {
                            stats[day].urgent += count;
                        }
                    }

                    if (item.date === todayStr) {
                        todayTotal += count;
                        const hour = parseInt(item.time.split(':')[0], 10);
                        if (hour < 12) todayMorning += count;
                        else if (hour < 18) todayAfternoon += count;
                        else todayEvening += count;
                    }
                });
                return { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening };
            };
            const { stats, daysInMonth, totalMonthCount, todayTotal, todayMorning, todayAfternoon, todayEvening } = getMonthlyStats();

            const handleExportExcel = async () => {
                if (!window.ExcelJS) { alert('ระบบสร้างไฟล์กำลังโหลด กรุณารอสักครู่...'); return; }
                setIsExporting(true);
                
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const sheet = workbook.addWorksheet('สรุปยอดส่งบิล');

                    const year = parseInt(selectedMonth.split('-')[0]);
                    const month = parseInt(selectedMonth.split('-')[1]);
                    const thaiMonth = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][month-1];
                    const thaiYear = year + 543;

                    const headerRow = ['วันที่'];
                    const morningRow = ['ก่อนเที่ยง (เที่ยว)'];
                    const afternoonRow = ['ช่วงบ่าย (เที่ยว)'];
                    const eveningRow = ['หลัง 18.00 น. (เที่ยว)'];
                    const urgentRow = ['งานด่วน'];
                    const totalRow = ['รวมรายวัน (เที่ยว)'];

                    let sumMorning=0, sumAfternoon=0, sumEvening=0, sumUrgent=0, sumTotal=0;

                    for(let i=0; i<daysInMonth; i++) {
                        headerRow.push(i+1);
                        morningRow.push(stats[i].morning); sumMorning += stats[i].morning;
                        afternoonRow.push(stats[i].afternoon); sumAfternoon += stats[i].afternoon;
                        eveningRow.push(stats[i].evening); sumEvening += stats[i].evening;
                        urgentRow.push(stats[i].urgent); sumUrgent += stats[i].urgent;
                        totalRow.push(stats[i].total); sumTotal += stats[i].total;
                    }

                    headerRow.push('รวมทั้งเดือน');
                    morningRow.push(sumMorning);
                    afternoonRow.push(sumAfternoon);
                    eveningRow.push(sumEvening);
                    urgentRow.push(sumUrgent);
                    totalRow.push(sumTotal);

                    sheet.addRow([`${thaiMonth} ${thaiYear}`]);
                    sheet.getCell('A1').font = { name: 'Arial', bold: true, size: 16, color: { argb: 'FF0F172A' } };
                    sheet.mergeCells('A1:C1');

                    const r2 = sheet.addRow(headerRow);
                    const r3 = sheet.addRow(morningRow);
                    const r4 = sheet.addRow(afternoonRow);
                    const r5 = sheet.addRow(eveningRow);
                    const r6 = sheet.addRow(urgentRow);
                    const r7 = sheet.addRow(totalRow);

                    const styleRow = (row, bgArgb, fontColorArgb, isBold = false) => {
                        row.eachCell((cell, colNumber) => {
                            cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgArgb } };
                            cell.font = { name: 'Arial', size: 11, color: { argb: fontColorArgb }, bold: isBold };
                            cell.border = {
                                top: {style:'thin', color: {argb:'FFCBD5E1'}}, left: {style:'thin', color: {argb:'FFCBD5E1'}},
                                bottom: {style:'thin', color: {argb:'FFCBD5E1'}}, right: {style:'thin', color: {argb:'FFCBD5E1'}}
                            };
                            cell.alignment = { vertical: 'middle', horizontal: colNumber === 1 ? 'left' : 'center' };
                        });
                    };

                    styleRow(r2, 'FF1E293B', 'FFFFFFFF', true); 
                    styleRow(r3, 'FFFFEDD5', 'FFC2410C');       
                    styleRow(r4, 'FFFFFBDB', 'FFB45309');       
                    styleRow(r5, 'FFE0E7FF', 'FF4338CA');       
                    styleRow(r6, 'FFFEE2E2', 'FFB91C1C', true); 
                    styleRow(r7, 'FFD1FAE5', 'FF047857', true); 

                    sheet.getColumn(1).width = 24; 
                    for(let i=2; i<=daysInMonth+1; i++) sheet.getColumn(i).width = 6; 
                    sheet.getColumn(daysInMonth+2).width = 16; 

                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    window.saveAs(blob, `สรุปยอดส่งบิล_${thaiMonth}_${thaiYear}.xlsx`);

                } catch (err) {
                    console.error(err); alert('เกิดข้อผิดพลาดในการสร้างไฟล์ Excel');
                } finally {
                    setIsExporting(false);
                }
            };

            useEffect(() => {
                if (activeTab !== 'history' || !chartRef.current || !window.Chart) return;
                if (chartInstance.current) chartInstance.current.destroy();
                
                const ctx = chartRef.current.getContext('2d');
                const labels = Array.from({length: daysInMonth}, (_, i) => i + 1);
                const dataTotals = stats.map(d => d.total);

                chartInstance.current = new window.Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'รวมเที่ยวส่ง (รายวัน)',
                            data: dataTotals,
                            backgroundColor: 'rgba(5, 150, 105, 0.8)',
                            borderColor: 'rgb(4, 120, 87)',
                            borderWidth: 1, borderRadius: 6, barPercentage: 0.7
                        }]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false, 
                        plugins: { legend: { display: false } }, 
                        scales: { 
                            y: { beginAtZero: true, ticks: { stepSize: 1 } },
                            x: { grid: { display: false } }

            return (

                    {/* การแจ้งเตือนบิลซ้ำ */}
                    {duplicateWarning && (

                    {/* 🗑️ ป็อปอัปยืนยันการล้างตะกร้า */}
                    {showClearConfirmModal && (

                            <div className="bg-white/95 backdrop-blur-sm rounded-[28px] p-7 w-full max-w-sm shadow-[0_20px_60px_-15px_rgba(0,0,0,0.2)] border border-white/50 animate-in zoom-in-95 duration-300">
                                <div className="text-center mb-6">
                                    <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-5 border-[6px] border-white shadow-sm">
                                        <i className="fa-solid fa-trash-can text-3xl"></i>
                                    </div>
                                    <h3 className="text-xl font-black text-slate-800">ยืนยันการล้างตะกร้า?</h3>

                                        ล้างทั้งหมด

                            </div>
                        </div>

                    {/* ✏️ ป็อปอัปแก้ไขบิลในตะกร้า */}
                    {editingIndex !== null && (

                                </div>
                                
                                <div className="space-y-5 mb-7">

                                                <i className="fa-solid fa-box-open text-lg mr-1"></i> DC
                                            </button>
                                            <button type="button" onClick={() => setEditIsFactory(true)}
                                                className={`flex-1 py-3 text-sm font-bold rounded-xl transition-all duration-300 flex items-center justify-center gap-1.5 ${editIsFactory ? 'bg-orange-200 text-orange-800 shadow-md shadow-orange-200/50' : 'text-slate-500 hover:bg-slate-200'}`}>
                                                <i className="fa-solid fa-scissors text-lg mr-1"></i> โรงตัด
                                            </button>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-xs font-bold text-slate-500 mb-1.5 block ml-1">วันที่กำหนดส่ง (ดิวส่ง)</label>
                                        <input type="date" value={editDueDate} onChange={(e) => setEditDueDate(e.target.value)}
                                            className="w-full px-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none text-base font-bold focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all shadow-sm" />

                                <button onClick={saveEditItem} className="w-full py-3.5 text-white bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold shadow-lg shadow-blue-500/30 transition-all active:scale-95">

                    {/* ป็อปอัปยืนยันการส่ง */}
                    {showConfirmModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                            <div className="bg-white/95 backdrop-blur-sm rounded-[28px] p-7 w-full max-w-sm shadow-[0_20px_60px_-15px_rgba(0,0,0,0.2)] border border-white/50 animate-in zoom-in-95 duration-300">
                                <div className="text-center mb-6">
                                    <div className="w-20 h-20 bg-emerald-50 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-5 border-[6px] border-white shadow-sm">
                                        <i className="fa-solid fa-paper-plane text-3xl ml-1"></i>
                                    </div>
                                    <h3 className="text-xl font-black text-slate-800">ยืนยันการส่งข้อมูล?</h3>
                                    <p className="text-sm text-slate-500 mt-2">คุณกำลังจะส่งข้อมูลทั้งหมด <span className="font-bold text-emerald-600 text-lg mx-1">{currentItems.length}</span> เที่ยว</p>
                                    
                                    <div className="bg-slate-50/80 rounded-2xl p-4 mt-5 text-sm text-left border border-slate-100 shadow-inner">
                                        <div className="flex justify-between items-center text-slate-600 mb-2.5">
                                            <span><i className="fa-solid fa-box-open text-emerald-500 mr-2"></i>รับสินค้าที่ DC</span>
                                            <span className="font-bold text-slate-800 bg-white px-2.5 py-1 rounded-lg border border-slate-100 shadow-sm">{currentItems.filter(item => !item.code.includes('(รับโรงตัด)')).length} เที่ยว</span>
                                        </div>
                                        <div className="flex justify-between items-center text-slate-600">
                                            <span><i className="fa-solid fa-scissors text-orange-500 mr-2"></i>รับโรงตัด</span>
                                            <span className="font-bold text-slate-800 bg-white px-2.5 py-1 rounded-lg border border-slate-100 shadow-sm">{currentItems.filter(item => item.code.includes('(รับโรงตัด)')).length} เที่ยว</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowConfirmModal(false)} className="flex-1 py-3.5 text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-2xl font-bold transition-all active:scale-95">ยกเลิก</button>
                                    <button onClick={() => { setShowConfirmModal(false); executeSaveBatch(); }} className="flex-1 py-3.5 text-white bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-bold shadow-lg shadow-emerald-500/30 transition-all active:scale-95">ยืนยันส่ง</button>
                                </div>

                    )}

                    {/* ป็อปอัปปลดล็อคเวลา */}
                    {showPinModal && (

                                    value={pinValue} onChange={(e) => setPinValue(e.target.value)}
                                    className="w-full text-center tracking-[0.5em] text-2xl font-bold py-3 px-4 bg-slate-50 border border-slate-200 rounded-2xl focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-50 outline-none transition-all mb-5 shadow-inner"

                                <div className="flex gap-3">

                            {/* กรอบซ้ายมือ */}

                                                <button type="button" onClick={toggleFlashlight} 
                                                    className={`absolute top-3 left-3 backdrop-blur-md w-10 h-10 flex items-center justify-center rounded-full transition-colors z-10 shadow-lg 
                                                    ${isFlashlightOn ? 'bg-yellow-400 text-slate-900 shadow-yellow-400/50' : 'bg-white/20 text-white hover:bg-white/30'}`}>
                                                    <i className="fa-solid fa-bolt text-lg"></i>
                                                </button>

                                                <div className="absolute bottom-4 left-0 right-0 text-center z-10 pointer-events-none">
                                                    <span className="bg-black/60 backdrop-blur-md text-white px-5 py-2.5 rounded-full text-xs font-medium border border-white/20 shadow-lg">
                                                        เล็งบาร์โค้ดให้อยู่ในกรอบ
                                                    </span>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="flex flex-col gap-3">
                                                <button type="button" onClick={startScanner} className="w-full h-16 flex items-center justify-center bg-slate-800 hover:bg-slate-900 text-white rounded-[20px] shadow-lg shadow-slate-800/20 text-3xl transition-all active:scale-95">
                                                    <i className="fa-solid fa-camera"></i>
                                                </button>
                                                
                                                <form onSubmit={handleManualAdd} className="flex gap-2">
                                                    <input type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} placeholder="พิมพ์เลขที่..." className="flex-1 px-4 py-0 bg-slate-50 border border-slate-200 rounded-[18px] outline-none text-sm h-[46px] focus:bg-white focus:border-emerald-500 focus:ring-2 focus:ring-emerald-50 transition-all shadow-inner" />
                                                    <button type="submit" className="w-[46px] h-[46px] flex-shrink-0 flex items-center justify-center bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-[18px] transition-all active:scale-95 text-lg shadow-sm">
                                                        <i className="fa-solid fa-plus font-bold"></i>
                                                    </button>
                                                </form>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex gap-3 mt-5 pt-5 bg-white/80 backdrop-blur-sm p-4 rounded-3xl shadow-sm border border-slate-100 relative group transition-all">
                                        <button type="button" onClick={() => { if(isTimeLocked) setShowPinModal(true); else setIsTimeLocked(true); }}
                                            className={`absolute -top-3 right-4 px-3 py-1 text-[10px] font-bold rounded-full shadow-md flex items-center gap-1.5 transition-colors border ${isTimeLocked ? 'bg-slate-800 text-white border-slate-700 hover:bg-slate-700' : 'bg-red-50 text-red-600 border-red-200 animate-pulse'}`}>
                                            <i className={`fa-solid ${isTimeLocked ? 'fa-lock' : 'fa-lock-open'}`}></i> {isTimeLocked ? 'ล็อคเวลา' : 'ปลดล็อค'}
                                        </button>
                                        <div className="flex-1">
                                            <label className="text-[10px] font-bold text-slate-400 mb-1 block uppercase tracking-wider ml-1">วันที่ส่งบิล</label>
                                            <input type="date" required value={date} onChange={(e) => setDate(e.target.value)} disabled={isTimeLocked} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs text-slate-800 focus:bg-white transition-colors" />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-[10px] font-bold text-slate-400 mb-1 block uppercase tracking-wider ml-1">เวลา</label>
                                            <input type="time" required value={time} onChange={(e) => setTime(e.target.value)} disabled={isTimeLocked} className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs text-slate-800 focus:bg-white transition-colors" />
                                        </div>
                                    </div>
                                </div>
                                <div className={`p-6 rounded-[32px] border-2 transition-all duration-300 shadow-[0_8px_30px_rgb(0,0,0,0.04)] ${checkIsUrgent(dueDate) ? 'bg-red-50/80 backdrop-blur-sm border-red-200' : 'bg-white/95 backdrop-blur-sm border-emerald-100'}`}>
                                    <div className="flex items-center justify-between mb-4">
                                        <label className={`text-sm font-bold flex items-center gap-2 ml-1 ${checkIsUrgent(dueDate) ? 'text-red-800' : 'text-emerald-800'}`}>
                                            <i className="fa-regular fa-calendar-check"></i> กำหนดส่ง (สำหรับการสแกนครั้งต่อไป)
                                        </label>
                                        {checkIsUrgent(dueDate) && <span className="bg-red-500 text-white text-[10px] px-2.5 py-1 rounded-full font-bold flex items-center gap-1.5 shadow-sm animate-pulse"><i className="fa-solid fa-triangle-exclamation"></i> งานด่วน</span>}
                                    </div>
                                    <input type="date" required value={dueDate} onChange={(e) => setDueDate(e.target.value)}
                                        className={`w-full px-5 py-3.5 bg-white border border-slate-200 rounded-[20px] outline-none text-base font-bold shadow-sm transition-all
                                        ${checkIsUrgent(dueDate) ? 'border-red-300 focus:ring-4 focus:ring-red-100 text-red-900' : 'focus:border-emerald-400 focus:ring-4 focus:ring-emerald-50 text-emerald-900'}`} />
                                </div>
                            </div>

                            {/* กรอบขวามือ (ตะกร้ารอส่งบิล) */}
                            <div className="lg:col-span-5 flex flex-col h-full">
                                <div className="flex flex-col bg-slate-800 rounded-[36px] p-2 shadow-2xl shadow-slate-800/20 relative flex-1">
                                    {isSaving && <div className="absolute inset-0 bg-white/90 backdrop-blur-md z-50 flex flex-col items-center justify-center rounded-[36px]"><div className="w-14 h-14 border-4 border-emerald-100 border-t-emerald-500 rounded-full animate-spin mb-4"></div></div>}
                                    
                                    <div className="flex justify-between items-center px-6 py-5">
                                        <h3 className="text-white font-semibold flex items-center gap-2.5"><i className="fa-solid fa-layer-group text-emerald-400 text-lg"></i> ตะกร้ารอส่งบิล</h3>
                                        
                                        <div className="flex items-center gap-2.5">
                                            {currentItems.length > 0 && (
                                                <button onClick={() => setShowClearConfirmModal(true)} className="text-red-400 hover:text-red-300 text-[11px] font-bold px-3 py-1.5 bg-slate-700/80 hover:bg-slate-600 rounded-xl transition-all active:scale-95 flex items-center gap-1.5">
                                                    <i className="fa-solid fa-trash-can"></i> ล้าง
                                                </button>
                                            )}
                                            <span className="bg-emerald-500 text-white text-xs font-bold px-3.5 py-1.5 rounded-full shadow-sm">{currentItems.length} เที่ยว</span>
                                        </div>
                                    </div>

                                    <div className="flex-1 min-h-[250px] max-h-[400px] overflow-y-auto bg-slate-50/95 backdrop-blur-sm rounded-[28px] p-3 space-y-2.5 custom-scrollbar">
                                        {currentItems.map((item, index) => {
                                            const isUrgent = checkIsUrgent(item.dueDate);
                                            const isFactory = item.code.includes('(รับโรงตัด)');
                                            
                                            return (
                                                <div key={index} className="flex items-center justify-between bg-white border border-slate-100 p-3.5 rounded-2xl shadow-sm hover:shadow-md transition-all">
                                                    <div className="flex flex-col">
                                                        <span className={`font-bold text-base ${isFactory ? 'text-orange-700' : 'text-slate-800'}`}>
                                                            {isFactory ? <i className="fa-solid fa-scissors mr-1.5 text-sm"></i> : <i className="fa-solid fa-box-open mr-1.5 text-sm text-emerald-600"></i>}
                                                            {item.code}
                                                        </span>
                                                        <span className={`text-[11px] font-bold mt-1 flex items-center gap-1.5 ${isUrgent ? 'text-red-500' : 'text-emerald-600'}`}>
                                                            ดิวส่ง: {formatThaiDate(item.dueDate)} {isUrgent && <i className="fa-solid fa-fire text-[10px]"></i>}
                                                        </span>
                                                    </div>
                                                    
                                                    <div className="flex gap-2">
                                                        <button onClick={() => openEditModal(index)} className="text-slate-400 hover:text-blue-500 w-10 h-10 flex items-center justify-center bg-slate-50 hover:bg-blue-50 rounded-xl transition-all active:scale-95"><i className="fa-solid fa-pen-to-square"></i></button>
                                                        <button onClick={() => handleRemoveItem(index)} className="text-slate-400 hover:text-red-500 w-10 h-10 flex items-center justify-center bg-slate-50 hover:bg-red-50 rounded-xl transition-all active:scale-95"><i className="fa-solid fa-trash-can"></i></button>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                    <div className="p-2.5 mt-2">
                                        <button onClick={() => setShowConfirmModal(true)} disabled={currentItems.length === 0 || isSaving}
                                            className="w-full text-white font-bold text-base py-4 rounded-[24px] flex items-center justify-center gap-2 transition-all bg-emerald-600 hover:bg-emerald-500 shadow-lg shadow-emerald-500/20 active:scale-[0.98] disabled:bg-slate-700 disabled:shadow-none disabled:active:scale-100">
                                            <i className="fa-regular fa-paper-plane text-xl"></i> บันทึก
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* --------- แท็บ 2: หน้าประวัติการส่งและกราฟ --------- */}
                    <div className={`pt-6 px-4 sm:px-6 lg:px-8 max-w-4xl mx-auto space-y-6 ${activeTab === 'history' ? 'block' : 'hidden'}`}>
                        
                        <div className="flex flex-col sm:flex-row justify-between items-center bg-white/95 backdrop-blur-sm px-6 py-5 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 gap-4">
                            <div className="flex items-center gap-4 w-full sm:w-auto">
                                <div className="bg-slate-50 p-3 rounded-2xl text-slate-500 border border-slate-100 shadow-sm"><i className="fa-regular fa-calendar-days text-xl"></i></div>
                                <div className="flex-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">เลือกเดือนสรุปยอด</label>
                                    <input type="month" value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} 
                                        className="bg-transparent text-sm font-bold text-slate-800 outline-none w-full" />
                                </div>
                            </div>
                            
                            <button onClick={handleExportExcel} disabled={isLoadingHistory || isExporting} 
                                className="w-full sm:w-auto flex items-center justify-center gap-2.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-6 py-3.5 rounded-2xl font-bold transition-all active:scale-95 border border-emerald-200 disabled:opacity-50 shadow-sm">
                                {isExporting ? <i className="fa-solid fa-circle-notch animate-spin"></i> : <i className="fa-solid fa-file-excel text-emerald-600"></i>}
                                <span>ดาวน์โหลด Excel</span>
                            </button>
                        </div>

                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-[32px] p-8 shadow-xl shadow-slate-900/10 text-white flex justify-between items-center relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-8 opacity-[0.08]">
                                <i className="fa-solid fa-chart-column text-9xl"></i>
                            </div>
                            <div className="z-10">
                                <h3 className="text-slate-300 text-xs font-bold uppercase tracking-wider mb-2">ยอดส่งบิลรวมเดือนนี้</h3>
                                <div className="flex items-baseline gap-3">
                                    <span className="text-6xl font-black text-emerald-400 drop-shadow-md">{totalMonthCount}</span>
                                    <span className="text-slate-300 font-bold text-lg">เที่ยว</span>
                                </div>
                            </div>
                            <button onClick={() => { fetchHistoryForMonth(selectedMonth); fetchAllCodes(); }} disabled={isLoadingHistory} className="z-10 bg-slate-700/50 hover:bg-slate-700 p-4 rounded-full transition-all active:scale-95 backdrop-blur-sm shadow-inner">
                                <i className={`fa-solid fa-rotate-right text-lg ${isLoadingHistory ? 'animate-spin' : ''}`}></i>
                            </button>
                        </div>

                        <div className="grid grid-cols-4 gap-3 sm:gap-4">
                            <div className="bg-white rounded-[24px] p-4 border border-emerald-100 flex flex-col items-center justify-center shadow-sm hover:shadow-md transition-shadow">
                                <span className="text-[10px] sm:text-xs font-bold text-slate-400 mb-1.5">ยอดรวมวันนี้</span>
                                <span className="text-2xl sm:text-3xl font-black text-emerald-600">{todayTotal}</span>
                            </div>
                            <div className="bg-orange-50 rounded-[24px] p-4 border border-orange-100 flex flex-col items-center justify-center shadow-sm hover:shadow-md transition-shadow">
                                <span className="text-[10px] sm:text-xs font-bold text-orange-600 mb-1.5"><i className="fa-solid fa-sun"></i> ก่อนเที่ยง</span>
                                <span className="text-2xl sm:text-3xl font-black text-orange-700">{todayMorning}</span>
                            </div>
                            <div className="bg-amber-50 rounded-[24px] p-4 border border-amber-100 flex flex-col items-center justify-center shadow-sm hover:shadow-md transition-shadow">
                                <span className="text-[10px] sm:text-xs font-bold text-amber-600 mb-1.5"><i className="fa-regular fa-sun"></i> บ่าย</span>
                                <span className="text-2xl sm:text-3xl font-black text-amber-700">{todayAfternoon}</span>
                            </div>
                            <div className="bg-indigo-50 rounded-[24px] p-4 border border-indigo-100 flex flex-col items-center justify-center shadow-sm hover:shadow-md transition-shadow">
                                <span className="text-[10px] sm:text-xs font-bold text-indigo-600 mb-1.5"><i className="fa-solid fa-moon"></i> หลัง 18.00</span>
                                <span className="text-2xl sm:text-3xl font-black text-indigo-700">{todayEvening}</span>
                            </div>
                        </div>

                        <div className="bg-white/95 backdrop-blur-sm rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 overflow-hidden">
                            <div className="px-6 py-5 border-b border-slate-100 bg-white">
                                <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2">
                                    <i className="fa-solid fa-chart-simple text-emerald-500 text-lg"></i> กราฟจำนวนเที่ยวรายวัน (1-{daysInMonth})
                                </h3>
                            </div>
                            <div className="p-6 bg-slate-50/30">
                                {monthHistoryData.length === 0 && isLoadingHistory ? (
                                    <div className="text-center py-12 text-sm text-slate-400 font-medium animate-pulse">กำลังโหลดข้อมูล...</div>
                                ) : (
                                    <div className="w-full h-64 bg-white p-4 rounded-[24px] border border-slate-100 shadow-sm relative">
                                        {isLoadingHistory && (
                                            <div className="absolute top-3 right-4 z-10 bg-slate-100/80 backdrop-blur-sm text-slate-500 text-[10px] px-2.5 py-1 rounded-full font-bold flex items-center gap-1.5 shadow-sm">
                                                <i className="fa-solid fa-rotate animate-spin"></i> อัปเดตข้อมูล...
                                            </div>
                                        )}
                                        <canvas ref={chartRef}></canvas>
                                    </div>
                                )}
                            </div>
                        </div>

                    </div>

                    {/* --------- เมนูนำทางด้านล่าง แบบลอยตัวและโปร่งแสง (Glassmorphism) --------- */}
                    <div className="fixed bottom-6 left-0 right-0 z-40 pb-[env(safe-area-inset-bottom)] pointer-events-none flex justify-center px-4">
                        <div className="bg-white/40 backdrop-blur-md shadow-[0_8px_32px_rgba(0,0,0,0.12)] border border-white/60 p-1.5 rounded-[30px] flex w-full max-w-[320px] pointer-events-auto">
                            <button onClick={() => setActiveTab('scan')} className={`flex-1 flex justify-center items-center h-14 rounded-[24px] transition-all duration-300 ${activeTab === 'scan' ? 'bg-white/90 text-emerald-600 shadow-sm' : 'text-slate-600 hover:bg-white/50'}`}>
                                <i className={`fa-solid fa-barcode text-xl transition-transform ${activeTab === 'scan' ? 'scale-110' : ''}`}></i>
                                <span className="ml-2.5 font-bold text-sm tracking-wide">สแกนบิล</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`flex-1 flex justify-center items-center h-14 rounded-[24px] transition-all duration-300 ${activeTab === 'history' ? 'bg-white/90 text-emerald-600 shadow-sm' : 'text-slate-600 hover:bg-white/50'}`}>
                                <i className={`fa-solid fa-clipboard-list text-xl transition-transform ${activeTab === 'history' ? 'scale-110' : ''}`}></i>
                                <span className="ml-2.5 font-bold text-sm tracking-wide">ประวัติ</span>
                            </button>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
